<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Perspectives — 3D Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #e2e8f0; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
  #viewport { flex: 1; }
  #controls { background: #1a1d27; border-top: 1px solid #2d3148; padding: 10px 20px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; flex-wrap: wrap; }
  #controls button { background: #4f46e5; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  #controls button:hover { background: #6366f1; }
  #controls button.toggle-off { background: #475569; }
  #timeline { flex: 1; min-width: 200px; }
  #info { font-size: 12px; color: #94a3b8; min-width: 140px; text-align: right; }
  #sidebar { position: absolute; top: 10px; right: 10px; background: rgba(26,29,39,0.92); border-radius: 8px; padding: 12px; font-size: 12px; max-height: 60vh; overflow-y: auto; z-index: 10; min-width: 180px; }
  #sidebar h4 { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
  .player-row { display: flex; align-items: center; gap: 6px; padding: 3px 4px; border-radius: 3px; }
  .player-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .player-name { font-size: 11px; color: #cbd5e1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  select { background: #334155; color: #e2e8f0; border: 1px solid #475569; border-radius: 4px; padding: 4px 8px; font-size: 12px; }
  #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 16px; color: #64748b; }
  #close-btn { position: absolute; top: 10px; left: 10px; z-index: 20; background: rgba(0,0,0,0.6); color: #e2e8f0; border: 1px solid #475569; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px; }
  #close-btn:hover { background: rgba(0,0,0,0.8); }
</style>
</head>
<body>

<div id="viewport">
  <button id="close-btn" onclick="window.location.href='/';">✕ Close</button>
  <div id="loading">Loading scene...</div>
</div>

<div id="sidebar"></div>

<div id="controls">
  <button id="play-btn">Play</button>
  <input type="range" id="timeline" min="0" max="100" value="0">
  <select id="speed-select">
    <option value="0.25">0.25x</option>
    <option value="0.5">0.5x</option>
    <option value="1" selected>1x</option>
    <option value="2">2x</option>
  </select>
  <select id="camera-select">
    <option value="broadcast">Broadcast</option>
    <option value="tactical">Tactical (top)</option>
    <option value="behind-goal">Behind Goal</option>
  </select>
  <button id="ball-btn">Ball: ON</button>
  <span id="info">Frame 0 / 0</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const TEAM_COLORS = { A: 0x3b82f6, B: 0xef4444, referee: 0xf59e0b, unknown: 0x6b7280 };
const PITCH_L = 105, PITCH_W = 68;

// ── Scene setup (pitch-registered scenes only) ──
// Coordinate convention: pitch-world is x=along nearside touchline (0..L),
// y=near→far (0..W), z=up. Three.js uses Y-up, so we map (x,y,z)_pitch →
// (x, z, -y)_three.
function pitchToThree(p) { return [p[0], p[2] || 0, -(p[1] || 0)]; }

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(52.5, 25, 50);
camera.lookAt(52.5, 0, -34);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight - 60);
document.getElementById('viewport').appendChild(renderer.domElement);
document.getElementById('loading').remove();

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(52.5, 0, -34);
controls.enableDamping = true;
controls.update();

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(20, 40, 20);
scene.add(dirLight);

// ── Pitch model (always visible — pipeline always emits pitch coords) ──
const pitchGroup = new THREE.Group();
{
  const pitchGeom = new THREE.PlaneGeometry(PITCH_L, PITCH_W);
  const pitchMat = new THREE.MeshStandardMaterial({ color: 0x1a5e1a, side: THREE.DoubleSide });
  const pitchMesh = new THREE.Mesh(pitchGeom, pitchMat);
  pitchMesh.rotation.x = -Math.PI / 2;
  pitchMesh.position.set(PITCH_L / 2, 0, -PITCH_W / 2);
  pitchGroup.add(pitchMesh);

  const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.55 });
  function pitchLine(x1, z1, x2, z2) {
    const pts = [new THREE.Vector3(x1, 0.01, -z1), new THREE.Vector3(x2, 0.01, -z2)];
    pitchGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lineMat));
  }
  pitchLine(0, 0, PITCH_L, 0);
  pitchLine(PITCH_L, 0, PITCH_L, PITCH_W);
  pitchLine(PITCH_L, PITCH_W, 0, PITCH_W);
  pitchLine(0, PITCH_W, 0, 0);
  pitchLine(PITCH_L / 2, 0, PITCH_L / 2, PITCH_W);
  // Centre circle
  const circPts = [];
  for (let a = 0; a <= Math.PI * 2; a += 0.1) {
    circPts.push(new THREE.Vector3(PITCH_L / 2 + 9.15 * Math.cos(a), 0.01, -(PITCH_W / 2 + 9.15 * Math.sin(a))));
  }
  pitchGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(circPts), lineMat));
  // 18-yard boxes
  const box18 = (xs, sign) => {
    pitchLine(xs, 13.84, xs + sign * 16.5, 13.84);
    pitchLine(xs + sign * 16.5, 13.84, xs + sign * 16.5, 54.16);
    pitchLine(xs + sign * 16.5, 54.16, xs, 54.16);
  };
  box18(0, 1);
  box18(PITCH_L, -1);
}
scene.add(pitchGroup);

// ── State ──
let totalFrames = 0;
let currentFrame = 0;
let playing = false;
let speed = 1;
let showBall = true;
let fps = 25;

// Player markers, keyed by player_id. Each entry stores the per-frame
// pelvis (root_t) positions and a Three.js mesh group.
const playerObjects = new Map();   // player_id -> { mesh, frames, root_t, confidence, label }

// Ball
let ballMesh = null;
let ballFrames = [];   // [{frame, world_xyz, state}]

// ── Loaders ──
async function fetchJson(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${url} → ${r.status}`);
  return await r.json();
}

async function loadScene() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '<h4>Pitch-registered scene</h4>';

  // 1. Camera track tells us fps + frame-count bounds
  let camTrack = null;
  try { camTrack = await fetchJson('/camera/track'); } catch (_) {}
  if (camTrack && camTrack.fps > 0) fps = camTrack.fps;
  if (camTrack && camTrack.frames && camTrack.frames.length > 0) {
    totalFrames = Math.max(totalFrames, camTrack.frames.length);
  }

  // 2. List available HMR-world player tracks
  let players = [];
  try {
    const list = await fetchJson('/hmr_world/players');
    players = list.players || [];
  } catch (_) {}

  // 3. Fetch each player's preview (frames + root_t + confidence)
  const playerEntries = [];
  for (const pid of players) {
    try {
      const preview = await fetchJson(`/hmr_world/preview?player_id=${encodeURIComponent(pid)}`);
      playerEntries.push(preview);
      if (preview.frames && preview.frames.length > 0) {
        const last = preview.frames[preview.frames.length - 1];
        totalFrames = Math.max(totalFrames, last + 1);
      }
    } catch (_) {}
  }

  for (const p of playerEntries) addPlayerMarker(p, sidebar);

  // 4. Ball
  try {
    const ball = await fetchJson('/ball/preview');
    ballFrames = ball.frames || [];
    if (ballFrames.length > 0) {
      totalFrames = Math.max(totalFrames, ballFrames[ballFrames.length - 1].frame + 1);
      const ballGeo = new THREE.SphereGeometry(0.18, 16, 16);
      const ballMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
      ballMesh = new THREE.Mesh(ballGeo, ballMat);
      ballMesh.visible = false;
      scene.add(ballMesh);
    }
  } catch (_) {}

  if (totalFrames === 0) {
    sidebar.innerHTML += '<div style="color:#94a3b8;font-size:11px;">No data — run the pipeline first.</div>';
    totalFrames = 1;
  }

  document.getElementById('timeline').max = String(Math.max(0, totalFrames - 1));
  setCameraPreset('broadcast');
  updateFrame(0);
}

function addPlayerMarker(p, sidebar) {
  const team = (p.team || 'unknown');
  const color = TEAM_COLORS[team] || TEAM_COLORS.unknown;

  // Each player is rendered as a single tall capsule at root_t (pitch metres).
  // The full SMPL mesh is in scene.glb if needed for export — the live viewer
  // just shows pelvis-centred markers, which keeps it lightweight.
  const geom = new THREE.CapsuleGeometry(0.35, 1.4, 4, 8);
  const mat = new THREE.MeshStandardMaterial({ color, transparent: true, opacity: 0.9 });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.visible = false;
  scene.add(mesh);

  playerObjects.set(p.player_id, {
    mesh,
    frames: p.frames || [],
    root_t: p.root_t || [],
    confidence: p.confidence || [],
  });

  const row = document.createElement('div');
  row.className = 'player-row';
  row.innerHTML =
    `<span class="player-dot" style="background:#${color.toString(16).padStart(6,'0')}"></span>`
    + `<span class="player-name">${p.player_id}</span>`;
  sidebar.appendChild(row);
}

function setCameraPreset(preset) {
  if (preset === 'broadcast') camera.position.set(52.5, 25, 50);
  else if (preset === 'tactical') camera.position.set(52.5, 80, -34);
  else if (preset === 'behind-goal') camera.position.set(-10, 10, -34);
  controls.target.set(52.5, 0, -34);
  controls.update();
}

// ── Frame update ──
function updateFrame(fi) {
  currentFrame = fi;
  document.getElementById('info').textContent =
    `Frame ${fi} / ${Math.max(0, totalFrames - 1)}`;
  document.getElementById('timeline').value = String(fi);

  for (const obj of playerObjects.values()) {
    const idx = obj.frames.indexOf(fi);
    if (idx < 0) {
      obj.mesh.visible = false;
      continue;
    }
    const t = obj.root_t[idx];
    if (!t || t[0] === null || isNaN(t[0])) {
      obj.mesh.visible = false;
      continue;
    }
    const [tx, ty, tz] = pitchToThree(t);
    // Pelvis is roughly mid-body; lift the capsule centre to clear the ground.
    obj.mesh.position.set(tx, Math.max(ty, 0.9), tz);
    obj.mesh.visible = true;
  }

  if (ballMesh && ballFrames.length > 0) {
    const bf = ballFrames.find((f) => f.frame === fi);
    if (showBall && bf && bf.world_xyz) {
      const [bx, by, bz] = pitchToThree(bf.world_xyz);
      ballMesh.position.set(bx, by, bz);
      ballMesh.visible = true;
    } else {
      ballMesh.visible = false;
    }
  }
}

// ── Controls ──
const playBtn = document.getElementById('play-btn');
const timeline = document.getElementById('timeline');
const speedSelect = document.getElementById('speed-select');
const cameraSelectEl = document.getElementById('camera-select');
const ballBtn = document.getElementById('ball-btn');

playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.textContent = playing ? 'Pause' : 'Play';
});

timeline.addEventListener('input', () => updateFrame(parseInt(timeline.value)));
speedSelect.addEventListener('change', () => { speed = parseFloat(speedSelect.value); });
cameraSelectEl.addEventListener('change', () => setCameraPreset(cameraSelectEl.value));
ballBtn.addEventListener('click', () => {
  showBall = !showBall;
  ballBtn.textContent = `Ball: ${showBall ? 'ON' : 'OFF'}`;
  ballBtn.classList.toggle('toggle-off', !showBall);
  updateFrame(currentFrame);
});

// ── Animation loop ──
let lastTime = 0;
let accumulator = 0;

function animate(time) {
  requestAnimationFrame(animate);
  const dt = (time - lastTime) / 1000;
  lastTime = time;

  if (playing && totalFrames > 0) {
    accumulator += dt * speed;
    const frameDt = 1 / Math.max(1, fps);
    while (accumulator >= frameDt) {
      accumulator -= frameDt;
      currentFrame = (currentFrame + 1) % totalFrames;
    }
    updateFrame(currentFrame);
  }

  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / (window.innerHeight - 60);
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight - 60);
});

loadScene();
requestAnimationFrame(animate);
</script>
</body>
</html>
