<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anchor Editor — Football Perspectives</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: 13px;
  }

  /* ── Header ─────────────────────────────────────────────────── */
  header {
    background: #1a1d27;
    border-bottom: 1px solid #2d3148;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 600; color: #f1f5f9; }
  header select, header button, header input {
    background: #334155; color: #e2e8f0;
    border: 1px solid #475569; border-radius: 4px;
    padding: 4px 10px; font-size: 12px;
    font-family: inherit;
  }
  header button { cursor: pointer; }
  header button.primary { background: #4f46e5; border-color: #6366f1; color: #fff; }
  header button.primary:hover { background: #6366f1; }
  header button:disabled { opacity: 0.5; cursor: not-allowed; }
  header .spacer { flex: 1; }
  header #status { font-size: 11px; color: #94a3b8; min-width: 140px; text-align: right; }

  /* ── Main 3-column layout ───────────────────────────────────── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 220px 1fr 240px;
    overflow: hidden;
    min-height: 0;
  }

  .panel {
    background: #181b25;
    border-right: 1px solid #2d3148;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel:last-child { border-right: none; border-left: 1px solid #2d3148; }
  .panel h2 {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: #64748b;
    padding: 10px 12px;
    border-bottom: 1px solid #2d3148;
    flex-shrink: 0;
  }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  /* ── Landmark palette ──────────────────────────────────────── */
  .landmark-row {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 8px;
    cursor: pointer;
    border-radius: 3px;
    font-size: 12px;
    color: #cbd5e1;
    user-select: none;
  }
  .landmark-row:hover { background: #252840; }
  .landmark-row.selected {
    background: #3730a3; color: #fff;
  }
  .landmark-row .lm-coord {
    font-size: 10px;
    color: #94a3b8;
    margin-left: auto;
    font-family: "SF Mono", "Fira Code", monospace;
  }
  .landmark-row.selected .lm-coord { color: #c7d2fe; }

  /* ── Anchor list ───────────────────────────────────────────── */
  .anchor-row {
    padding: 6px 8px;
    cursor: pointer;
    border-radius: 3px;
    font-size: 12px;
    color: #cbd5e1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
    background: #1f2236;
  }
  .anchor-row:hover { background: #2a2e48; }
  .anchor-row.current { background: #3730a3; color: #fff; }
  .anchor-row .lm-count { font-size: 11px; color: #94a3b8; }
  .anchor-row.current .lm-count { color: #c7d2fe; }
  .anchor-row .del-btn {
    background: transparent; border: none; color: #94a3b8;
    cursor: pointer; padding: 0 4px; font-size: 14px;
  }
  .anchor-row .del-btn:hover { color: #ef4444; }
  .anchor-empty { color: #64748b; padding: 12px 8px; font-style: italic; font-size: 11px; }

  /* ── Centre column ─────────────────────────────────────────── */
  .centre {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
    background: #0a0c12;
  }
  .video-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }
  .video-stack {
    position: relative;
    line-height: 0;
    max-width: 100%;
    max-height: 100%;
  }
  .video-stack video {
    display: block;
    max-width: 100%;
    max-height: 100%;
  }
  .video-stack canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: auto;
    cursor: crosshair;
  }
  .placement-hint {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    background: rgba(79, 70, 229, 0.92);
    color: #fff;
    padding: 5px 14px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    pointer-events: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  /* ── Frame controls ────────────────────────────────────────── */
  .frame-bar {
    background: #1a1d27;
    border-top: 1px solid #2d3148;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .frame-bar button {
    background: #334155; color: #e2e8f0;
    border: 1px solid #475569; border-radius: 4px;
    padding: 4px 8px; font-size: 12px; cursor: pointer;
    font-family: inherit;
  }
  .frame-bar button:hover { background: #475569; }
  .frame-bar input[type=range] { flex: 1; min-width: 100px; }
  .frame-bar #frame-input {
    background: #334155; color: #e2e8f0;
    border: 1px solid #475569; border-radius: 4px;
    padding: 4px 8px; width: 80px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 12px;
  }
  .frame-bar .frame-info { font-size: 11px; color: #94a3b8; }

  /* ── Confidence timeline ───────────────────────────────────── */
  .conf-strip {
    background: #0a0c12;
    border-top: 1px solid #2d3148;
    height: 28px;
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
    cursor: pointer;
    position: relative;
    padding: 0;
  }
  .conf-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .conf-empty {
    color: #4b5563;
    font-size: 11px;
    margin: auto;
  }
</style>
</head>
<body>

<header>
  <h1>Anchor Editor</h1>
  <select id="clip-select"><option value="">Loading clips…</option></select>
  <select id="stadium-select" title="Pick the stadium to enable mowing-stripe palette entries">
    <option value="">(no stadium)</option>
  </select>
  <span class="spacer"></span>
  <span id="status">Ready</span>
  <button id="save-btn" class="primary">Save Anchors</button>
  <button id="rerun-camera-btn" style="background:#0ea5e9;border-color:#38bdf8;color:#fff;">Rerun camera tracking</button>
  <a href="/" id="dashboard-link" style="color:#94a3b8;text-decoration:none;font-size:12px;margin-left:8px;">← Dashboard</a>
</header>

<main>
  <!-- Landmark palette -->
  <div class="panel">
    <h2>Landmark palette</h2>
    <div class="palette-mode" style="padding:8px 12px;border-bottom:1px solid #1f2937;display:flex;align-items:center;gap:10px;font-size:12px;color:#94a3b8;">
      <span>Mode:</span>
      <label style="cursor:pointer;"><input type="radio" name="mode" id="mode-points" value="points" checked> points</label>
      <label style="cursor:pointer;"><input type="radio" name="mode" id="mode-lines" value="lines"> lines</label>
    </div>
    <div class="panel-body" id="palette"></div>
  </div>

  <!-- Centre: video + canvas + frame bar + confidence timeline -->
  <div class="centre">
    <div class="video-wrap">
      <div class="video-stack" id="video-stack">
        <video id="video" preload="metadata" playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div class="placement-hint" id="hint" style="display:none;"></div>
      </div>
    </div>
    <div class="frame-bar">
      <button id="prev-btn" title="Previous frame (←)">◀</button>
      <button id="play-btn" title="Play / pause (Space)">▶</button>
      <button id="next-btn" title="Next frame (→)">▶</button>
      <input type="range" id="seek" min="0" max="0" value="0" step="1">
      <input type="number" id="frame-input" min="0" value="0">
      <span class="frame-info" id="frame-info">0 / 0</span>
      <button id="add-anchor-btn" title="Mark current frame as an anchor">+ Anchor here</button>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:#94a3b8;cursor:pointer;"
             title="When enabled, every click is sub-pixel-refined to the nearest painted feature via image processing.">
        <input type="checkbox" id="snap-toggle" checked> snap to lines
      </label>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:#94a3b8;cursor:pointer;">
        <input type="checkbox" id="show-pitch" checked> projected pitch
      </label>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:#94a3b8;cursor:pointer;"
             title="Overlay the painted lines the camera-stage line_extraction pass detected in this frame (cyan), vs the catalogue projection (yellow).">
        <input type="checkbox" id="show-detected-lines"> detected lines
      </label>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:#94a3b8;cursor:pointer;">
        <input type="checkbox" id="show-landmark-labels"> landmark labels
      </label>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:#94a3b8;cursor:pointer;">
        <input type="checkbox" id="show-anchors" checked> anchors
      </label>
    </div>
    <div class="conf-strip" id="conf-strip" title="Click to seek">
      <canvas id="conf-canvas" class="conf-canvas"></canvas>
    </div>
  </div>

  <!-- Anchor list -->
  <div class="panel">
    <h2>Anchors</h2>
    <div class="panel-body" id="anchor-list">
      <div class="anchor-empty">No anchors yet.</div>
    </div>
  </div>
</main>

<script>
"use strict";

// ── State ───────────────────────────────────────────────────────────
const state = {
  clipId: "",
  stadium: "",            // selected stadium id (empty = no mow stripes)
  imageSize: [0, 0],     // [w, h] from anchors.json or video
  landmarks: [],          // {name, world_xyz} — pitch-landmark catalogue
  pitchLines: [],         // {name, world_segment, category?} — pitch-line catalogue
  selectedLandmark: null, // landmark name pending placement (Points mode)
  selectedLine: null,     // pitch-line name pending placement (Lines mode)
  pendingLineStart: null, // first click of a 2-click line (image_xy)
  anchors: new Map(),     // frame -> {points: [...], lines: [...]}
  cameraTrack: null,      // {clip_id, fps, image_size, t_world, frames: [...]}
  detectedLines: {},      // frame_idx (str) -> {lines: [{name, image_segment, world_segment}]}
  fps: 25,
  frame: 0,
  totalFrames: 0,
  mode: "points",
  snapEnabled: true,        // sub-pixel snap on each click via /api/anchor/snap
};

const els = {
  clipSelect: document.getElementById("clip-select"),
  stadiumSelect: document.getElementById("stadium-select"),
  status: document.getElementById("status"),
  saveBtn: document.getElementById("save-btn"),
  showPitch: document.getElementById("show-pitch"),
  showLandmarkLabels: document.getElementById("show-landmark-labels"),
  showAnchors: document.getElementById("show-anchors"),
  modePoints: document.getElementById("mode-points"),
  modeLines: document.getElementById("mode-lines"),
  palette: document.getElementById("palette"),
  video: document.getElementById("video"),
  overlay: document.getElementById("overlay"),
  hint: document.getElementById("hint"),
  videoStack: document.getElementById("video-stack"),
  prevBtn: document.getElementById("prev-btn"),
  playBtn: document.getElementById("play-btn"),
  nextBtn: document.getElementById("next-btn"),
  seek: document.getElementById("seek"),
  frameInput: document.getElementById("frame-input"),
  frameInfo: document.getElementById("frame-info"),
  addAnchorBtn: document.getElementById("add-anchor-btn"),
  snapToggle: document.getElementById("snap-toggle"),
  showDetectedLines: document.getElementById("show-detected-lines"),
  anchorList: document.getElementById("anchor-list"),
  confStrip: document.getElementById("conf-strip"),
  confCanvas: document.getElementById("conf-canvas"),
};

// ── HTTP helpers ────────────────────────────────────────────────────
async function fetchJson(url, opts) {
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error(`${url} → ${res.status}`);
  return await res.json();
}

function setStatus(msg, color = "#94a3b8") {
  els.status.textContent = msg;
  els.status.style.color = color;
}

// ── Init ────────────────────────────────────────────────────────────
async function init() {
  try {
    const [shots, lms, pls, stadiums] = await Promise.all([
      fetchJson("/api/output/shots"),
      fetchJson("/landmarks"),
      fetchJson("/pitch_lines"),
      fetchJson("/stadiums").catch(() => ({ stadiums: [] })),
    ]);
    state.landmarks = lms.landmarks || [];
    state.pitchLines = pls.lines || [];
    populateStadiumDropdown(stadiums.stadiums || []);
    renderPalette();

    const ids = shots.shots || [];
    els.clipSelect.innerHTML = "";
    if (ids.length === 0) {
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "(no clips found)";
      els.clipSelect.appendChild(opt);
      setStatus("Run prepare_shots first", "#f87171");
      return;
    }
    for (const id of ids) {
      const opt = document.createElement("option");
      opt.value = id;
      opt.textContent = id;
      els.clipSelect.appendChild(opt);
    }
    els.clipSelect.addEventListener("change", () => loadClip(els.clipSelect.value));

    // Stadium dropdown changes refetch the line catalogue with the
    // stadium-derived mow stripes merged in. Persist to anchors.json on
    // the next Save Anchors click.
    els.stadiumSelect.addEventListener("change", async () => {
      state.stadium = els.stadiumSelect.value || "";
      await refreshPitchLines();
      renderPalette();
    });

    // Try to default to clip referenced by existing anchors.json
    const anchors = await fetchJson("/anchors").catch(() => null);
    let defaultId = ids[0];
    if (anchors && anchors.clip_id && ids.includes(anchors.clip_id)) {
      defaultId = anchors.clip_id;
    }
    if (anchors && anchors.stadium) {
      state.stadium = anchors.stadium;
      els.stadiumSelect.value = anchors.stadium;
      await refreshPitchLines();
    }
    els.clipSelect.value = defaultId;
    await loadClip(defaultId);
  } catch (err) {
    setStatus("Init failed: " + err.message, "#f87171");
  }
}

function populateStadiumDropdown(items) {
  // Preserve any pre-selected value (e.g. from anchors.json) when
  // re-populating.
  const previous = els.stadiumSelect.value;
  els.stadiumSelect.innerHTML = "";
  const noneOpt = document.createElement("option");
  noneOpt.value = "";
  noneOpt.textContent = "(no stadium)";
  els.stadiumSelect.appendChild(noneOpt);
  for (const s of items) {
    const opt = document.createElement("option");
    opt.value = s.id;
    opt.textContent = s.display_name || s.id;
    els.stadiumSelect.appendChild(opt);
  }
  if (previous) els.stadiumSelect.value = previous;
}

async function refreshPitchLines() {
  // Re-fetch the line catalogue for the active stadium so the palette
  // includes (or excludes) mow-stripe entries as appropriate.
  const url = state.stadium
    ? `/pitch_lines?stadium=${encodeURIComponent(state.stadium)}`
    : "/pitch_lines";
  const pls = await fetchJson(url).catch(() => ({ lines: [] }));
  state.pitchLines = pls.lines || [];
}

async function loadClip(clipId) {
  if (!clipId) return;
  state.clipId = clipId;
  state.anchors = new Map();
  state.cameraTrack = null;

  els.video.src = `/api/video/${clipId}`;
  await new Promise((resolve) => {
    if (els.video.readyState >= 1) resolve();
    else els.video.addEventListener("loadedmetadata", resolve, { once: true });
  });

  // Width/height in pixels from the video element
  const vw = els.video.videoWidth || 0;
  const vh = els.video.videoHeight || 0;
  state.imageSize = [vw, vh];

  // Default fps is 30 (broadcast standard); refined when camera_track.json
  // loads with the actual clip fps.
  state.fps = 30;

  // Estimate total frames from duration. Recomputed in loadCameraTrack
  // once the real fps is known.
  state.totalFrames = Math.max(1, Math.round(els.video.duration * state.fps));
  els.seek.max = String(state.totalFrames - 1);
  els.frameInput.max = String(state.totalFrames - 1);

  resizeOverlay();

  // Load anchors + camera track concurrently
  await Promise.all([loadAnchors(), loadCameraTrack(), loadDetectedLines()]);

  await seekToFrame(0);
  setStatus(`Loaded ${clipId} (${vw}×${vh})`, "#86efac");
}

async function loadAnchors() {
  try {
    const data = await fetchJson(`/anchors/${state.clipId}`);
    if (data && data.clip_id === state.clipId) {
      state.anchors = new Map();
      for (const a of data.anchors || []) {
        state.anchors.set(a.frame, {
          points: a.landmarks || [],
          lines: a.lines || [],
        });
      }
      if (data.image_size && data.image_size[0] > 0) {
        state.imageSize = data.image_size;
      }
      // Sync stadium dropdown + line catalogue if anchors.json carries a
      // stadium reference. Empty string means "no stadium" — preserve
      // whatever the user picked manually before this clip was loaded.
      if (data.stadium) {
        state.stadium = data.stadium;
        els.stadiumSelect.value = data.stadium;
        await refreshPitchLines();
        renderPalette();
      }
    }
  } catch (_) { /* no anchors yet */ }
  renderAnchorList();
}

async function loadCameraTrack() {
  try {
    // Per-shot fetch — without ``?shot=`` the server falls back to the
    // first shot's track, which makes the projected-pitch overlay
    // silently disappear whenever the operator works on any other shot.
    const data = await fetchJson(
      `/camera/track?shot=${encodeURIComponent(state.clipId)}`,
    );
    if (data && data.clip_id === state.clipId && (data.frames || []).length > 0) {
      state.cameraTrack = data;
      if (data.fps && data.fps > 0) {
        state.fps = data.fps;
        // Recompute total frames from the *actual* fps and the video's
        // duration, not from the camera_track frame count (which only
        // covers the frames between the first and last anchor — typically
        // a subset of the clip).
        const fromDuration = Math.round(els.video.duration * state.fps);
        state.totalFrames = Math.max(fromDuration, data.frames.length);
        els.seek.max = String(state.totalFrames - 1);
        els.frameInput.max = String(state.totalFrames - 1);
      }
    }
  } catch (_) { /* no camera track yet */ }
  renderConfStrip();
}

async function loadDetectedLines() {
  // Optional debug side-output from the camera stage's line_extraction
  // pass. Absent (empty frames) on clips that didn't run line extraction.
  try {
    const data = await fetchJson(
      `/camera/detected-lines?shot=${encodeURIComponent(state.clipId)}`,
    );
    state.detectedLines = (data && data.frames) ? data.frames : {};
  } catch (_) {
    state.detectedLines = {};
  }
}

// ── Palette ─────────────────────────────────────────────────────────
function renderPalette() {
  els.palette.innerHTML = "";
  if (state.mode === "points") {
    for (const lm of state.landmarks) {
      const row = document.createElement("div");
      row.className = "landmark-row";
      row.dataset.name = lm.name;
      const xyz = lm.world_xyz.map((v) => v.toFixed(1)).join(",");
      row.innerHTML = `
        <span class="lm-name">${lm.name}</span>
        <span class="lm-coord">${xyz}</span>
      `;
      row.addEventListener("click", () => selectLandmark(lm.name));
      els.palette.appendChild(row);
    }
  } else {
    // Split into "mowing" (stadium-derived) and everything else so the
    // dynamic mow-stripe entries don't bury the standard pitch lines.
    const mow = state.pitchLines.filter((ln) => ln.category === "mowing");
    const others = state.pitchLines.filter((ln) => ln.category !== "mowing");
    appendLineGroup(others, null);
    if (mow.length > 0) {
      appendLineGroup(mow, "Mowing stripes");
    }
  }
}

function appendLineGroup(lines, heading) {
  if (heading) {
    const h = document.createElement("div");
    h.style.cssText = "padding:8px 12px 4px;font-size:11px;color:#94a3b8;letter-spacing:0.05em;text-transform:uppercase;border-top:1px solid #1f2937;margin-top:6px;";
    h.textContent = heading;
    els.palette.appendChild(h);
  }
  for (const ln of lines) {
    const row = document.createElement("div");
    row.className = "landmark-row";
    row.dataset.name = ln.name;
    let label;
    if (ln.world_segment) {
      const a = ln.world_segment[0].map((v) => v.toFixed(1)).join(",");
      const b = ln.world_segment[1].map((v) => v.toFixed(1)).join(",");
      label = `${a} → ${b}`;
    } else if (ln.world_direction) {
      const d = ln.world_direction.map((v) => v.toFixed(1)).join(",");
      label = `direction (${d}) — VP`;
    } else {
      label = "(unknown)";
    }
    row.innerHTML = `
      <span class="lm-name">${ln.name}</span>
      <span class="lm-coord" style="color:#fef08a;">${label}</span>
    `;
    row.addEventListener("click", () => selectLine(ln.name));
    els.palette.appendChild(row);
  }
}

function selectLandmark(name) {
  state.selectedLandmark = name;
  for (const row of els.palette.children) {
    row.classList.toggle("selected", row.dataset.name === name);
  }
  els.hint.style.display = "";
  els.hint.textContent = `Click on the video to place "${name}"`;
}

function clearLandmarkSelection() {
  state.selectedLandmark = null;
  for (const row of els.palette.children) row.classList.remove("selected");
  els.hint.style.display = "none";
}

function selectLine(name) {
  state.selectedLine = name;
  state.pendingLineStart = null;
  for (const row of els.palette.children) {
    row.classList.toggle("selected", row.dataset.name === name);
  }
  els.hint.style.display = "";
  els.hint.textContent = `Click ONE end of "${name}", then the OTHER end`;
  redrawOverlay();
}

function clearLineSelection() {
  state.selectedLine = null;
  state.pendingLineStart = null;
  for (const row of els.palette.children) row.classList.remove("selected");
  els.hint.style.display = "none";
}

function setMode(mode) {
  state.mode = mode;
  state.selectedLandmark = null;
  state.selectedLine = null;
  state.pendingLineStart = null;
  els.hint.style.display = "none";
  renderPalette();
  redrawOverlay();
}

// ── Frame navigation ────────────────────────────────────────────────
function frameToTime(frame) {
  return frame / state.fps;
}

async function seekToFrame(frame) {
  frame = Math.max(0, Math.min(state.totalFrames - 1, frame | 0));
  state.frame = frame;
  els.video.currentTime = frameToTime(frame);

  // Wait for the seek to settle so the canvas overlay aligns with the
  // displayed frame. Falls back to a short timeout if seeked never fires.
  await new Promise((resolve) => {
    let done = false;
    const finish = () => { if (!done) { done = true; resolve(); } };
    els.video.addEventListener("seeked", finish, { once: true });
    setTimeout(finish, 250);
  });

  els.seek.value = String(frame);
  els.frameInput.value = String(frame);
  els.frameInfo.textContent = `${frame} / ${Math.max(0, state.totalFrames - 1)}`;
  redrawOverlay();
  highlightAnchorList();
}

// ── Canvas overlay ──────────────────────────────────────────────────
function resizeOverlay() {
  const rect = els.video.getBoundingClientRect();
  // Backing-store in image (natural) pixels so drawing in image-space
  // coordinates is sharp at any display scale. Fall back to display
  // pixels when the image size hasn't been determined yet (before
  // ``loadedmetadata`` fires).
  if (state.imageSize && state.imageSize[0] > 0 && state.imageSize[1] > 0) {
    els.overlay.width = state.imageSize[0];
    els.overlay.height = state.imageSize[1];
  } else {
    els.overlay.width = rect.width;
    els.overlay.height = rect.height;
  }
  // CSS size matches the displayed video size.
  els.overlay.style.width = `${rect.width}px`;
  els.overlay.style.height = `${rect.height}px`;
}

function videoEventToImageXY(ev) {
  const rect = els.overlay.getBoundingClientRect();
  if (rect.width === 0 || rect.height === 0) return [0, 0];
  const cx = ev.clientX - rect.left;
  const cy = ev.clientY - rect.top;
  // Convert from displayed coords to image coords
  const sx = state.imageSize[0] / rect.width;
  const sy = state.imageSize[1] / rect.height;
  return [cx * sx, cy * sy];
}

function redrawOverlay() {
  const ctx = els.overlay.getContext("2d");
  ctx.clearRect(0, 0, els.overlay.width, els.overlay.height);

  // Draw projected pitch lines if camera track is available for this frame.
  // Toggle off via the "projected pitch" checkbox to verify dot positions
  // independently of the camera-stage overlay.
  if (els.showPitch && els.showPitch.checked) {
    drawProjectedPitch(ctx);
  }

  // Detected painted lines from the camera-stage line_extraction pass.
  // Drawn in cyan so they contrast with the yellow catalogue projection
  // — overlapping cyan/yellow means the line-fit is good for that frame.
  if (els.showDetectedLines && els.showDetectedLines.checked) {
    drawDetectedLines(ctx);
  }

  // Catalogue landmark name labels — projected onto the frame using the
  // current camera, so the user can see which painted feature each
  // catalogue entry corresponds to (e.g. "centre_circle_top",
  // "right_18yd_far"). Off by default; toggle via the "landmark labels"
  // checkbox.
  if (els.showLandmarkLabels && els.showLandmarkLabels.checked) {
    drawLandmarkLabels(ctx);
  }

  // Draw landmark dots and line annotations if at an anchor frame.
  // Backing-store is in image pixels (see resizeOverlay) so x/y are in
  // image-space coordinates. Stroke widths are scaled by the natural→display
  // ratio so they appear at a consistent thickness on screen regardless of zoom.
  const anchorsVisible = !els.showAnchors || els.showAnchors.checked;
  const anchor = anchorsVisible ? state.anchors.get(state.frame) : null;
  if (anchor) {
    const rect = els.overlay.getBoundingClientRect();
    const scale = state.imageSize[0] > 0 && rect.width > 0
      ? state.imageSize[0] / rect.width
      : 1;
    const dotR = 4 * scale;
    const ringR = 8 * scale;
    const lineW = 2 * scale;

    // Lines first (drawn beneath points so anchor dots stay on top)
    for (const ln of anchor.lines || []) {
      const [[x1, y1], [x2, y2]] = ln.image_segment;
      ctx.beginPath();
      ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
      ctx.lineWidth = lineW * 1.5;
      ctx.strokeStyle = "#facc15";  // amber/yellow
      ctx.stroke();
      // Endpoint markers
      for (const [x, y] of [[x1, y1], [x2, y2]]) {
        ctx.beginPath();
        ctx.arc(x, y, dotR * 0.8, 0, 2 * Math.PI);
        ctx.fillStyle = "#facc15";
        ctx.fill();
      }
      // Label near segment midpoint
      const mx = (x1 + x2) / 2;
      const my = (y1 + y2) / 2;
      ctx.font = `${11 * scale}px -apple-system, Segoe UI, sans-serif`;
      ctx.fillStyle = "#fef9c3";
      ctx.strokeStyle = "rgba(0,0,0,0.7)";
      ctx.lineWidth = 3 * scale;
      ctx.strokeText(ln.name, mx + 6 * scale, my - 4 * scale);
      ctx.fillText(ln.name, mx + 6 * scale, my - 4 * scale);
    }

    // In-progress line: first click placed, waiting for second click.
    if (state.pendingLineStart) {
      const [px, py] = state.pendingLineStart;
      ctx.beginPath();
      ctx.arc(px, py, dotR, 0, 2 * Math.PI);
      ctx.fillStyle = "#facc15";
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px, py, ringR, 0, 2 * Math.PI);
      ctx.lineWidth = lineW;
      ctx.strokeStyle = "#fef08a";
      ctx.stroke();
    }

    // Points
    for (const lm of anchor.points || []) {
      const [x, y] = lm.image_xy;
      ctx.beginPath();
      ctx.arc(x, y, dotR, 0, 2 * Math.PI);
      ctx.fillStyle = "#22d3ee";
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x, y, ringR, 0, 2 * Math.PI);
      ctx.lineWidth = lineW;
      ctx.strokeStyle = "#fff";
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x - ringR * 1.5, y); ctx.lineTo(x + ringR * 1.5, y);
      ctx.moveTo(x, y - ringR * 1.5); ctx.lineTo(x, y + ringR * 1.5);
      ctx.lineWidth = lineW * 0.5;
      ctx.strokeStyle = "rgba(255, 255, 255, 0.6)";
      ctx.stroke();
      ctx.font = `${12 * scale}px -apple-system, Segoe UI, sans-serif`;
      ctx.fillStyle = "#fff";
      ctx.strokeStyle = "rgba(0,0,0,0.7)";
      ctx.lineWidth = 3 * scale;
      ctx.strokeText(lm.name, x + ringR + 4 * scale, y - 4 * scale);
      ctx.fillText(lm.name, x + ringR + 4 * scale, y - 4 * scale);
    }
  }
}

function drawDetectedLines(ctx) {
  // Each detected line stores image_segment = [[u1,v1],[u2,v2]] directly
  // in image-pixel coords, so no projection is needed — just stroke it.
  const frameLines = state.detectedLines[String(state.frame)];
  if (!frameLines || !frameLines.lines || frameLines.lines.length === 0) return;
  const rect = els.overlay.getBoundingClientRect();
  const scale = state.imageSize[0] > 0 && rect.width > 0
    ? state.imageSize[0] / rect.width
    : 1;
  ctx.save();
  ctx.lineWidth = 2 * scale;
  ctx.strokeStyle = "rgba(34, 211, 238, 0.9)";  // cyan
  ctx.font = `${10 * scale}px -apple-system, Segoe UI, sans-serif`;
  for (const ln of frameLines.lines) {
    const [[x1, y1], [x2, y2]] = ln.image_segment;
    ctx.beginPath();
    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawProjectedPitch(ctx) {
  const track = state.cameraTrack;
  if (!track || !track.frames || track.frames.length === 0) return;
  const cf = track.frames.find((f) => f.frame === state.frame)
            || track.frames[Math.min(track.frames.length - 1, state.frame)];
  if (!cf) return;
  // Prefer per-frame t (CameraFrame.t) when present; fall back to the
  // clip-shared t_world for older camera_track.json files.
  const K = cf.K, R = cf.R, t = cf.t || track.t_world;
  const distortion = track.distortion || [0, 0];
  if (!K || !R || !t) return;

  const polylines = pitchPolylines();
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = "rgba(255, 200, 0, 0.55)";
  for (const poly of polylines) {
    ctx.beginPath();
    let drawing = false;
    for (const p of poly) {
      const proj = projectPoint(p, K, R, t, distortion);
      if (!proj) { drawing = false; continue; }
      if (!drawing) { ctx.moveTo(proj[0], proj[1]); drawing = true; }
      else ctx.lineTo(proj[0], proj[1]);
    }
    ctx.stroke();
  }
}

function drawLandmarkLabels(ctx) {
  const track = state.cameraTrack;
  if (!track || !track.frames || track.frames.length === 0) return;
  if (!state.landmarks || state.landmarks.length === 0) return;
  const cf = track.frames.find((f) => f.frame === state.frame)
            || track.frames[Math.min(track.frames.length - 1, state.frame)];
  if (!cf) return;
  const K = cf.K, R = cf.R, t = cf.t || track.t_world;
  const distortion = track.distortion || [0, 0];
  if (!K || !R || !t) return;

  const rect = els.overlay.getBoundingClientRect();
  const scale = state.imageSize[0] > 0 && rect.width > 0
    ? state.imageSize[0] / rect.width
    : 1;
  const dotR = 3 * scale;
  const W = state.imageSize[0], H = state.imageSize[1];

  ctx.font = `${11 * scale}px -apple-system, Segoe UI, sans-serif`;
  ctx.lineWidth = 3 * scale;
  for (const lm of state.landmarks) {
    const proj = projectPoint(lm.world_xyz, K, R, t, distortion);
    if (!proj) continue;
    const [u, v] = proj;
    if (u < 0 || u > W || v < 0 || v > H) continue;
    ctx.beginPath();
    ctx.arc(u, v, dotR, 0, 2 * Math.PI);
    ctx.fillStyle = "rgba(255, 200, 0, 0.85)";
    ctx.fill();
    ctx.strokeStyle = "rgba(0, 0, 0, 0.7)";
    ctx.strokeText(lm.name, u + dotR + 3 * scale, v - 3 * scale);
    ctx.fillStyle = "rgba(255, 220, 120, 0.95)";
    ctx.fillText(lm.name, u + dotR + 3 * scale, v - 3 * scale);
  }
}

function applyRadialDistortion(uv, distortion, K) {
  // OpenCV-compatible 2-coefficient radial distortion. Returns the
  // distorted pixel (u', v') given the linear-pinhole projection (u, v).
  // Used to make the projected pitch overlay match the raw video frame
  // when the camera has non-zero radial distortion.
  if (!distortion || (distortion[0] === 0 && distortion[1] === 0)) return uv;
  const fx = K[0][0], fy = K[1][1];
  const cx = K[0][2], cy = K[1][2];
  const x = (uv[0] - cx) / fx;
  const y = (uv[1] - cy) / fy;
  const r2 = x * x + y * y;
  const k1 = distortion[0], k2 = distortion[1];
  const factor = 1 + k1 * r2 + k2 * r2 * r2;
  return [cx + fx * x * factor, cy + fy * y * factor];
}

function projectPoint(p, K, R, t, distortion) {
  // OpenCV extrinsic convention (matches src/utils/anchor_solver.py): R is
  // world->camera rotation, t is the world-frame origin expressed in the
  // camera frame. So the camera-frame point is cam = R @ P + t — NOT
  // R @ (P - t). The world-frame camera position is C = -R^T @ t.
  const cx = R[0][0]*p[0] + R[0][1]*p[1] + R[0][2]*p[2] + t[0];
  const cy = R[1][0]*p[0] + R[1][1]*p[1] + R[1][2]*p[2] + t[1];
  const cz = R[2][0]*p[0] + R[2][1]*p[1] + R[2][2]*p[2] + t[2];
  if (cz <= 0.05) return null;
  const u = (K[0][0]*cx + K[0][1]*cy + K[0][2]*cz) / cz;
  const v = (K[1][0]*cx + K[1][1]*cy + K[1][2]*cz) / cz;
  const distorted = applyRadialDistortion([u, v], distortion, K);
  // Grazing incidence: cz > 0.05 passes the behind-camera guard above, but
  // a far-off-axis point near the camera horizon projects to a moderately
  // large pixel coord that radial distortion then amplifies to millions
  // (the k2*r^4 term dominates and flips sign for large r) — the canvas
  // would draw a wild line slashing across the frame (the "near_touchline
  // going crazy" bug). Guard the FINAL post-distortion coordinate; the
  // pre-distortion value can be small enough to slip a naive guard.
  if (!Number.isFinite(distorted[0]) || !Number.isFinite(distorted[1]) ||
      Math.abs(distorted[0]) > 1e5 || Math.abs(distorted[1]) > 1e5) return null;
  return distorted;
}

// Subdivide a polyline so every edge becomes ~1 m sample points. A long
// line (e.g. a 105 m touchline) often has BOTH catalogue endpoints off
// the frame — one off-screen, one past the camera horizon — so a 2-point
// projection has nothing to draw even when the line's middle is plainly
// in view. Sampling every metre means drawProjectedPitch projects points
// along the line: the visible run draws, points past the horizon return
// null and simply break the polyline there.
function densifyPolyline(poly, stepM) {
  if (poly.length < 2) return poly;
  const out = [];
  for (let i = 0; i < poly.length - 1; i++) {
    const a = poly[i], b = poly[i + 1];
    const dx = b[0]-a[0], dy = b[1]-a[1], dz = b[2]-a[2];
    const segs = Math.max(1, Math.round(Math.hypot(dx, dy, dz) / stepM));
    for (let k = 0; k < segs; k++) {
      const s = k / segs;
      out.push([a[0]+dx*s, a[1]+dy*s, a[2]+dz*s]);
    }
  }
  out.push(poly[poly.length - 1]);
  return out;
}

// FIFA pitch outline (subset — enough to verify camera registration).
function pitchPolylines() {
  const L = 105.0, W = 68.0;
  const polys = [];
  // Touchlines + goal lines
  polys.push([[0,0,0],[L,0,0]]);
  polys.push([[0,W,0],[L,W,0]]);
  polys.push([[0,0,0],[0,W,0]]);
  polys.push([[L,0,0],[L,W,0]]);
  // Halfway line
  polys.push([[L/2,0,0],[L/2,W,0]]);
  // 18-yd boxes
  polys.push([[0,13.84,0],[16.5,13.84,0],[16.5,54.16,0],[0,54.16,0]]);
  polys.push([[L,13.84,0],[L-16.5,13.84,0],[L-16.5,54.16,0],[L,54.16,0]]);
  // Centre circle
  const cc = [];
  for (let a = 0; a <= Math.PI * 2 + 0.01; a += Math.PI / 30) {
    cc.push([L/2 + 9.15 * Math.cos(a), W/2 + 9.15 * Math.sin(a), 0]);
  }
  polys.push(cc);
  return polys.map((p) => densifyPolyline(p, 1.0));
}

// ── Click placement ─────────────────────────────────────────────────
function ensureAnchor(frame) {
  let cur = state.anchors.get(frame);
  if (!cur) {
    cur = { points: [], lines: [] };
    state.anchors.set(frame, cur);
  }
  if (!cur.points) cur.points = [];
  if (!cur.lines) cur.lines = [];
  return cur;
}

async function snapClick(frame, click, mode) {
  // Ask the server to refine the click to sub-pixel via /api/anchor/snap.
  // Falls back to the raw click if the request fails or snap is disabled.
  if (!state.snapEnabled) return { xy: click, snapped: false, mode_used: "off", confidence: 0 };
  try {
    const res = await fetch("/api/anchor/snap", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        shot_id: state.clipId, frame, click, mode,
      }),
    });
    if (!res.ok) return { xy: click, snapped: false, mode_used: "off", confidence: 0 };
    return await res.json();
  } catch (e) {
    return { xy: click, snapped: false, mode_used: "off", confidence: 0 };
  }
}

els.overlay.addEventListener("click", async (ev) => {
  const [rawX, rawY] = videoEventToImageXY(ev);

  if (state.mode === "points") {
    if (!state.selectedLandmark) return;
    const lm = state.landmarks.find((l) => l.name === state.selectedLandmark);
    if (!lm) return;
    // Sub-pixel refinement: snap to line intersection (most landmarks) or
    // single-line projection (corner-flag-top, penalty-spot). The server's
    // /api/anchor/snap heuristic picks the right mode based on what's
    // detected in the local image patch.
    const snap = await snapClick(state.frame, [rawX, rawY], "auto");
    const [x, y] = snap.xy;
    if (snap.snapped) {
      setStatus(`Snapped to ${snap.mode_used} (conf ${snap.confidence.toFixed(2)})`, "#22c55e");
    }
    const obs = { name: lm.name, image_xy: [x, y], world_xyz: lm.world_xyz };
    const cur = ensureAnchor(state.frame);
    const idx = cur.points.findIndex((o) => o.name === obs.name);
    if (idx >= 0) cur.points[idx] = obs; else cur.points.push(obs);
    clearLandmarkSelection();
    redrawOverlay();
    renderAnchorList();
    return;
  }

  // Lines mode: 2-click sequence (start → end)
  if (!state.selectedLine) return;
  const ln = state.pitchLines.find((l) => l.name === state.selectedLine);
  if (!ln) return;

  if (state.pendingLineStart === null) {
    // Snap line-endpoint clicks too: project onto the nearest painted line.
    const snap = await snapClick(state.frame, [rawX, rawY], "line_endpoint");
    state.pendingLineStart = snap.xy;
    setStatus(`Now click the OTHER end of "${ln.name}"`, "#facc15");
    redrawOverlay();
    return;
  }
  // Second click — complete the segment (also snap)
  const snap = await snapClick(state.frame, [rawX, rawY], "line_endpoint");
  const obs = {
    name: ln.name,
    image_segment: [state.pendingLineStart, snap.xy],
    world_segment: ln.world_segment || null,
    world_direction: ln.world_direction || null,
  };
  const cur = ensureAnchor(state.frame);
  if (obs.world_direction !== null) {
    cur.lines.push(obs);
  } else {
    const idx = cur.lines.findIndex((o) => o.name === obs.name);
    if (idx >= 0) cur.lines[idx] = obs; else cur.lines.push(obs);
  }
  state.pendingLineStart = null;
  clearLineSelection();
  redrawOverlay();
  renderAnchorList();
});

if (els.snapToggle) {
  els.snapToggle.addEventListener("change", (ev) => {
    state.snapEnabled = !!ev.target.checked;
  });
}

els.addAnchorBtn.addEventListener("click", () => {
  if (!state.anchors.has(state.frame)) {
    state.anchors.set(state.frame, { points: [], lines: [] });
    renderAnchorList();
  }
});

// ── Anchor list ─────────────────────────────────────────────────────
function renderAnchorList() {
  els.anchorList.innerHTML = "";
  const frames = [...state.anchors.keys()].sort((a, b) => a - b);
  if (frames.length === 0) {
    els.anchorList.innerHTML = '<div class="anchor-empty">No anchors yet — select a landmark and click on the video.</div>';
    return;
  }
  for (const f of frames) {
    const row = document.createElement("div");
    row.className = "anchor-row" + (f === state.frame ? " current" : "");
    const a = state.anchors.get(f) || { points: [], lines: [] };
    const np = (a.points || []).length;
    const nl = (a.lines || []).length;
    const lineSummary = nl ? ` + ${nl} line${nl === 1 ? "" : "s"}` : "";
    row.innerHTML = `
      <span>Frame ${f}</span>
      <span class="lm-count">${np} pt${np === 1 ? "" : "s"}${lineSummary}</span>
      <button class="del-btn" title="Delete anchor">×</button>
    `;
    row.addEventListener("click", (ev) => {
      if (ev.target.classList.contains("del-btn")) {
        state.anchors.delete(f);
        renderAnchorList();
        redrawOverlay();
        return;
      }
      seekToFrame(f);
    });
    els.anchorList.appendChild(row);
  }
}

function highlightAnchorList() {
  for (const row of els.anchorList.children) {
    row.classList.toggle(
      "current",
      row.firstElementChild && row.firstElementChild.textContent === `Frame ${state.frame}`
    );
  }
}

// ── Confidence timeline ─────────────────────────────────────────────
function renderConfStrip() {
  const c = els.confCanvas;
  const ctx = c.getContext("2d");
  const w = els.confStrip.clientWidth;
  const h = els.confStrip.clientHeight;
  c.width = w; c.height = h;
  ctx.fillStyle = "#0a0c12";
  ctx.fillRect(0, 0, w, h);

  if (!state.cameraTrack || !state.cameraTrack.frames || state.cameraTrack.frames.length === 0) {
    ctx.fillStyle = "#4b5563";
    ctx.font = "11px -apple-system, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("(no camera track yet — run the camera stage)", w / 2, h / 2 + 4);
    return;
  }

  const N = state.cameraTrack.frames.length;
  const barW = Math.max(1, w / N);
  for (let i = 0; i < N; i++) {
    const f = state.cameraTrack.frames[i];
    const c01 = Math.max(0, Math.min(1, f.confidence || 0));
    const r = Math.round(255 * (1 - c01));
    const g = Math.round(200 * c01 + 30);
    const b = 60;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(i * barW, 0, Math.ceil(barW), h);
    if (f.is_anchor) {
      ctx.fillStyle = "#a855f7";
      ctx.fillRect(i * barW, 0, Math.ceil(barW), 4);
    }
  }
  // Cursor
  const cx = (state.frame / Math.max(1, N - 1)) * w;
  ctx.fillStyle = "rgba(255,255,255,0.9)";
  ctx.fillRect(Math.max(0, cx - 1), 0, 2, h);
}

els.confStrip.addEventListener("click", (ev) => {
  if (!state.cameraTrack) return;
  const rect = els.confStrip.getBoundingClientRect();
  const t = (ev.clientX - rect.left) / rect.width;
  const N = state.cameraTrack.frames.length;
  const fi = Math.round(t * (N - 1));
  seekToFrame(fi);
});

// ── Save ────────────────────────────────────────────────────────────
els.saveBtn.addEventListener("click", async () => {
  const payload = {
    clip_id: state.clipId,
    image_size: state.imageSize,
    stadium: state.stadium || null,
    anchors: [...state.anchors.entries()]
      .sort((a, b) => a[0] - b[0])
      .map(([frame, a]) => ({
        frame,
        landmarks: (a.points || []).map((lm) => ({
          name: lm.name,
          image_xy: lm.image_xy,
          world_xyz: lm.world_xyz,
        })),
        lines: (a.lines || []).map((ln) => ({
          name: ln.name,
          image_segment: ln.image_segment,
          world_segment: ln.world_segment || null,
          world_direction: ln.world_direction || null,
        })),
      })),
  };
  els.saveBtn.disabled = true;
  setStatus("Saving…", "#fbbf24");
  try {
    const res = await fetch(`/anchors/${state.clipId}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`${res.status}`);
    const j = await res.json();
    setStatus(`Saved ${j.count} anchors`, "#86efac");
  } catch (err) {
    setStatus("Save failed: " + err.message, "#f87171");
  } finally {
    els.saveBtn.disabled = false;
  }
});

// ── Rerun camera tracking ───────────────────────────────────────────
// Auto-saves the current anchors, then dispatches a single-stage,
// single-shot pipeline run via /api/run-shot. Surfaces the job log
// inline; on completion offers a link to the viewer for that shot.
const rerunCameraBtn = document.getElementById("rerun-camera-btn");
rerunCameraBtn.addEventListener("click", async () => {
  if (!state.clipId) {
    setStatus("No shot selected", "#f87171");
    return;
  }
  rerunCameraBtn.disabled = true;
  const originalText = "Rerun camera tracking";
  rerunCameraBtn.textContent = "Saving anchors…";
  try {
    const payload = {
      clip_id: state.clipId,
      image_size: state.imageSize,
      anchors: serialiseAnchors(),
      stadium: state.stadium || null,
    };
    const saveRes = await fetch(`/anchors/${state.clipId}`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload),
    });
    if (!saveRes.ok) throw new Error(`save failed: ${saveRes.status}`);

    rerunCameraBtn.textContent = "Running camera stage…";
    const runRes = await fetch("/api/run-shot", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({stage: "camera", shot_id: state.clipId}),
    });
    if (!runRes.ok) throw new Error(`run failed: ${runRes.status}`);
    const job = await runRes.json();
    setStatus(`Camera stage running for ${state.clipId}…`, "#fbbf24");

    // Poll job status until done/error.
    let lastStatus = "running";
    while (lastStatus === "running") {
      await new Promise(r => setTimeout(r, 500));
      const sres = await fetch(`/api/jobs/${job.job_id}/status`);
      if (!sres.ok) throw new Error(`status poll failed: ${sres.status}`);
      const s = await sres.json();
      lastStatus = s.status;
    }
    if (lastStatus === "error") {
      throw new Error("camera stage errored — see logs");
    }
    rerunCameraBtn.textContent = `Done — Open viewer`;
    rerunCameraBtn.onclick = () => {
      window.location.href = `/viewer?shot=${encodeURIComponent(state.clipId)}`;
    };
    setStatus(`Camera stage finished for ${state.clipId}`, "#86efac");
  } catch (err) {
    setStatus(`Rerun failed: ${err.message}`, "#f87171");
    rerunCameraBtn.textContent = originalText;
  } finally {
    rerunCameraBtn.disabled = false;
  }
});

// Helper used by both Save and Rerun buttons.
function serialiseAnchors() {
  const out = [];
  for (const [frame, payload] of state.anchors.entries()) {
    out.push({
      frame,
      landmarks: payload.points || [],
      lines: payload.lines || [],
    });
  }
  return out.sort((a, b) => a.frame - b.frame);
}

// ── Frame controls wiring ───────────────────────────────────────────
els.prevBtn.addEventListener("click", () => { els.video.pause(); seekToFrame(state.frame - 1); });
els.nextBtn.addEventListener("click", () => { els.video.pause(); seekToFrame(state.frame + 1); });
els.seek.addEventListener("input", () => { els.video.pause(); seekToFrame(parseInt(els.seek.value, 10)); });
els.frameInput.addEventListener("change", () => { els.video.pause(); seekToFrame(parseInt(els.frameInput.value, 10)); });

// ── Playback ─────────────────────────────────────────────────────────
// While the video is playing the per-frame state (state.frame, seek
// slider, frame-info label, anchor highlights, projected pitch overlay)
// is kept in sync via a requestAnimationFrame loop. Anchors and
// keypoints are immutable during playback, so we just re-derive the
// frame number from currentTime each tick rather than awaiting `seeked`
// the way seekToFrame does.
let playbackRafId = null;

function tickPlayback() {
  if (els.video.paused || els.video.ended) { playbackRafId = null; return; }
  const fi = Math.max(
    0,
    Math.min(state.totalFrames - 1, Math.round(els.video.currentTime * state.fps))
  );
  if (fi !== state.frame) {
    state.frame = fi;
    els.seek.value = String(fi);
    els.frameInput.value = String(fi);
    els.frameInfo.textContent = `${fi} / ${Math.max(0, state.totalFrames - 1)}`;
    redrawOverlay();
    highlightAnchorList();
  }
  playbackRafId = requestAnimationFrame(tickPlayback);
}

els.playBtn.addEventListener("click", () => {
  if (els.video.paused) els.video.play();
  else els.video.pause();
});
els.video.addEventListener("play", () => {
  els.playBtn.textContent = "⏸";
  if (!playbackRafId) playbackRafId = requestAnimationFrame(tickPlayback);
});
els.video.addEventListener("pause", () => {
  els.playBtn.textContent = "▶";
  if (playbackRafId) { cancelAnimationFrame(playbackRafId); playbackRafId = null; }
});
els.video.addEventListener("ended", () => {
  els.playBtn.textContent = "▶";
  if (playbackRafId) { cancelAnimationFrame(playbackRafId); playbackRafId = null; }
});

window.addEventListener("keydown", (ev) => {
  if (ev.target && (ev.target.tagName === "INPUT" || ev.target.tagName === "SELECT")) return;
  if (ev.key === "ArrowLeft") { ev.preventDefault(); els.video.pause(); seekToFrame(state.frame - 1); }
  else if (ev.key === "ArrowRight") { ev.preventDefault(); els.video.pause(); seekToFrame(state.frame + 1); }
  else if (ev.key === " " || ev.code === "Space") {
    ev.preventDefault();
    if (els.video.paused) els.video.play(); else els.video.pause();
  }
  else if (ev.key === "Escape") clearLandmarkSelection();
});

window.addEventListener("resize", () => {
  resizeOverlay();
  redrawOverlay();
  renderConfStrip();
});

els.video.addEventListener("loadedmetadata", () => {
  resizeOverlay();
  redrawOverlay();
});

window.addEventListener("resize", () => {
  resizeOverlay();
  redrawOverlay();
});

if (els.showPitch) {
  els.showPitch.addEventListener("change", () => redrawOverlay());
}

if (els.showLandmarkLabels) {
  els.showLandmarkLabels.addEventListener("change", () => redrawOverlay());
}

if (els.showAnchors) {
  els.showAnchors.addEventListener("change", () => redrawOverlay());
}

if (els.showDetectedLines) {
  els.showDetectedLines.addEventListener("change", () => redrawOverlay());
}

if (els.modePoints) {
  els.modePoints.addEventListener("change", () => { if (els.modePoints.checked) setMode("points"); });
}
if (els.modeLines) {
  els.modeLines.addEventListener("change", () => { if (els.modeLines.checked) setMode("lines"); });
}

init();
</script>
</body>
