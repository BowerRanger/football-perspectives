<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Perspectives — Pipeline Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    background: #0f1117;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ─────────────────────────────────────────────────── */
  #sidebar {
    width: 240px;
    min-width: 240px;
    background: #1a1d27;
    border-right: 1px solid #2d3148;
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  #sidebar-header {
    padding: 16px 16px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #64748b;
    border-bottom: 1px solid #2d3148;
  }

  .stage-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.12s;
  }
  .stage-item:hover { background: #252840; }
  .stage-item.active {
    background: #252840;
    border-left-color: #6366f1;
  }

  .stage-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    background: #4b5563;
  }
  .stage-dot.complete  { background: #22c55e; }
  .stage-dot.running   { background: #f59e0b; animation: pulse 1s infinite; }
  .stage-dot.error     { background: #ef4444; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .stage-label { font-size: 13px; color: #cbd5e1; }
  .stage-item.active .stage-label { color: #f1f5f9; font-weight: 500; }
  .stage-index { font-size: 11px; color: #64748b; margin-left: auto; }

  /* ── Sidebar links (anchor editor, etc.) ─────────────────────── */
  #sidebar-links {
    margin-top: auto;
    padding: 10px 16px 14px;
    border-top: 1px solid #2d3148;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #sidebar-links a {
    color: #cbd5e1;
    text-decoration: none;
    font-size: 12px;
    padding: 6px 8px;
    border-radius: 4px;
    background: #252840;
    border: 1px solid #2d3148;
    transition: background 0.12s;
  }
  #sidebar-links a:hover { background: #303554; color: #fff; }

  /* ── Main panel ───────────────────────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #stage-header {
    padding: 16px 24px;
    border-bottom: 1px solid #2d3148;
    display: flex;
    align-items: center;
    gap: 12px;
    background: #1a1d27;
    flex-shrink: 0;
  }

  #stage-title { font-size: 18px; font-weight: 600; color: #f1f5f9; }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-complete { background: #14532d; color: #86efac; }
  .badge-pending  { background: #1e293b; color: #64748b; }
  .badge-running  {
    background: #451a03;
    color: #fbbf24;
    animation: fp-pulse 1.4s ease-in-out infinite;
  }
  .badge-error    { background: #450a0a; color: #fca5a5; }
  .stage-dot.running { animation: fp-pulse 1.4s ease-in-out infinite; }
  @keyframes fp-pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.5; }
  }

  #main-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── Panels ───────────────────────────────────────────────────── */
  .panel {
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 8px;
    overflow: hidden;
  }

  .panel-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #64748b;
    padding: 10px 16px;
    border-bottom: 1px solid #2d3148;
  }

  .panel-body { padding: 16px; }

  .btn {
    padding: 7px 16px;
    border-radius: 5px;
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-secondary { background: #374151; color: #e2e8f0; }

  /* ── Log panel ────────────────────────────────────────────────── */
  #log-output {
    background: #0a0c12;
    border-radius: 5px;
    padding: 12px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 12px;
    line-height: 1.6;
    color: #94a3b8;
    max-height: 220px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* ── Tables ───────────────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #64748b;
    border-bottom: 1px solid #2d3148;
  }
  td { padding: 8px 12px; border-bottom: 1px solid #1e2236; color: #cbd5e1; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1e2236; }

  .cell-green { color: #22c55e; }
  .cell-amber { color: #f59e0b; }
  .cell-red   { color: #ef4444; }
  .cell-dim   { color: #4b5563; }

  /* ── Confidence bar ───────────────────────────────────────────── */
  .conf-bar-wrap {
    background: #1e293b;
    border-radius: 3px;
    height: 6px;
    width: 80px;
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }
  .conf-bar { height: 100%; border-radius: 3px; background: #6366f1; }

  .empty-note {
    color: #64748b;
    font-size: 13px;
    padding: 12px 0;
    font-style: italic;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────────────────────── -->
<div id="sidebar">
  <div id="sidebar-header">Pipeline Stages</div>
  <div id="stage-list"></div>
  <div id="sidebar-links"></div>
</div>

<!-- ── Main ─────────────────────────────────────────────────────────── -->
<div id="main">
  <div id="stage-header">
    <span id="stage-title">—</span>
    <span id="stage-badge" class="badge badge-pending">Not run</span>
    <button id="run-all-btn" class="btn btn-secondary" style="margin-left:auto;font-size:12px;">Run All</button>
    <button id="continue-btn" class="btn btn-secondary" disabled style="font-size:12px;" title="Run this stage without wiping its output directory — resumes from any cached per-player results.">Continue</button>
    <button id="rerun-btn" class="btn btn-primary" disabled style="font-size:12px;">Re-run Stage</button>
  </div>

  <div id="main-body">

    <div class="panel" id="log-panel" style="display:none;position:sticky;top:0;z-index:20;max-height:45vh;overflow:hidden;background:#0f172a;border:1px solid #1f2937;">
      <div class="panel-title" style="display:flex;align-items:center;gap:8px;">
        <span>Log Output</span>
        <span id="log-status" style="font-size:11px;color:#64748b;"></span>
        <button id="log-close-btn" title="Dismiss log" style="margin-left:auto;background:#334155;color:#e2e8f0;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px;">✕</button>
      </div>
      <div class="panel-body" style="padding:0;max-height:calc(45vh - 36px);overflow-y:auto;">
        <pre id="log-output" style="white-space:pre-wrap;"></pre>
      </div>
    </div>

    <div id="output-panel"></div>

  </div>
</div>

<script>
"use strict";

// ── State ─────────────────────────────────────────────────────────────
let currentStage = null;
let currentStages = [];   // [{name, index, complete}]
let activeSource = null;  // current EventSource
// Live state per stage — overrides the on-disk "complete" flag so a
// stage that's mid-run doesn't appear as Complete just because some
// output has been written to disk already.
//   { stage_name: "running" | "error" }
const stageState = {};
let runningStage = null;  // which stage's Run/Continue is in flight

// Stage dependency graph for the broadcast-mono pipeline.
// Hard dependencies only — stages that flat-out can't produce useful
// output without the listed predecessor. Soft dependencies (e.g. export
// reads hmr_world's .npz files but tolerates partial output, so the
// operator can preview after running just one player) are NOT listed
// here so the run buttons stay enabled for fast iteration.
const STAGE_DEPS = {
  prepare_shots: [],
  tracking:      ["prepare_shots"],
  camera:        ["prepare_shots"],
  hmr_world:     ["tracking", "camera"],
  refined_poses: ["hmr_world"],
  // Ball uses refined_poses' cleaned bone positions for player_touch
  // anchors when available (falls back to raw hmr_world otherwise).
  ball:          ["camera", "refined_poses"],
  export:        ["camera"],
};

// ── Initialise ───────────────────────────────────────────────────────
async function init() {
  await loadStages();
}

// ── Sidebar ──────────────────────────────────────────────────────────
async function loadStages() {
  const res = await fetch("/api/stages");
  if (!res.ok) return;
  currentStages = await res.json();
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById("stage-list");
  list.innerHTML = "";
  for (const s of currentStages) {
    const item = document.createElement("div");
    item.className = "stage-item" + (s.name === currentStage ? " active" : "");
    item.dataset.stage = s.name;
    item.onclick = () => selectStage(s.name);

    const liveState = stageState[s.name];
    const dotCls = liveState === "running"
      ? " running"
      : liveState === "error"
        ? " error"
        : (s.complete ? " complete" : "");
    const dot = document.createElement("span");
    dot.className = "stage-dot" + dotCls;
    dot.id = `dot-${s.name}`;

    const label = document.createElement("span");
    label.className = "stage-label";
    label.textContent = humanizeStageName(s.name);

    const idx = document.createElement("span");
    idx.className = "stage-index";
    idx.textContent = s.index;

    item.appendChild(dot);
    item.appendChild(label);
    item.appendChild(idx);
    list.appendChild(item);
  }

  if (!currentStage) {
    // Restore the stage the operator was viewing before navigating away
    // (e.g. into the anchor editor or 3D viewer); fall back to the first
    // not-yet-complete stage on a fresh visit.
    let initial = null;
    try {
      const stored = localStorage.getItem("fp.currentStage");
      if (stored && currentStages.some((s) => s.name === stored)) initial = stored;
    } catch {}
    if (!initial) {
      const firstIncomplete = currentStages.find((s) => !s.complete);
      initial = (firstIncomplete || currentStages[0] || {}).name || null;
    }
    if (initial) selectStage(initial);
  }
}

// ── Stage selection ──────────────────────────────────────────────────
async function selectStage(name) {
  currentStage = name;
  try { localStorage.setItem("fp.currentStage", name); } catch {}
  document.querySelectorAll(".stage-item").forEach((el) => {
    el.classList.toggle("active", el.dataset.stage === name);
  });

  const s = currentStages.find((x) => x.name === name);
  document.getElementById("stage-title").textContent = humanizeStageName(name);

  // Per-stage live override beats the on-disk complete flag so we don't
  // flip "Running" → "Complete" mid-run just because some output has
  // already been written to disk.
  const liveState = stageState[name];
  const badge = document.getElementById("stage-badge");
  if (liveState === "running") {
    badge.textContent = "Running";
    badge.className = "badge badge-running";
  } else if (liveState === "error") {
    badge.textContent = "Error";
    badge.className = "badge badge-error";
  } else if (s && s.complete) {
    badge.textContent = "Complete";
    badge.className = "badge badge-complete";
  } else {
    badge.textContent = "Not run";
    badge.className = "badge badge-pending";
  }

  // While any stage is mid-run, lock out every run trigger so the
  // operator can't accidentally fire a second job on top of the first.
  const isAnyRunning = runningStage != null;
  const rerunBtn = document.getElementById("rerun-btn");
  const continueBtn = document.getElementById("continue-btn");
  const runAllBtn = document.getElementById("run-all-btn");
  const deps = STAGE_DEPS[name] || [];
  const stageMap = Object.fromEntries(currentStages.map((s) => [s.name, s.complete]));
  const missing = deps.filter((d) => !stageMap[d]);
  const blocked = missing.length > 0 || isAnyRunning;
  const blockedReason = isAnyRunning
    ? `${humanizeStageName(runningStage)} is currently running`
    : `Requires: ${missing.join(", ")}`;
  rerunBtn.disabled = blocked;
  rerunBtn.title = blocked ? blockedReason : "";
  continueBtn.disabled = blocked;
  continueBtn.title = blocked
    ? blockedReason
    : "Run this stage without wiping its output directory — resumes from any cached per-player results.";
  runAllBtn.disabled = isAnyRunning;
  runAllBtn.title = isAnyRunning ? blockedReason : "";

  document.getElementById("output-panel").innerHTML = "";
  loadOutput(name);
}

// ── Run / log streaming ──────────────────────────────────────────────
//
// `fromStage`: when non-null, the runner skips its is_complete() short
// circuit for that stage. Continue uses this to force re-entry into
// hmr_world's per-player cache loop even when some .npz files exist;
// without it the runner would print "[SKIP] hmr_world (cached)" and
// never call stage.run().
async function startRun(stages, fromStage) {
  const logPanel = document.getElementById("log-panel");
  const logOutput = document.getElementById("log-output");
  const logStatus = document.getElementById("log-status");
  logPanel.style.display = "";
  logPanel.style.borderColor = "#1f2937";
  logOutput.textContent = "";
  logStatus.textContent = "running…";
  logStatus.style.color = "#fbbf24";
  logPanel.scrollIntoView({ behavior: "auto", block: "start" });

  // The /api/run endpoint takes either a single stage name or "all".
  // Mark the targeted stage(s) as running so subsequent re-renders of
  // the sidebar / badge keep showing it correctly even if selectStage
  // fires for the same stage in the meantime.
  const targetStages = stages === "all"
    ? currentStages.map((s) => s.name)
    : [stages];
  for (const t of targetStages) stageState[t] = "running";
  runningStage = stages === "all" ? "Pipeline" : stages;
  // Pulse-mark every targeted sidebar dot so the operator can see at a
  // glance which stages are in flight on a "Run All".
  for (const t of targetStages) {
    const d = document.getElementById(`dot-${t}`);
    if (d) d.className = "stage-dot running";
  }
  // Re-evaluate badge + buttons via selectStage so the
  // any-running lockout is applied uniformly.
  if (currentStage) selectStage(currentStage);

  const body = fromStage ? { stages, from_stage: fromStage } : { stages };
  const res = await fetch("/api/run", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });

  if (!res.ok) {
    logOutput.textContent = "Failed to start run";
    for (const t of targetStages) stageState[t] = "error";
    runningStage = null;
    if (currentStage) selectStage(currentStage);
    return;
  }

  const { job_id } = await res.json();
  _streamJobLogs(job_id, targetStages);
}

// Attach to a job_id created out-of-band (e.g. by /api/shots/upload).
// Marks ``targetStage`` as running, opens the log panel, and routes the
// SSE log stream into it. ``onDone`` (optional) is invoked after the
// done event fires, regardless of success or failure.
function attachToJob(jobId, targetStage, onDone) {
  const logPanel = document.getElementById("log-panel");
  const logOutput = document.getElementById("log-output");
  const logStatus = document.getElementById("log-status");
  logPanel.style.display = "";
  logPanel.style.borderColor = "#1f2937";
  logOutput.textContent = "";
  logStatus.textContent = "running…";
  logStatus.style.color = "#fbbf24";
  logPanel.scrollIntoView({ behavior: "auto", block: "start" });

  const targetStages = [targetStage];
  for (const t of targetStages) stageState[t] = "running";
  runningStage = targetStage;
  for (const t of targetStages) {
    const d = document.getElementById(`dot-${t}`);
    if (d) d.className = "stage-dot running";
  }
  if (currentStage) selectStage(currentStage);
  _streamJobLogs(jobId, targetStages, onDone);
}

function _streamJobLogs(jobId, targetStages, onDone) {
  const logPanel = document.getElementById("log-panel");
  const logOutput = document.getElementById("log-output");
  const logStatus = document.getElementById("log-status");
  if (activeSource) activeSource.close();
  activeSource = new EventSource(`/api/jobs/${jobId}/logs`);

  activeSource.addEventListener("log", (e) => {
    const { line } = JSON.parse(e.data);
    logOutput.textContent += line + "\n";
    logOutput.scrollTop = logOutput.scrollHeight;
  });

  activeSource.addEventListener("done", (e) => {
    activeSource.close();
    activeSource = null;
    const { status } = JSON.parse(e.data);
    for (const t of targetStages) delete stageState[t];
    runningStage = null;
    if (status === "done") {
      logStatus.textContent = "done";
      logStatus.style.color = "#4ade80";
      logPanel.style.borderColor = "#166534";
    } else {
      logStatus.textContent = "ERROR — scroll log above for details";
      logStatus.style.color = "#f87171";
      logPanel.style.borderColor = "#b91c1c";
      for (const t of targetStages) stageState[t] = "error";
      logPanel.scrollIntoView({ behavior: "auto", block: "start" });
      logOutput.scrollTop = logOutput.scrollHeight;
    }
    loadStages().then(() => {
      if (currentStage) selectStage(currentStage);
      if (typeof onDone === "function") onDone(status);
    });
  });
}

document.getElementById("log-close-btn").addEventListener("click", () => {
  document.getElementById("log-panel").style.display = "none";
});

document.getElementById("rerun-btn").addEventListener("click", async () => {
  if (!currentStage) return;
  const btn = document.getElementById("rerun-btn");
  btn.disabled = true;
  await fetch(`/api/output/${currentStage}`, { method: "DELETE" });
  startRun(currentStage);
});

// Continue: re-invoke the stage WITHOUT wiping its output directory
// first. For hmr_world this means already-processed players are picked
// up from the per-player .npz cache rather than re-running GVHMR.
// We pass from_stage = currentStage so the pipeline runner doesn't
// short-circuit on its is_complete()-cache check.
document.getElementById("continue-btn").addEventListener("click", () => {
  if (!currentStage) return;
  document.getElementById("continue-btn").disabled = true;
  startRun(currentStage, currentStage);
});

document.getElementById("run-all-btn").addEventListener("click", () => {
  startRun("all");
});

function setDot(stageName, state) {
  const dot = document.getElementById(`dot-${stageName}`);
  if (dot) dot.className = "stage-dot " + state;
}

// ── Output loading ───────────────────────────────────────────────────
async function loadOutput(stageName) {
  const panel = document.getElementById("output-panel");
  panel.innerHTML = "";

  switch (stageName) {
    case "prepare_shots":
      await renderPrepareShots(panel);
      break;
    case "tracking":
      await renderTracking(panel);
      break;
    case "camera":
      await renderCamera(panel);
      break;
    case "hmr_world":
      await renderHmrWorld(panel);
      break;
    case "ball":
      await renderBall(panel);
      break;
    case "refined_poses":
      await renderRefinedPoses(panel);
      break;
    case "export":
      await renderExport(panel);
      break;
    default:
      panel.innerHTML = `<div class="empty-note">Unknown stage: ${stageName}</div>`;
  }
}

// ── Helpers ──────────────────────────────────────────────────────────
function makePanel(title) {
  const wrap = document.createElement("div");
  wrap.className = "panel";
  wrap.innerHTML = `<div class="panel-title">${title}</div>`;
  const body = document.createElement("div");
  body.className = "panel-body";
  body.style.padding = "0";
  wrap.appendChild(body);
  return { wrap, body };
}

function makeTable(headers) {
  const t = document.createElement("table");
  const thead = document.createElement("thead");
  const tr = document.createElement("tr");
  headers.forEach((h) => {
    const th = document.createElement("th");
    th.textContent = h;
    tr.appendChild(th);
  });
  thead.appendChild(tr);
  t.appendChild(thead);
  const tbody = document.createElement("tbody");
  t.appendChild(tbody);
  return { t, tbody };
}

function addRow(tbody, cells) {
  const tr = document.createElement("tr");
  cells.forEach((c) => {
    const td = document.createElement("td");
    if (typeof c === "string" || typeof c === "number") {
      td.textContent = c;
    } else if (c && c.html) {
      td.innerHTML = c.html;
    } else if (c && c.el) {
      td.appendChild(c.el);
    }
    if (c && c.cls) td.className = c.cls;
    tr.appendChild(td);
  });
  tbody.appendChild(tr);
}

function fmt(n, dec = 1) {
  if (n == null) return "—";
  return Number(n).toFixed(dec);
}

function humanizeStageName(name) {
  if (!name) return "—";
  const map = {
    prepare_shots: "Prepare Shots",
    tracking:      "Tracking",
    camera:        "Camera Tracking",
    hmr_world:     "HMR World",
    ball:          "Ball",
    refined_poses: "Refined Poses",
    export:        "Export",
  };
  return map[name] || name;
}

function emptyNote(panel, msg) {
  const div = document.createElement("div");
  div.className = "empty-note";
  div.textContent = msg;
  panel.appendChild(div);
}

async function fetchJsonOrNull(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    return await res.json();
  } catch (_) { return null; }
}

// ── Stage renderers ──────────────────────────────────────────────────

async function renderPrepareShots(panel) {
  const data = await fetchJsonOrNull("/api/output/shots");
  const shots = (data && data.shots) || [];

  // ── Upload toolbar — present whether or not any shots exist yet ──
  const toolbar = document.createElement("div");
  toolbar.style.cssText = "display:flex;gap:8px;align-items:center;padding:0 0 12px;";
  const addBtn = document.createElement("button");
  addBtn.className = "btn btn-primary";
  addBtn.textContent = "Add Shots";
  addBtn.style.fontSize = "12px";
  addBtn.title = "Upload one or more .mp4 clips and merge them into the shots manifest without wiping any existing shots.";
  const fileInput = document.createElement("input");
  fileInput.type = "file";
  fileInput.accept = "video/mp4,.mp4";
  fileInput.multiple = true;
  fileInput.style.display = "none";
  const status = document.createElement("span");
  status.style.cssText = "color:#94a3b8;font-size:12px;";
  toolbar.appendChild(addBtn);
  toolbar.appendChild(fileInput);
  toolbar.appendChild(status);
  panel.appendChild(toolbar);

  addBtn.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", async () => {
    if (!fileInput.files || fileInput.files.length === 0) return;
    const fd = new FormData();
    for (const f of fileInput.files) fd.append("files", f);
    addBtn.disabled = true;
    status.style.color = "#94a3b8";
    status.textContent = `Uploading ${fileInput.files.length} file(s)…`;
    let body;
    try {
      const res = await fetch("/api/shots/upload", { method: "POST", body: fd });
      body = await res.json().catch(() => ({}));
      if (!res.ok) {
        status.style.color = "#f87171";
        status.textContent = `Upload failed: ${body.detail || res.statusText}`;
        addBtn.disabled = false;
        return;
      }
    } catch (err) {
      status.style.color = "#f87171";
      status.textContent = `Upload failed: ${err.message || err}`;
      addBtn.disabled = false;
      return;
    } finally {
      fileInput.value = "";
    }

    const skippedNote = (body.skipped && body.skipped.length)
      ? ` (skipped ${body.skipped.length}: ${body.skipped.map((s) => `${s.name} — ${s.reason}`).join("; ")})`
      : "";
    if (!body.saved || body.saved.length === 0) {
      status.style.color = "#f59e0b";
      status.textContent = `Nothing uploaded${skippedNote}`;
      addBtn.disabled = false;
      return;
    }
    status.style.color = "#4ade80";
    status.textContent = `Uploaded ${body.saved.length} shot(s): ${body.saved.join(", ")}${skippedNote}. Registering…`;

    if (body.job_id) {
      attachToJob(body.job_id, "prepare_shots", async () => {
        addBtn.disabled = false;
        await loadStages();
        if (currentStage === "prepare_shots") selectStage("prepare_shots");
      });
    } else {
      addBtn.disabled = false;
      await loadStages();
      if (currentStage === "prepare_shots") selectStage("prepare_shots");
    }
  });

  if (shots.length === 0) {
    emptyNote(panel, "No prepared shots yet — click Add Shots above to upload clips, or pass --input to recon.py.");
    return;
  }

  const { wrap, body } = makePanel(`Prepared Shots (${shots.length})`);
  const { t, tbody } = makeTable(["Shot ID", "Preview"]);
  for (const id of shots) {
    const vid = document.createElement("video");
    vid.src = `/api/video/${id}`;
    vid.controls = true;
    vid.preload = "metadata";
    vid.style.cssText = "max-width:240px;max-height:80px;border-radius:4px;";
    addRow(tbody, [id, { el: vid }]);
  }
  body.appendChild(t);
  panel.appendChild(wrap);

  await renderMultiShotStatus(panel, shots);
  await renderShotSync(panel, shots);
}

// ── Shot Sync editor ────────────────────────────────────────────────
// Video-editor-style multi-shot alignment. The reference shot anchors
// the global timeline; every other shot is positioned at its
// ``frame_offset`` (positive = ahead of reference). The operator picks
// reference + active clip with dropdowns, scrubs both videos to a
// matching moment, then either drags the active clip on the timeline,
// nudges with frame buttons, or hits a single Play to play both
// videos synchronously and watch the cursor sweep the timeline.
//
// Sign convention (matches sync_map.py):
//   frame_offset = matched_frame_in_active - matched_frame_in_reference
// Persisted to ``output/shots/sync_map.json``.
async function renderShotSync(panel, shotIds) {
  const [sync, fpsMap, manifest] = await Promise.all([
    fetchJsonOrNull("/api/sync"),
    _fpsByShot(shotIds),
    fetchJsonOrNull("/api/shots/manifest"),
  ]);
  if (!sync || !sync.alignments) return;

  // Frame counts per shot (drives timeline block widths). Manifest is
  // the source of truth; if a shot is missing from it, fall back to
  // the longest other shot so we still render *something*.
  const framesByShot = new Map();
  for (const s of (manifest && manifest.shots) || []) {
    framesByShot.set(s.id, Math.max(1, s.end_frame - s.start_frame + 1));
  }
  const defaultLen = Math.max(...framesByShot.values(), 300);
  for (const id of shotIds) {
    if (!framesByShot.has(id)) framesByShot.set(id, defaultLen);
  }

  const offsetByShot = new Map();
  for (const a of sync.alignments) offsetByShot.set(a.shot_id, a.frame_offset);
  for (const id of shotIds) if (!offsetByShot.has(id)) offsetByShot.set(id, 0);

  const initialRef = sync.reference_shot && shotIds.includes(sync.reference_shot)
    ? sync.reference_shot : shotIds[0];
  const firstActive = shotIds.find((s) => s !== initialRef) || shotIds[0];

  // ── Outer panel ──────────────────────────────────────────────────
  const { wrap, body } = makePanel("Shot Sync (manual offsets)");
  body.style.padding = "14px 16px";

  // Header (intro + save status pinned right).
  const header = document.createElement("div");
  header.style.cssText = "display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px;font-size:12px;color:#94a3b8;";
  header.innerHTML = `<span>Side-by-side scrubbing + a draggable timeline of every shot. Frame offsets persist to <code>output/shots/sync_map.json</code>.</span>`;
  const status = document.createElement("span");
  status.style.cssText = "color:#94a3b8;font-size:12px;margin-left:auto;";
  header.appendChild(status);
  body.appendChild(header);

  // Two-column video grid.
  const topRow = document.createElement("div");
  topRow.style.cssText = "display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px;";
  body.appendChild(topRow);

  // Closures that the controls + timeline mutate.
  const state = {
    referenceShot: initialRef,
    activeShot: firstActive,
    offsets: offsetByShot,
    playing: false,
    rafId: null,
  };

  const refColumn = _buildSyncVideoColumn("Reference (offset = 0)", shotIds, state.referenceShot, fpsMap);
  const activeColumn = _buildSyncVideoColumn("Clip to sync", shotIds, state.activeShot, fpsMap);
  topRow.append(refColumn.wrap, activeColumn.wrap);

  // Disable picking the reference itself as the active shot, and
  // vice-versa — they must always differ when there's >1 shot.
  function refreshSelectExclusion() {
    for (const opt of refColumn.select.options) {
      opt.disabled = opt.value === state.activeShot && shotIds.length > 1;
    }
    for (const opt of activeColumn.select.options) {
      opt.disabled = opt.value === state.referenceShot && shotIds.length > 1;
    }
  }

  refColumn.select.addEventListener("change", () => {
    state.referenceShot = refColumn.select.value;
    refColumn.loadShot(state.referenceShot);
    // Reference's offset is always 0 by definition.
    state.offsets.set(state.referenceShot, 0);
    refreshSelectExclusion();
    rebuildTimeline();
    syncActiveToRef();
  });
  activeColumn.select.addEventListener("change", () => {
    state.activeShot = activeColumn.select.value;
    activeColumn.loadShot(state.activeShot);
    refreshSelectExclusion();
    rebuildTimeline();
    syncActiveToRef();
  });

  // ── Controls row (play / nudge / save) ────────────────────────────
  const controls = document.createElement("div");
  controls.style.cssText = "display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0;font-size:12px;color:#cbd5e1;";

  const playBtn = makeToolbarBtn("▶ Play both", "#4f46e5");
  playBtn.style.minWidth = "92px";
  controls.appendChild(playBtn);

  const lockBtn = makeToolbarBtn("Lock offset to current frames", "#334155");
  lockBtn.title = "Set the active clip's offset to (active frame − reference frame) using both videos' current positions.";
  controls.appendChild(lockBtn);

  controls.appendChild(_label("Active offset:"));
  const offsetInput = document.createElement("input");
  offsetInput.type = "number";
  offsetInput.step = "1";
  offsetInput.style.cssText = "width:90px;background:#252840;color:#e2e8f0;border:1px solid #2d3148;border-radius:4px;padding:3px 6px;font-size:12px;";
  controls.appendChild(offsetInput);

  const nudgeBack = makeToolbarBtn("◀", "#334155");
  nudgeBack.title = "Move active clip 1 frame earlier on the timeline (offset −1).";
  const nudgeFwd = makeToolbarBtn("▶", "#334155");
  nudgeFwd.title = "Move active clip 1 frame later on the timeline (offset +1).";
  controls.appendChild(nudgeBack);
  controls.appendChild(nudgeFwd);

  const saveBtn = document.createElement("button");
  saveBtn.className = "btn btn-primary";
  saveBtn.style.cssText = "font-size:12px;padding:5px 12px;margin-left:auto;";
  saveBtn.textContent = "Save";
  controls.appendChild(saveBtn);

  body.appendChild(controls);

  // ── Timeline ──────────────────────────────────────────────────────
  const timelineHost = document.createElement("div");
  body.appendChild(timelineHost);

  // Wire it all up.
  function getFps(id) { return fpsMap.get(id) || 30; }
  function getOffset(id) { return state.offsets.get(id) || 0; }

  function refreshOffsetInput() {
    offsetInput.value = String(getOffset(state.activeShot));
  }

  function syncActiveToRef() {
    // When the operator scrubs the reference, jump the active video
    // to the frame implied by the offset so they're previewing the
    // same global instant.
    const refFps = getFps(state.referenceShot);
    const actFps = getFps(state.activeShot);
    const offset = getOffset(state.activeShot);
    const refFrame = refColumn.video.currentTime * refFps;
    const targetActFrame = refFrame + offset;
    const targetTime = Math.max(0, targetActFrame / actFps);
    if (Math.abs(activeColumn.video.currentTime - targetTime) > 0.05) {
      try { activeColumn.video.currentTime = targetTime; } catch {}
    }
  }

  refColumn.video.addEventListener("seeked", () => { syncActiveToRef(); drawCursor(); });
  refColumn.video.addEventListener("timeupdate", () => drawCursor());
  refColumn.video.addEventListener("loadedmetadata", () => drawCursor());

  function setOffset(shotId, newOffset) {
    if (shotId === state.referenceShot) return;  // reference is pinned to 0
    state.offsets.set(shotId, Math.round(newOffset));
    if (shotId === state.activeShot) refreshOffsetInput();
    rebuildTimeline();
    if (shotId === state.activeShot) syncActiveToRef();
  }

  // Keep activeShot in sync with what the timeline picks via clicks.
  function setActiveShot(shotId) {
    if (shotId === state.activeShot) return;
    if (shotId === state.referenceShot) return;  // can't pick reference as active
    state.activeShot = shotId;
    activeColumn.select.value = shotId;
    activeColumn.loadShot(shotId);
    refreshSelectExclusion();
    refreshOffsetInput();
    rebuildTimeline();
    syncActiveToRef();
  }

  let drawCursor = () => {};   // overwritten by rebuildTimeline
  let cleanupTimeline = () => {};
  function rebuildTimeline() {
    cleanupTimeline();
    timelineHost.innerHTML = "";
    const tl = _buildSyncTimeline({
      shotIds, framesByShot, fpsMap,
      referenceShot: state.referenceShot,
      activeShot: state.activeShot,
      getOffset,
      commitOffset: setOffset,
      onPickShot: setActiveShot,
      onScrubGlobalFrame: (gf) => {
        const refFps = getFps(state.referenceShot);
        const tRef = Math.max(0, gf / refFps);
        try { refColumn.video.currentTime = tRef; } catch {}
      },
      getCursorFrame: () => refColumn.video.currentTime * getFps(state.referenceShot),
    });
    timelineHost.appendChild(tl.element);
    drawCursor = tl.drawCursor;
    cleanupTimeline = tl.cleanup;
  }

  // ── Button handlers ──────────────────────────────────────────────
  lockBtn.addEventListener("click", () => {
    const refFps = getFps(state.referenceShot);
    const actFps = getFps(state.activeShot);
    const refFrame = Math.round(refColumn.video.currentTime * refFps);
    const actFrame = Math.round(activeColumn.video.currentTime * actFps);
    setOffset(state.activeShot, actFrame - refFrame);
  });

  nudgeBack.addEventListener("click", () => {
    setOffset(state.activeShot, getOffset(state.activeShot) - 1);
  });
  nudgeFwd.addEventListener("click", () => {
    setOffset(state.activeShot, getOffset(state.activeShot) + 1);
  });

  offsetInput.addEventListener("change", () => {
    const v = Number(offsetInput.value);
    if (!Number.isFinite(v)) return;
    setOffset(state.activeShot, v);
  });

  function stopPlay() {
    state.playing = false;
    playBtn.textContent = "▶ Play both";
    refColumn.video.pause();
    activeColumn.video.pause();
    if (state.rafId) { cancelAnimationFrame(state.rafId); state.rafId = null; }
  }
  function startPlay() {
    syncActiveToRef();
    state.playing = true;
    playBtn.textContent = "⏸ Pause";
    refColumn.video.play().catch(() => {});
    activeColumn.video.play().catch(() => {});
    const tick = () => {
      if (!state.playing) return;
      drawCursor();
      // Soft re-sync: if drift exceeds 80ms, nudge the active video
      // back to its target. Setting currentTime mid-playback causes a
      // tiny visual hiccup so we only do it when noticeably out.
      const refFps = getFps(state.referenceShot);
      const actFps = getFps(state.activeShot);
      const off = getOffset(state.activeShot);
      const target = (refColumn.video.currentTime * refFps + off) / actFps;
      if (Math.abs(activeColumn.video.currentTime - target) > 0.08) {
        try { activeColumn.video.currentTime = Math.max(0, target); } catch {}
      }
      // Auto-stop when ref hits the end.
      if (refColumn.video.ended) { stopPlay(); return; }
      state.rafId = requestAnimationFrame(tick);
    };
    state.rafId = requestAnimationFrame(tick);
  }
  playBtn.addEventListener("click", () => {
    if (state.playing) stopPlay(); else startPlay();
  });

  saveBtn.addEventListener("click", async () => {
    const alignments = [{
      shot_id: state.referenceShot,
      frame_offset: 0,
      method: "manual",
      confidence: 1.0,
    }];
    for (const [sid, off] of state.offsets.entries()) {
      if (sid === state.referenceShot) continue;
      alignments.push({
        shot_id: sid, frame_offset: off, method: "manual", confidence: 1.0,
      });
    }
    saveBtn.disabled = true;
    status.style.color = "#94a3b8";
    status.textContent = "Saving…";
    try {
      const res = await fetch("/api/sync", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          reference_shot: state.referenceShot, alignments,
        }),
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        status.style.color = "#f87171";
        status.textContent = `Save failed: ${body.detail || res.statusText}`;
        return;
      }
      status.style.color = "#4ade80";
      status.textContent = `Saved (${body.count} shots)`;
      setTimeout(() => {
        if (status.textContent.startsWith("Saved")) status.textContent = "";
      }, 2000);
    } catch (err) {
      status.style.color = "#f87171";
      status.textContent = `Save failed: ${err.message || err}`;
    } finally {
      saveBtn.disabled = false;
    }
  });

  // Initial render.
  refreshSelectExclusion();
  refreshOffsetInput();
  rebuildTimeline();

  panel.appendChild(wrap);
}

function _label(text) {
  const s = document.createElement("span");
  s.textContent = text;
  s.style.color = "#94a3b8";
  return s;
}

function _buildSyncVideoColumn(roleLabel, shotIds, initialShotId, fpsMap) {
  const wrap = document.createElement("div");
  wrap.style.cssText = "background:#0f1117;border:1px solid #1f2937;border-radius:6px;padding:10px;display:flex;flex-direction:column;gap:8px;min-width:0;";

  const headerEl = document.createElement("div");
  headerEl.style.cssText = "display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:#cbd5e1;";
  const label = document.createElement("span");
  label.textContent = roleLabel;
  label.style.fontWeight = "600";
  label.style.color = "#f1f5f9";
  headerEl.appendChild(label);

  const select = document.createElement("select");
  select.style.cssText = "background:#252840;color:#e2e8f0;border:1px solid #2d3148;border-radius:4px;padding:3px 6px;font-size:12px;margin-left:auto;";
  for (const id of shotIds) {
    const opt = document.createElement("option");
    opt.value = id; opt.textContent = id;
    select.appendChild(opt);
  }
  select.value = initialShotId;
  headerEl.appendChild(select);
  wrap.appendChild(headerEl);

  const video = document.createElement("video");
  video.controls = true;
  video.preload = "metadata";
  // Fills the column at 16:9 (the broadcast clip aspect). max-height
  // keeps the controls + timeline visible on shorter windows; on a
  // tall window the column width is the binding constraint and the
  // videos use as much of it as they can.
  video.style.cssText = "width:100%;height:auto;aspect-ratio:16/9;max-height:60vh;border-radius:4px;background:#000;display:block;object-fit:contain;";
  wrap.appendChild(video);

  const meta = document.createElement("div");
  meta.style.cssText = "font-size:11px;color:#94a3b8;font-variant-numeric:tabular-nums;";
  wrap.appendChild(meta);
  let currentShotId = initialShotId;
  function updateMeta() {
    const fps = (fpsMap && fpsMap.get(currentShotId)) || 30;
    const f = Math.round(video.currentTime * fps);
    meta.textContent = `Frame ${f}  ·  ${video.currentTime.toFixed(2)}s`;
  }
  video.addEventListener("timeupdate", updateMeta);
  video.addEventListener("loadedmetadata", updateMeta);

  function loadShot(shotId) {
    currentShotId = shotId;
    video.src = `/api/video/${encodeURIComponent(shotId)}`;
  }
  loadShot(initialShotId);

  return { wrap, select, video, loadShot };
}

// Video-editor-style timeline. Each shot is rendered as a coloured
// block at ``left = (offset - minOffset) * pxPerFrame``,
// ``width = frameCount * pxPerFrame``. Reference is pinned (no drag);
// other blocks are draggable horizontally to edit their offset.
// Click a block to make it the active clip. A red cursor reflects
// the reference video's current frame.
function _buildSyncTimeline(opts) {
  const {
    shotIds, framesByShot, fpsMap,
    referenceShot, activeShot,
    getOffset, commitOffset,
    onPickShot, onScrubGlobalFrame, getCursorFrame,
  } = opts;

  const wrap = document.createElement("div");
  wrap.style.cssText = "background:#0a0e1a;border:1px solid #1f2937;border-radius:6px;padding:10px;";

  const meta = document.createElement("div");
  meta.style.cssText = "font-size:11px;color:#94a3b8;margin-bottom:6px;";
  meta.textContent = "Each block sits at its real-time position on the global timeline (anchored to the reference at frame 0). Drag a clip to slide it earlier/later. Click a clip to make it active. Click + drag empty timeline to scrub the reference.";
  wrap.appendChild(meta);

  // Each clip occupies the global-timeline range
  // ``[startGlobal, startGlobal + frame_count]`` where
  //   startGlobal = -offset
  // because shot X's local frame ``f`` corresponds to reference frame
  // ``f - offset`` (see sync_map.py docstring). Positioning blocks at
  // their real-time start matches the operator's mental model: a clip
  // that's "ahead" of the reference (positive offset) actually started
  // *earlier* in wall-clock time, so its block sits to the LEFT of
  // the reference.
  function startGlobalFor(id) {
    return id === referenceShot ? 0 : -getOffset(id);
  }
  let minStart = Infinity, maxEnd = -Infinity;
  for (const id of shotIds) {
    const start = startGlobalFor(id);
    minStart = Math.min(minStart, start);
    maxEnd = Math.max(maxEnd, start + (framesByShot.get(id) || 0));
  }
  if (!isFinite(minStart)) { minStart = 0; maxEnd = 0; }
  const PAD_FRAMES = Math.max(60, Math.round((maxEnd - minStart) * 0.05));
  const spanStart = minStart - PAD_FRAMES;
  const spanEnd = maxEnd + PAD_FRAMES;
  const spanFrames = Math.max(1, spanEnd - spanStart);

  // Auto-fit: aim for ~900 px content width but clamp pxPerFrame to a
  // legible range so a tiny single-clip timeline still has visible
  // ticks and a huge multi-clip timeline can scroll.
  const TARGET_WIDTH = 900;
  let pxPerFrame = TARGET_WIDTH / spanFrames;
  pxPerFrame = Math.max(0.4, Math.min(8, pxPerFrame));
  const contentWidth = Math.round(spanFrames * pxPerFrame);
  const ROW_HEIGHT = 36;

  const scroller = document.createElement("div");
  scroller.style.cssText = "overflow-x:auto;overflow-y:hidden;border-radius:4px;background:#080a14;";
  wrap.appendChild(scroller);

  const content = document.createElement("div");
  content.style.cssText = `position:relative;width:${contentWidth}px;height:${ROW_HEIGHT * (shotIds.length + 1) + 8}px;`;
  scroller.appendChild(content);

  // Ruler with frame ticks (every ~120px). Major tick = labelled.
  const ruler = document.createElement("div");
  ruler.style.cssText = `position:relative;width:100%;height:18px;border-bottom:1px solid #1f2937;color:#475569;font-size:10px;font-variant-numeric:tabular-nums;`;
  const tickStride = Math.max(
    1, Math.round(120 / pxPerFrame / 10) * 10,
  );
  for (let f = Math.ceil(spanStart / tickStride) * tickStride; f <= spanEnd; f += tickStride) {
    const x = Math.round((f - spanStart) * pxPerFrame);
    const tick = document.createElement("div");
    tick.style.cssText = `position:absolute;left:${x}px;top:0;bottom:0;border-left:1px solid #1e293b;padding-left:3px;`;
    tick.textContent = String(f);
    ruler.appendChild(tick);
  }
  content.appendChild(ruler);

  // Clip blocks. Reference shot first (top row), then others sorted by
  // their real-time start (earlier = higher in the stack).
  const orderedIds = [
    referenceShot,
    ...shotIds.filter((id) => id !== referenceShot)
                 .sort((a, b) => startGlobalFor(a) - startGlobalFor(b)),
  ];

  function blockLabel(sid, startGlobal, len) {
    if (sid === referenceShot) {
      return `${sid} (ref · frames 0–${len})`;
    }
    return `${sid} · global ${startGlobal}–${startGlobal + len}`;
  }

  for (let i = 0; i < orderedIds.length; i++) {
    const sid = orderedIds[i];
    const isRef = sid === referenceShot;
    const isActive = sid === activeShot;
    const off = isRef ? 0 : getOffset(sid);
    const startGlobal = startGlobalFor(sid);
    const len = framesByShot.get(sid) || 1;
    const left = Math.round((startGlobal - spanStart) * pxPerFrame);
    const width = Math.max(2, Math.round(len * pxPerFrame));
    const top = 18 + 4 + i * ROW_HEIGHT;

    const block = document.createElement("div");
    const baseColor = isRef ? "#6366f1" : (isActive ? "#22c55e" : "#475569");
    block.style.cssText = `
      position:absolute;
      left:${left}px;top:${top}px;width:${width}px;height:${ROW_HEIGHT - 6}px;
      background:${baseColor};
      border:1px solid ${isActive ? '#86efac' : '#0f172a'};
      border-radius:4px;
      color:#fff;font-size:11px;font-weight:600;
      padding:4px 6px;
      cursor:${isRef ? 'pointer' : 'grab'};
      user-select:none;
      box-sizing:border-box;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    `;
    const fps = fpsMap.get(sid) || 30;
    block.title = `${sid}\nframes: ${len}\nfps: ${fps.toFixed(2)}\noffset: ${off}\nglobal range: ${startGlobal}–${startGlobal + len}`;
    block.textContent = blockLabel(sid, startGlobal, len);

    // Click → pick as active (unless it's already the reference).
    // We bind on mouseup-no-drag to avoid swallowing the click after
    // a drag operation completes.
    block.addEventListener("click", (ev) => {
      ev.stopPropagation();
      if (!isRef && !block.dataset.dragMoved) onPickShot(sid);
      delete block.dataset.dragMoved;
    });

    // Drag horizontally → live-preview new position; commit on mouseup.
    // Visual: block.left follows the mouse 1:1.
    // Data: when the block is dragged RIGHT (later in real time), the
    //       clip's global start increases ⇒ -offset increases ⇒
    //       offset DECREASES. So newOffset = startOffset - dxFrames.
    if (!isRef) {
      block.addEventListener("mousedown", (ev) => {
        if (ev.button !== 0) return;
        ev.preventDefault();
        ev.stopPropagation();
        dragCtx = {
          kind: "block",
          shotId: sid,
          startX: ev.clientX,
          startOffset: off,
          startLeft: left,
          block,
          len,
          fps,
        };
        block.style.cursor = "grabbing";
      });
    }

    content.appendChild(block);
  }

  // Single window-level mousemove/mouseup pair so listeners don't
  // accumulate as the timeline rebuilds. dragCtx tracks the current
  // drag — either a clip block ('block') or the timeline scrubber
  // ('scrub') — and is null when nothing is being dragged.
  let dragCtx = null;

  function onMove(ev) {
    if (!dragCtx) return;
    if (dragCtx.kind === "block") {
      const dxPx = ev.clientX - dragCtx.startX;
      const dxFrames = Math.round(dxPx / pxPerFrame);
      // Sign flip: dragging right ⇒ later in real time ⇒ offset shrinks.
      const newOffset = dragCtx.startOffset - dxFrames;
      const newStartGlobal = -newOffset;
      const newLeft = Math.round((newStartGlobal - spanStart) * pxPerFrame);
      dragCtx.block.style.left = `${newLeft}px`;
      dragCtx.block.textContent =
        blockLabel(dragCtx.shotId, newStartGlobal, dragCtx.len);
      dragCtx.lastOffset = newOffset;
      if (Math.abs(dxFrames) > 0) dragCtx.block.dataset.dragMoved = "1";
    } else if (dragCtx.kind === "scrub") {
      const rect = content.getBoundingClientRect();
      const x = ev.clientX - rect.left + scroller.scrollLeft;
      const globalFrame = spanStart + x / pxPerFrame;
      onScrubGlobalFrame(globalFrame);
    }
  }
  function onUp() {
    if (!dragCtx) return;
    const ctx = dragCtx;
    dragCtx = null;
    if (ctx.kind === "block") {
      ctx.block.style.cursor = "grab";
      if (ctx.lastOffset != null && ctx.lastOffset !== ctx.startOffset) {
        commitOffset(ctx.shotId, ctx.lastOffset);
      }
    }
  }
  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);

  // Cursor — vertical line at the reference's current frame, with a
  // grabbable handle at the top for click+drag scrubbing.
  const cursor = document.createElement("div");
  cursor.style.cssText = "position:absolute;top:18px;bottom:0;width:2px;background:#ef4444;pointer-events:none;";
  content.appendChild(cursor);
  const cursorHandle = document.createElement("div");
  cursorHandle.style.cssText = "position:absolute;top:14px;width:12px;height:12px;background:#ef4444;border:2px solid #fff;border-radius:50%;transform:translateX(-5px);cursor:ew-resize;z-index:5;";
  cursorHandle.title = "Drag to scrub the reference video";
  content.appendChild(cursorHandle);

  function drawCursor() {
    const f = getCursorFrame();
    const x = Math.round((f - spanStart) * pxPerFrame);
    cursor.style.left = `${x}px`;
    cursorHandle.style.left = `${x}px`;
  }
  drawCursor();

  // Cursor handle drag → scrub.
  cursorHandle.addEventListener("mousedown", (ev) => {
    if (ev.button !== 0) return;
    ev.preventDefault();
    ev.stopPropagation();
    dragCtx = { kind: "scrub" };
    // Immediately sync to mousedown position too.
    onMove(ev);
  });

  // Mousedown on empty timeline (or ruler) → start scrubbing AND
  // immediately seek to that point. Mousemove continues to scrub.
  function startScrub(ev) {
    if (ev.button !== 0) return;
    if (ev.target !== content && ev.target !== ruler) return;
    ev.preventDefault();
    dragCtx = { kind: "scrub" };
    onMove(ev);
  }
  content.addEventListener("mousedown", startScrub);
  ruler.addEventListener("mousedown", startScrub);
  // Use grab cursor on empty timeline so the drag affordance is visible.
  content.style.cursor = "ew-resize";
  ruler.style.cursor = "ew-resize";

  function cleanup() {
    window.removeEventListener("mousemove", onMove);
    window.removeEventListener("mouseup", onUp);
  }

  return { element: wrap, drawCursor, cleanup };
}

async function _fpsByShot(shotIds) {
  // Camera tracks carry the per-shot fps; falls back to 30 if missing.
  const map = new Map();
  await Promise.all(shotIds.map(async (id) => {
    const t = await fetchJsonOrNull(`/camera/track?shot=${encodeURIComponent(id)}`);
    map.set(id, (t && t.fps && t.fps > 0) ? t.fps : 30);
  }));
  return map;
}

// Per-shot artefact-existence summary so the operator can see at a glance
// which shots are missing anchors, have stale camera tracks (anchors edited
// after the last solve), or have no HMR/ball/export output yet.
async function renderMultiShotStatus(panel, shotIds) {
  const { wrap, body } = makePanel("Multi-Shot Status");
  const { t, tbody } = makeTable([
    "Shot", "Anchors", "Camera", "HMR", "Ball", "Export",
  ]);
  const cell = (ok, stale, label) => {
    const span = document.createElement("span");
    if (stale) {
      span.textContent = "⚠";
      span.title = `${label}: stale (anchors edited after last solve)`;
      span.style.color = "#f59e0b";
    } else if (ok) {
      span.textContent = "✓";
      span.title = `${label}: present`;
      span.style.color = "#22c55e";
    } else {
      span.textContent = "✗";
      span.title = `${label}: missing`;
      span.style.color = "#64748b";
    }
    span.style.fontWeight = "bold";
    return span;
  };
  for (const sid of shotIds) {
    const s = await fetchJsonOrNull(`/api/output/shot-status/${encodeURIComponent(sid)}`);
    if (!s) {
      addRow(tbody, [sid, "—", "—", "—", "—", "—"]);
      continue;
    }
    const anchorLabel = s.has_anchors ? `${s.anchor_count}` : "✗";
    const anchorEl = document.createElement("span");
    anchorEl.textContent = anchorLabel;
    anchorEl.style.color = s.has_anchors ? "#22c55e" : "#64748b";
    addRow(tbody, [
      sid,
      { el: anchorEl },
      { el: cell(s.has_camera, s.camera_stale, "Camera") },
      { el: cell(s.has_hmr, false, `HMR (${s.hmr_player_count} players)`) },
      { el: cell(s.has_ball, false, "Ball") },
      { el: cell(s.has_export, false, "Export") },
    ]);
  }
  body.appendChild(t);

  // Refined-poses summary line — single per-pipeline summary, sourced
  // from quality_report.json (so the value reflects the most recent
  // pipeline run).
  const refinedLine = document.createElement("div");
  refinedLine.style.cssText = "padding:8px 14px;font-size:13px;color:#cbd5e1;";
  const report = await fetchJsonOrNull("/api/output/quality-report");
  const rp = report && report.refined_poses;
  if (!rp) {
    refinedLine.innerHTML = "<strong>Refined poses:</strong> not run";
  } else {
    refinedLine.innerHTML =
      `<strong>Refined poses:</strong> ${rp.players_refined} players ` +
      `(${rp.multi_shot_players} multi-shot, ${rp.single_shot_players} single-shot), ` +
      `${rp.total_fused_frames} frames, ` +
      `${rp.high_disagreement_frames} flagged`;
  }
  body.appendChild(refinedLine);

  panel.appendChild(wrap);
}

async function renderTracking(panel) {
  const data = await fetchJsonOrNull("/tracking/shots");
  if (!data || !data.shots || data.shots.length === 0) {
    emptyNote(panel, "No tracks yet — run tracking to detect players and the ball.");
    return;
  }

  // ── Shot picker (single-shot pipeline today, but the dropdown is cheap) ──
  const shotPicker = document.createElement("div");
  shotPicker.style.cssText = "padding:14px 16px 6px;font-size:13px;color:#cbd5e1;display:flex;gap:10px;align-items:center;";
  shotPicker.innerHTML = "<span>Shot:</span>";
  const select = document.createElement("select");
  select.style.cssText = "background:#252840;color:#e2e8f0;border:1px solid #2d3148;border-radius:4px;padding:4px 8px;font-size:13px;";
  for (const id of data.shots) {
    const opt = document.createElement("option");
    opt.value = id; opt.textContent = id;
    select.appendChild(opt);
  }
  shotPicker.appendChild(select);
  panel.appendChild(shotPicker);

  const editorWrap = document.createElement("div");
  panel.appendChild(editorWrap);

  async function loadShot(shotId) {
    editorWrap.innerHTML = "";
    const preview = await fetchJsonOrNull(`/tracking/preview?shot_id=${encodeURIComponent(shotId)}`);
    if (!preview || !preview.tracks) {
      emptyNote(editorWrap, "Failed to load tracks for this shot.");
      return;
    }
    buildTrackEditor(editorWrap, shotId, preview);
  }
  select.addEventListener("change", () => loadShot(select.value));
  loadShot(data.shots[0]);
}

// ── Track annotation editor (video + bbox overlay + player list) ─────
async function buildTrackEditor(container, shotId, preview) {
  // Need per-frame bboxes for the overlay; /tracking/frames returns
  // { shot_id, frames: [{frame, boxes: [{track_id, class_name, team, bbox, confidence}]}] }
  const framesData = await fetchJsonOrNull(`/tracking/frames?shot_id=${encodeURIComponent(shotId)}`);
  const frames = (framesData && framesData.frames) || [];

  // Index per-frame box list by frame number for O(1) overlay lookup.
  const frameIndex = new Map();
  for (const f of frames) frameIndex.set(f.frame, f.boxes || []);

  // Camera fps (for frame ↔ time conversion).
  const cam = await fetchJsonOrNull("/camera/track");
  const fps = (cam && cam.fps) || 30;

  // Filter to player + goalkeeper rows; the ball gets drawn but is not edited.
  const editable = preview.tracks.filter((t) => t.class_name === "player" || t.class_name === "goalkeeper");
  if (editable.length === 0) {
    emptyNote(container, "No player/goalkeeper tracks in this shot.");
    return;
  }

  // ── Toolbar ──
  const toolbar = document.createElement("div");
  toolbar.style.cssText = "padding:8px 16px 4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;";
  const mergeBtn = makeToolbarBtn("Merge Selected", "#4f46e5");
  mergeBtn.disabled = true;
  const mergeByNameBtn = makeToolbarBtn("Merge by Name", "#334155");
  mergeByNameBtn.title = "Across every shot, unify all tracks that share a player name under one player_id.";
  const ignoreBtn = makeToolbarBtn("Ignore Unknown", "#334155");
  ignoreBtn.title = "Mark every unnamed player/goalkeeper in this shot as 'ignore'.";
  const deleteBtn = makeToolbarBtn("Delete Selected", "#7f1d1d");
  deleteBtn.title = "Delete every track whose checkbox is currently ticked.";
  deleteBtn.disabled = true;
  const interpBtn = makeToolbarBtn("Interp Missing Frames", "#0f766e");
  interpBtn.title = "Linearly interpolate bboxes for short detector dropouts inside the selected tracks.";
  interpBtn.disabled = true;
  const status = document.createElement("span");
  status.style.cssText = "color:#94a3b8;font-size:12px;margin-left:8px;";
  toolbar.appendChild(mergeBtn);
  toolbar.appendChild(mergeByNameBtn);
  toolbar.appendChild(ignoreBtn);
  toolbar.appendChild(deleteBtn);
  toolbar.appendChild(interpBtn);
  toolbar.appendChild(status);
  container.appendChild(toolbar);

  // ── Layout: video left, player list right ──
  const row = document.createElement("div");
  row.style.cssText = "display:flex;gap:14px;align-items:flex-start;padding:8px 16px 16px;";
  container.appendChild(row);

  // Video column
  const videoCol = document.createElement("div");
  videoCol.style.cssText = "flex:1;min-width:0;";
  const videoStage = document.createElement("div");
  videoStage.style.cssText = "position:relative;background:#000;border-radius:4px;overflow:hidden;";
  const video = document.createElement("video");
  video.src = `/api/video/${encodeURIComponent(shotId)}`;
  video.preload = "metadata";
  video.style.cssText = "display:block;width:100%;height:auto;";
  const overlay = document.createElement("canvas");
  overlay.style.cssText = "position:absolute;left:0;top:0;width:100%;height:100%;cursor:pointer;";
  videoStage.appendChild(video);
  videoStage.appendChild(overlay);
  videoCol.appendChild(videoStage);

  // Timeline controls
  const controls = document.createElement("div");
  controls.style.cssText = "display:flex;align-items:center;gap:8px;padding:6px 0;";
  const playBtn = makeToolbarBtn("▶", "#4f46e5"); playBtn.style.minWidth = "36px";
  const stepBack = makeToolbarBtn("◀", "#334155"); stepBack.title = "Previous frame";
  const stepFwd = makeToolbarBtn("▶", "#334155"); stepFwd.title = "Next frame";
  const seek = document.createElement("input");
  seek.type = "range"; seek.min = "0"; seek.max = "1000"; seek.value = "0";
  seek.style.cssText = "flex:1;";
  const frameLabel = document.createElement("span");
  frameLabel.style.cssText = "color:#94a3b8;font-size:11px;min-width:80px;text-align:right;font-variant-numeric:tabular-nums;";
  frameLabel.textContent = "Frame 0";
  controls.append(playBtn, stepBack, stepFwd, seek, frameLabel);
  videoCol.appendChild(controls);
  row.appendChild(videoCol);

  // Player list column
  const listCol = document.createElement("div");
  listCol.style.cssText = "width:300px;min-width:300px;max-height:560px;overflow-y:auto;background:#1a1d27;border-radius:6px;border:1px solid #2d3148;";
  const listHeader = document.createElement("div");
  listHeader.style.cssText = "padding:8px 10px;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid #2d3148;position:sticky;top:0;background:#1a1d27;z-index:1;";
  listHeader.textContent = `Players — ${shotId}`;
  listCol.appendChild(listHeader);
  row.appendChild(listCol);

  // Datalist for name autocomplete (shared across rows)
  const datalistId = `player-names-${shotId}`;
  const datalist = document.createElement("datalist");
  datalist.id = datalistId;
  const allNames = new Set();
  for (const t of editable) if (t.player_name && t.player_name !== "ignore") allNames.add(t.player_name);
  rebuildDatalist(datalist, allNames);
  container.appendChild(datalist);

  // ── Group tracks by player_id (fall back to track_id when empty) ──
  // hmr_world groups by the same key, so the visible row collapse mirrors
  // what eventually goes into GVHMR: one row = one player.
  const playerGroups = new Map(); // rowKey → {key, tracks:[], frameCount, frameRange, name, team}
  for (const t of editable) {
    const key = t.player_id || t.track_id;
    let g = playerGroups.get(key);
    if (!g) {
      g = {
        key,
        tracks: [],
        frameCount: 0,
        frameRange: [Infinity, -Infinity],
        name: "",
        team: t.team || "unknown",
      };
      playerGroups.set(key, g);
    }
    g.tracks.push(t);
    g.frameCount += t.frame_count;
    if (t.frame_range && t.frame_range.length === 2) {
      if (t.frame_range[0] < g.frameRange[0]) g.frameRange[0] = t.frame_range[0];
      if (t.frame_range[1] > g.frameRange[1]) g.frameRange[1] = t.frame_range[1];
    }
    // Pick the first non-empty, non-'ignore' name as canonical.
    if (!g.name && t.player_name && t.player_name !== "ignore") g.name = t.player_name;
    else if (!g.name && t.player_name === "ignore") g.name = "ignore";
  }
  // Default frameRange when a group has no real frames.
  for (const g of playerGroups.values()) {
    if (g.frameRange[0] === Infinity) g.frameRange = [0, 0];
  }

  // selectedRows stores rowKey (player_id or fallback). drawTrackOverlay
  // expands these into the underlying track_ids on each draw.
  const selectedRows = new Set();
  // Row whose name input currently has keyboard focus — its tracks
  // also light up orange in the overlay so the operator can see which
  // bbox the row they're editing corresponds to, without needing to
  // tick the checkbox first.
  let focusedRowKey = null;
  const rowsByTrackId = new Map(); // track_id → row controls (shared across members)

  function selectedTrackIdSet() {
    const out = new Set();
    for (const key of selectedRows) {
      const g = playerGroups.get(key);
      if (g) for (const t of g.tracks) out.add(t.track_id);
    }
    if (focusedRowKey) {
      const g = playerGroups.get(focusedRowKey);
      if (g) for (const t of g.tracks) out.add(t.track_id);
    }
    return out;
  }

  function refreshMergeBtn() {
    mergeBtn.disabled = selectedRows.size < 2;
    mergeBtn.textContent = selectedRows.size < 2
      ? "Merge Selected"
      : `Merge Selected (${selectedRows.size})`;
    deleteBtn.disabled = selectedRows.size === 0;
    deleteBtn.textContent = selectedRows.size === 0
      ? "Delete Selected"
      : `Delete Selected (${selectedRows.size})`;
    interpBtn.disabled = selectedRows.size === 0;
    interpBtn.textContent = selectedRows.size === 0
      ? "Interp Missing Frames"
      : `Interp Missing Frames (${selectedRows.size})`;
  }

  for (const g of playerGroups.values()) {
    const item = document.createElement("div");
    item.dataset.rowKey = g.key;
    item.style.cssText = "display:flex;align-items:center;gap:6px;padding:6px 8px;border-bottom:1px solid #1e293b;transition:background 0.2s;";

    // Selection checkbox (for merge) — operates on the whole group.
    const sel = document.createElement("input");
    sel.type = "checkbox";
    sel.style.cssText = "flex-shrink:0;cursor:pointer;";
    sel.addEventListener("change", () => {
      if (sel.checked) selectedRows.add(g.key);
      else selectedRows.delete(g.key);
      refreshMergeBtn();
      lastFrame = -1;
      drawCurrent();
    });
    item.appendChild(sel);

    // Color dot
    const namedOk = g.name && g.name !== "ignore";
    const dot = document.createElement("span");
    dot.style.cssText = `width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${namedOk ? "#22c55e" : "#ef4444"};`;
    item.appendChild(dot);

    // Player ID label — click jumps the video to the middle of the union range.
    const idLabel = document.createElement("a");
    idLabel.href = "#";
    idLabel.textContent = g.key;
    idLabel.style.cssText = "color:#818cf8;font-size:11px;text-decoration:none;flex-shrink:0;min-width:34px;";
    const memberList = g.tracks.map((t) => `${t.track_id} [${t.frame_range[0]}–${t.frame_range[1]}]`).join(", ");
    idLabel.title = g.tracks.length > 1
      ? `${g.tracks.length} tracks merged (${memberList})`
      : `${g.frameCount} frames in [${g.frameRange[0]}–${g.frameRange[1]}]`;
    idLabel.addEventListener("click", (e) => {
      e.preventDefault();
      const mid = Math.round((g.frameRange[0] + g.frameRange[1]) / 2);
      video.pause();
      video.currentTime = mid / fps;
    });
    item.appendChild(idLabel);

    // Member-count badge when more than one track sits behind this row.
    if (g.tracks.length > 1) {
      const countBadge = document.createElement("span");
      countBadge.textContent = `×${g.tracks.length}`;
      countBadge.style.cssText = "font-size:10px;color:#94a3b8;flex-shrink:0;font-variant-numeric:tabular-nums;";
      item.appendChild(countBadge);
    }

    // Name input — applies to every member track
    const nameInput = document.createElement("input");
    nameInput.type = "text";
    nameInput.value = g.name || "";
    nameInput.placeholder = "Name…";
    nameInput.setAttribute("list", datalistId);
    nameInput.style.cssText = "flex:1;min-width:0;background:#0f1117;color:#e2e8f0;border:1px solid #334155;padding:3px 6px;border-radius:3px;font-size:12px;";
    // Light up this row's bbox in orange while its name field has
    // focus, so the operator can see which player on the pitch they
    // are about to rename.
    nameInput.addEventListener("focus", () => {
      focusedRowKey = g.key;
      lastFrame = -1;
      drawCurrent();
    });
    nameInput.addEventListener("blur", () => {
      if (focusedRowKey === g.key) focusedRowKey = null;
      lastFrame = -1;
      drawCurrent();
    });
    nameInput.addEventListener("change", async () => {
      const newName = nameInput.value.trim();
      // PATCH every member track in parallel.
      const results = await Promise.all(
        g.tracks.map((t) =>
          fetch(`/api/tracks/${encodeURIComponent(shotId)}/${encodeURIComponent(t.track_id)}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ player_name: newName }),
          })
        )
      );
      if (results.some((r) => !r.ok)) { status.textContent = "Save failed"; return; }
      g.name = newName;
      for (const t of g.tracks) t.player_name = newName;
      dot.style.background = newName && newName !== "ignore" ? "#22c55e" : "#ef4444";
      if (newName && newName !== "ignore" && !allNames.has(newName)) {
        allNames.add(newName);
        rebuildDatalist(datalist, allNames);
      }
      // Propagate the rename through the in-memory bbox index so the
      // video overlay re-renders without a server round-trip.
      const memberIds = new Set(g.tracks.map((t) => t.track_id));
      for (const boxes of frameIndex.values()) {
        for (const b of boxes) {
          if (memberIds.has(b.track_id)) b.player_name = newName;
        }
      }
      lastFrame = -1;
      drawCurrent();
      status.textContent = `Saved ${g.key}`;
      setTimeout(() => { if (status.textContent === `Saved ${g.key}`) status.textContent = ""; }, 1500);
    });
    item.appendChild(nameInput);

    // Team badge (most common across members; ties broken by first occurrence)
    const teamCounts = {};
    for (const t of g.tracks) teamCounts[t.team || "unknown"] = (teamCounts[t.team || "unknown"] || 0) + 1;
    const teamLabel = Object.entries(teamCounts).sort((a, b) => b[1] - a[1])[0][0];
    const teamBadge = document.createElement("span");
    teamBadge.textContent = teamLabel || "?";
    teamBadge.style.cssText = `font-size:10px;flex-shrink:0;padding:1px 5px;border-radius:3px;color:#fff;background:${TEAM_COLORS[teamLabel] || TEAM_COLORS.unknown};`;
    item.appendChild(teamBadge);

    // Split at current frame ✂ — only the member that owns the current frame is split.
    const splitBtn = document.createElement("button");
    splitBtn.textContent = "✂";
    splitBtn.title = g.tracks.length > 1
      ? "Split the underlying member track that contains the current video frame."
      : "Split this track at the current video frame.";
    splitBtn.style.cssText = "background:none;border:1px solid #475569;color:#94a3b8;border-radius:3px;padding:1px 6px;cursor:pointer;font-size:12px;flex-shrink:0;";
    splitBtn.addEventListener("click", async () => {
      const f = Math.round(video.currentTime * fps);
      const target = g.tracks.find((t) => f > t.frame_range[0] && f <= t.frame_range[1]);
      if (!target) {
        status.textContent = "Split failed: current frame is outside every member track's range";
        return;
      }
      splitBtn.disabled = true; const prev = splitBtn.textContent; splitBtn.textContent = "…";
      const res = await fetch("/api/tracks/split", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ shot_id: shotId, track_id: target.track_id, split_frame: f }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        status.textContent = `Split failed: ${err.detail || res.statusText}`;
        splitBtn.textContent = prev; splitBtn.disabled = false;
        return;
      }
      const fresh = await fetchJsonOrNull(`/tracking/preview?shot_id=${encodeURIComponent(shotId)}`);
      container.innerHTML = "";
      if (fresh && fresh.tracks) buildTrackEditor(container, shotId, fresh);
    });
    item.appendChild(splitBtn);

    // Delete × — drops every member track for this player.
    const deleteRowBtn = document.createElement("button");
    deleteRowBtn.textContent = "×";
    deleteRowBtn.title = g.tracks.length > 1
      ? `Delete this player and all ${g.tracks.length} underlying tracks.`
      : "Delete this track entirely.";
    deleteRowBtn.style.cssText = "background:none;border:1px solid #7f1d1d;color:#fca5a5;border-radius:3px;padding:1px 7px;cursor:pointer;font-size:13px;flex-shrink:0;line-height:1;";
    deleteRowBtn.addEventListener("click", async () => {
      const label = namedOk ? g.name : g.key;
      const suffix = g.tracks.length > 1 ? ` (${g.tracks.length} tracks)` : "";
      if (!confirm(`Delete ${label}${suffix}? This cannot be undone.`)) return;
      deleteRowBtn.disabled = true; deleteRowBtn.textContent = "…";
      const results = await Promise.all(
        g.tracks.map((t) =>
          fetch(
            `/api/tracks/${encodeURIComponent(shotId)}/${encodeURIComponent(t.track_id)}`,
            { method: "DELETE" }
          )
        )
      );
      if (results.some((r) => !r.ok)) {
        status.textContent = "Delete failed for one or more member tracks";
        deleteRowBtn.textContent = "×"; deleteRowBtn.disabled = false;
        return;
      }
      const fresh = await fetchJsonOrNull(`/tracking/preview?shot_id=${encodeURIComponent(shotId)}`);
      container.innerHTML = "";
      if (fresh && fresh.tracks) buildTrackEditor(container, shotId, fresh);
    });
    item.appendChild(deleteRowBtn);

    listCol.appendChild(item);
    // Map every member track_id to this same row controls so click-to-focus
    // from the canvas lands on the correct row regardless of which member
    // bbox the operator clicked.
    for (const t of g.tracks) {
      rowsByTrackId.set(t.track_id, { item, sel, nameInput, dot });
    }
  }

  // ── Toolbar handlers ──
  mergeBtn.addEventListener("click", async () => {
    if (selectedRows.size < 2) return;
    // Expand selected rows to the underlying track_ids and POST.
    const ids = Array.from(selectedTrackIdSet());
    mergeBtn.disabled = true; mergeBtn.textContent = "Merging…";
    const res = await fetch("/api/tracks/merge", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ shot_id: shotId, track_ids: ids }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      status.textContent = `Merge failed: ${err.detail || res.statusText}`;
      mergeBtn.disabled = false; refreshMergeBtn();
      return;
    }
    const out = await res.json();
    const collisionNote = out.frame_collisions
      ? ` (${out.frame_collisions} frame collision${out.frame_collisions === 1 ? "" : "s"} resolved by confidence)`
      : "";
    status.textContent = `Merged into ${out.merged_into}${collisionNote} — reloading…`;
    const fresh = await fetchJsonOrNull(`/tracking/preview?shot_id=${encodeURIComponent(shotId)}`);
    container.innerHTML = "";
    if (fresh && fresh.tracks) buildTrackEditor(container, shotId, fresh);
  });

  mergeByNameBtn.addEventListener("click", async () => {
    mergeByNameBtn.disabled = true;
    const prev = mergeByNameBtn.textContent;
    mergeByNameBtn.textContent = "Merging…";
    const res = await fetch("/api/tracks/merge-by-name", { method: "POST" });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      status.textContent = `Merge-by-name failed: ${err.detail || res.statusText}`;
      mergeByNameBtn.textContent = prev;
      mergeByNameBtn.disabled = false;
      return;
    }
    const out = await res.json();
    const collisionNote = out.frame_collisions
      ? ` (${out.frame_collisions} frame collision${out.frame_collisions === 1 ? "" : "s"} resolved by confidence)`
      : "";
    status.textContent = `Merged ${out.tracks_removed} track(s) across ${out.merged_groups} name(s)${collisionNote} — reloading…`;
    const fresh = await fetchJsonOrNull(`/tracking/preview?shot_id=${encodeURIComponent(shotId)}`);
    container.innerHTML = "";
    if (fresh && fresh.tracks) buildTrackEditor(container, shotId, fresh);
  });

  ignoreBtn.addEventListener("click", async () => {
    ignoreBtn.disabled = true;
    const res = await fetch(`/api/tracks/ignore-unknown/${encodeURIComponent(shotId)}`, { method: "POST" });
    ignoreBtn.disabled = false;
    if (!res.ok) { status.textContent = "Ignore failed"; return; }
    const out = await res.json();
    status.textContent = `Marked ${out.count} as 'ignore' — reloading…`;
    const fresh = await fetchJsonOrNull(`/tracking/preview?shot_id=${encodeURIComponent(shotId)}`);
    container.innerHTML = "";
    if (fresh && fresh.tracks) buildTrackEditor(container, shotId, fresh);
  });

  deleteBtn.addEventListener("click", async () => {
    if (selectedRows.size === 0) {
      status.textContent = "No rows checked";
      return;
    }
    // Snapshot the checked rows and the tracks they expand to before
    // we mutate anything — the per-row checkbox listeners may fire
    // during the animation as rows are removed from the DOM.
    const selectedKeys = Array.from(selectedRows);
    const trackIds = Array.from(selectedTrackIdSet());
    if (trackIds.length === 0) return;
    const plural = selectedKeys.length === 1 ? "row" : "rows";
    if (!confirm(`Delete ${selectedKeys.length} selected ${plural} (${trackIds.length} track${trackIds.length === 1 ? "" : "s"})? This cannot be undone.`)) return;
    deleteBtn.disabled = true;

    // Collect the DOM rows for the animation. Each playerGroups row
    // shares a single ``item`` across its member tracks, so grabbing
    // the first member's entry in rowsByTrackId is sufficient.
    const rowsToAnimate = [];
    for (const key of selectedKeys) {
      const g = playerGroups.get(key);
      if (!g || !g.tracks.length) continue;
      const ref = rowsByTrackId.get(g.tracks[0].track_id);
      if (ref && ref.item) rowsToAnimate.push(ref.item);
    }

    // Fade + collapse animation. Pin max-height so the transition
    // can shrink it; transition all four properties together so the
    // row vacates its space in the list smoothly.
    const ANIM_MS = 260;
    for (const row of rowsToAnimate) {
      row.style.maxHeight = row.offsetHeight + "px";
      row.style.overflow = "hidden";
      row.style.transition = `opacity ${ANIM_MS}ms ease, max-height ${ANIM_MS}ms ease, padding ${ANIM_MS}ms ease, margin ${ANIM_MS}ms ease`;
    }
    // Force layout, then trigger the transition on the next frame.
    void rowsToAnimate[0]?.offsetHeight;
    requestAnimationFrame(() => {
      for (const row of rowsToAnimate) {
        row.style.opacity = "0";
        row.style.maxHeight = "0px";
        row.style.paddingTop = "0px";
        row.style.paddingBottom = "0px";
        row.style.marginTop = "0px";
        row.style.marginBottom = "0px";
        row.style.borderBottomWidth = "0px";
      }
    });

    // One bulk request — the server applies all removals in a single
    // load-modify-save under a per-shot lock. Parallel DELETEs used
    // to race on the JSON file and corrupt it.
    const deletePromise = fetch(
      `/api/tracks/${encodeURIComponent(shotId)}/delete-bulk`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ track_ids: trackIds }),
      },
    );
    const [res] = await Promise.all([
      deletePromise,
      new Promise((resolve) => setTimeout(resolve, ANIM_MS)),
    ]);
    deleteBtn.disabled = false;
    if (!res.ok) {
      status.textContent = "Delete failed";
      return;
    }
    status.textContent = `Deleted ${trackIds.length} track${trackIds.length === 1 ? "" : "s"} — reloading…`;
    const fresh = await fetchJsonOrNull(`/tracking/preview?shot_id=${encodeURIComponent(shotId)}`);
    container.innerHTML = "";
    if (fresh && fresh.tracks) buildTrackEditor(container, shotId, fresh);
  });

  interpBtn.addEventListener("click", async () => {
    if (selectedRows.size === 0) {
      status.textContent = "No rows checked";
      return;
    }
    const trackIds = Array.from(selectedTrackIdSet());
    if (trackIds.length === 0) return;
    interpBtn.disabled = true;
    const prev = interpBtn.textContent;
    interpBtn.textContent = "Interpolating…";
    const res = await fetch(
      `/api/tracks/${encodeURIComponent(shotId)}/interpolate-gaps`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ track_ids: trackIds }),
      },
    );
    interpBtn.disabled = false;
    interpBtn.textContent = prev;
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      status.textContent = `Interp failed: ${err.detail || res.statusText}`;
      return;
    }
    const out = await res.json();
    if (out.total_frames_added === 0) {
      status.textContent = "No gaps to fill within max_gap.";
      return;
    }
    status.textContent = `Filled ${out.total_frames_added} frame${out.total_frames_added === 1 ? "" : "s"} across ${out.results.length} track${out.results.length === 1 ? "" : "s"} — reloading…`;
