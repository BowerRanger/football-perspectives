    seek.value = String(currentFrame);
    const sec = ((currentFrame - minFrame) / Math.max(1, fps)).toFixed(2);
    frameLabel.textContent = `Frame ${currentFrame}  (${sec}s)`;
    td.setFrame(currentFrame);
    td3.setFrame(currentFrame);
    if (editorRef && editorRef.setFrameExternal) {
      editorRef.setFrameExternal(currentFrame);
    }
  }
  setFrame(minFrame);
  seek.addEventListener("input", () => setFrame(Number(seek.value)));
  stepBack.addEventListener("click", () => setFrame(currentFrame - 1));
  stepFwd.addEventListener("click", () => setFrame(currentFrame + 1));

  let playing = false, rafId = null, lastTs = 0;
  function tick(ts) {
    if (!playing) return;
    if (!lastTs) lastTs = ts;
    const dt = (ts - lastTs) / 1000;
    const advance = Math.floor(dt * fps);
    if (advance >= 1) {
      let next = currentFrame + advance;
      if (next > maxFrame) next = minFrame;
      setFrame(next);
      lastTs = ts;
    }
    rafId = requestAnimationFrame(tick);
  }
  playBtn.addEventListener("click", () => {
    playing = !playing;
    playBtn.textContent = playing ? "❚❚" : "▶";
    lastTs = 0;
    if (playing) rafId = requestAnimationFrame(tick);
    else if (rafId) cancelAnimationFrame(rafId);
  });

  // Unified ball editor: video + canvas overlay with toggleable layers
  // (anchors / predicted ball path). Replaces the previously-separate
  // Source overlay + Ball Anchor Editor panels.
  const editorPanel = makePanel("Ball Anchor Editor");
  const editor = buildBallAnchorEditor(data, shotId);
  editorPanel.body.appendChild(editor.element);
  panel.appendChild(editorPanel.wrap);

  // Bind the editor's frame-change callback to setFrame so editor
  // scrub/play/step updates flow back to the trajectory panels. The
  // _expectedFrame guard inside setFrameExternal prevents the call
  // round-tripping into a loop.
  editorRef = editor;
  if (editor.setOnFrameChanged) {
    editor.setOnFrameChanged((fi) => setFrame(fi));
  }
  if (editor.setFrameExternal) {
    // Push the initial frame to the editor so it starts in sync.
    editor.setFrameExternal(currentFrame);
  }
}

// ── Inline ball anchor editor ───────────────────────────────────────

    {
      id: "airborne_mid", label: "Airborne — mid", color: "#fb923c",
      range: "2 – 10 m",
      description: "Ball in the air, head-to-rooftop height. Soft hint at 6 m.",

      id: "airborne_high", label: "Airborne — high", color: "#f87171",

    },
    {
      id: "goal_impact", label: "Goal impact", color: "#f59e0b",
      range: "goal-frame, event",
      description: "Ball strikes part of the goal (post, crossbar, back net, or side net). The trajectory is pinned at the geometrically-known contact point — the pixel ray is intersected with the chosen element using FIFA goal dimensions. Splits the flight run so the post-impact direction is fit independently from observed pixels. Required: goal element (selected in the dropdown that appears when this tag is active).",
    },
    {
      id: "catch", label: "Catch", color: "#a78bfa",
      range: "z = 1.5 m, event",
      description: "Ball stops in a player's hands. Hard knot at chest height; ends a flight segment without starting a new one. (For mid-flight body-part contacts use 'Player touch' instead.)",

  // ── Video + canvas column.
  const videoCol = document.createElement("div");
  videoCol.style.cssText = "display:flex;flex-direction:column;gap:6px;";
  const stage = document.createElement("div");
  stage.style.cssText = "position:relative;background:#000;border-radius:4px;overflow:hidden;";
  const video = document.createElement("video");
  video.src = `/api/video/${encodeURIComponent(shotId)}`;
  video.preload = "metadata";
  video.muted = true;
  video.style.cssText = "display:block;width:100%;height:auto;";
  const overlay = document.createElement("canvas");
  overlay.style.cssText = "position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:auto;cursor:crosshair;";
  stage.appendChild(video);
  stage.appendChild(overlay);
  videoCol.appendChild(stage);

  // Controls below the video.
  const ctrl = document.createElement("div");
  ctrl.style.cssText = "display:flex;align-items:center;gap:6px;font-size:11px;color:#94a3b8;";
  const playBtn = makeToolbarBtn("▶", "#4f46e5"); playBtn.style.minWidth = "32px";
  const prevBtn = makeToolbarBtn("◀", "#334155"); prevBtn.title = "Previous frame";
  const nextBtn = makeToolbarBtn("▶", "#334155"); nextBtn.title = "Next frame";
  const seek = document.createElement("input");

  // ── Anchor list column.

  anchorCol.style.cssText = "background:#181b25;border:1px solid #2d3148;border-radius:4px;padding:6px;max-height:560px;overflow-y:auto;";
  const anchorListEl = document.createElement("div");
  anchorCol.appendChild(anchorListEl);
  grid.appendChild(anchorCol);

  // ── State.
  let fps = data.fps || 30;
  let imageSize = [1280, 720];
  let anchors = [];
  let dirty = false;
  // Per-frame predicted ball world position from /ball/preview (data.frames).
  // Projected back to pixels using the camera track after camera loads.
  const predictedWorldByFrame = new Map();
  for (const f of (data.frames || [])) {
    if (f.world_xyz) {
      predictedWorldByFrame.set(f.frame, { xyz: f.world_xyz, state: f.state });
    }
  }
  const predictedPixelByFrame = new Map();  // populated once camera loads
  const camByFrame = new Map();

  function setStatus(msg) { statusEl.textContent = msg; }
  function setDirty(d) {
    dirty = d;

  function renderTags() {
    tagListEl.innerHTML = "";

  function renderAnchors() {
    anchorListEl.innerHTML = "";

      anchorListEl.appendChild(empty);
      return;
    }
    const sorted = [...anchors].sort((a, b) => a.frame - b.frame);
    for (const a of sorted) {
      const tag = TAGS.find(x => x.id === a.state) || { color: "#94a3b8", label: a.state };
      const row = document.createElement("div");
      row.style.cssText = "padding:5px 8px;cursor:pointer;border-radius:3px;font-size:11px;color:#cbd5e1;display:flex;align-items:center;gap:6px;";
      row.onmouseover = () => row.style.background = "#252840";
      row.onmouseout = () => row.style.background = "";
      let extra = "";
      if (a.state === "player_touch" && a.player_id) {
        let sub = `${a.player_id}/${a.bone || "?"}`;
        if (a.touch_type) {
          sub += `, ${a.touch_type}`;
          if (a.spin && a.spin !== "none") sub += `: ${a.spin}`;
        }
        extra = ` <span style="color:#64748b;">(${sub})</span>`;
      } else if (a.state === "goal_impact" && a.goal_element) {
        extra = ` <span style="color:#64748b;">(${a.goal_element})</span>`;
      }
      row.innerHTML = `
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${tag.color};flex-shrink:0;"></span>
        <span style="flex:1;">Frame ${a.frame}${extra}</span>
        <span style="color:#64748b;font-size:10px;">${a.state}</span>
      `;
      row.onclick = () => { video.currentTime = a.frame / fps; };
      anchorListEl.appendChild(row);
    }
  }

  function currentFrame() { return Math.round(video.currentTime * fps); }

  function fitOverlay() {
    if (!video.videoWidth) return;
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
    overlay.style.width = video.offsetWidth + "px";
    overlay.style.height = video.offsetHeight + "px";
  }

  function drawOverlay() {
    if (!overlay.width) return;
    const ctx = overlay.getContext("2d");
    ctx.clearRect(0, 0, overlay.width, overlay.height);
    const fi = currentFrame();
    frameLabel.textContent = `Frame ${fi}`;
    seek.value = String(fi);

    // Layer: predicted ball path. White cross-hair + outline circle,
    // colored by state (grounded=green, flight=orange) for a quick
    // sanity check against the operator's anchors.
    if (predictionToggle.checkbox.checked) {
      const uv = predictedPixelByFrame.get(fi);
      const pred = predictedWorldByFrame.get(fi);
      if (uv && pred) {
        const colour = pred.state === "flight" ? "#fb923c"
                     : pred.state === "grounded" ? "#34d399"
                     : "#64748b";
        ctx.strokeStyle = colour;
        ctx.fillStyle = colour;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(uv[0], uv[1], 10, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(uv[0], uv[1], 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(uv[0] - 16, uv[1]); ctx.lineTo(uv[0] - 4, uv[1]);
        ctx.moveTo(uv[0] + 4, uv[1]); ctx.lineTo(uv[0] + 16, uv[1]);
        ctx.moveTo(uv[0], uv[1] - 16); ctx.lineTo(uv[0], uv[1] - 4);
        ctx.moveTo(uv[0], uv[1] + 4); ctx.lineTo(uv[0], uv[1] + 16);
        ctx.stroke();
        const label = `${pred.state} z=${pred.xyz[2].toFixed(2)}m`;
        ctx.font = "bold 11px -apple-system, sans-serif";
        const tw = ctx.measureText(label).width + 8;
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(uv[0] - tw / 2, uv[1] - 30, tw, 14);
        ctx.fillStyle = colour;
        ctx.fillText(label, uv[0] - tw / 2 + 4, uv[1] - 19);
      }
    }

    // Layer: anchor crosshairs.
    if (anchorsToggle.checkbox.checked) {
      for (const a of anchors) {
        if (a.frame !== fi || a.image_xy == null) continue;
        const tag = TAGS.find(x => x.id === a.state) || { color: "#fff" };
        ctx.strokeStyle = tag.color; ctx.fillStyle = tag.color;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(a.image_xy[0], a.image_xy[1], 12, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(a.image_xy[0], a.image_xy[1], 3, 0, Math.PI * 2); ctx.fill();
      }
    }
  }

  function projectWorldToPixel(xyz, cf, tFallback) {
    if (!cf || !cf.R || !cf.K) return null;
    const tv = cf.t || tFallback;
    if (!tv) return null;
    const [x, y, z] = xyz;
    const R = cf.R, K = cf.K;
    const cx = R[0][0] * x + R[0][1] * y + R[0][2] * z + tv[0];
    const cy = R[1][0] * x + R[1][1] * y + R[1][2] * z + tv[1];
    const cz = R[2][0] * x + R[2][1] * y + R[2][2] * z + tv[2];
    if (cz <= 0) return null;
    const u = (K[0][0] * cx + K[0][1] * cy + K[0][2] * cz) / cz;
    const v = (K[1][0] * cx + K[1][1] * cy + K[1][2] * cz) / cz;
    return [u, v];
  }

  anchorsToggle.checkbox.addEventListener("change", drawOverlay);
  predictionToggle.checkbox.addEventListener("change", drawOverlay);

  overlay.addEventListener("click", (e) => {
    if (selectedTag === "off_screen_flight") return;
    if (selectedTag === "player_touch" && !selectedPlayer) {
      setStatus("Pick a player before placing a Player touch anchor");
      return;
    }
    if (selectedTag === "goal_impact" && !selectedGoalElement) {
      setStatus("Pick a goal element before placing a Goal impact anchor");
      return;
    }
    const rect = overlay.getBoundingClientRect();
    const u = (e.clientX - rect.left) * (overlay.width / rect.width);
    const v = (e.clientY - rect.top) * (overlay.height / rect.height);
    const fi = currentFrame();
    anchors = anchors.filter(a => a.frame !== fi);
    const newAnchor = { frame: fi, image_xy: [u, v], state: selectedTag };
    if (selectedTag === "player_touch") {
      newAnchor.player_id = selectedPlayer;
      newAnchor.bone = selectedBone;
      if (selectedTouchType) {
        newAnchor.touch_type = selectedTouchType;
        if ((selectedTouchType === "shot" || selectedTouchType === "volley")
            && selectedSpin && selectedSpin !== "none") {
          newAnchor.spin = selectedSpin;
        }
      }
    } else if (selectedTag === "goal_impact") {
      newAnchor.goal_element = selectedGoalElement;
    }
    anchors.push(newAnchor);
    setDirty(true);
    renderAnchors();
    drawOverlay();
  });

  overlay.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    const rect = overlay.getBoundingClientRect();
    const u = (e.clientX - rect.left) * (overlay.width / rect.width);
    const v = (e.clientY - rect.top) * (overlay.height / rect.height);
    const fi = currentFrame();
    const hit = anchors.findIndex(a =>
      a.frame === fi && a.image_xy &&
      (Math.hypot(a.image_xy[0] - u, a.image_xy[1] - v) < 16)
    );
    if (hit >= 0) {
      anchors.splice(hit, 1);
      setDirty(true);
      renderAnchors();
      drawOverlay();
    }
  });

  offScreenBtn.onclick = () => {
    const fi = currentFrame();
    anchors = anchors.filter(a => a.frame !== fi);
    anchors.push({ frame: fi, image_xy: null, state: "off_screen_flight" });
    setDirty(true);
    renderAnchors();
    drawOverlay();
  };

  // Playback controls.
  let rafId = null;
  playBtn.onclick = () => {
    if (video.paused) {
      video.play();
      playBtn.textContent = "⏸";
      const loop = () => { rafId = requestAnimationFrame(loop); drawOverlay(); };
      if (!rafId) loop();
    } else {
      video.pause();
      playBtn.textContent = "▶";
      cancelAnimationFrame(rafId); rafId = null;
    }
  };
  prevBtn.onclick = () => { video.pause(); video.currentTime = Math.max(0, video.currentTime - 1 / fps); };
  nextBtn.onclick = () => { video.pause(); video.currentTime = Math.min(video.duration || 0, video.currentTime + 1 / fps); };
  seek.oninput = () => { video.pause(); video.currentTime = parseInt(seek.value, 10) / fps; };
  // Frame-sync interface: the trajectory timeline (in renderBallShot)
  // calls setFrameExternal to slave the editor video; the editor calls
  // back to setOnFrameChanged when its own controls move the frame.
  // Loop avoidance: setFrameExternal records the expected frame; when
  // the timeupdate handler sees the same frame it skips the callback.
  let _onFrameChangedCb = null;
  let _expectedFrame = -1;
  function setFrameExternal(fi) {
    _expectedFrame = fi;
    if (Math.abs(video.currentTime - fi / fps) > 0.5 / fps) {
      video.currentTime = fi / fps;
    }
    drawOverlay();
  }
  function setOnFrameChanged(cb) { _onFrameChangedCb = cb; }

  video.addEventListener("timeupdate", () => {
    drawOverlay();
    const fi = currentFrame();
    if (fi !== _expectedFrame && _onFrameChangedCb) {
      _onFrameChangedCb(fi);
    }
    _expectedFrame = fi;
  });
  video.addEventListener("pause", () => {
    playBtn.textContent = "▶";
    cancelAnimationFrame(rafId); rafId = null;
    drawOverlay();
  });
  video.addEventListener("ended", () => { playBtn.textContent = "▶"; });
  video.addEventListener("loadedmetadata", () => {
    seek.max = String(Math.round(video.duration * fps));
    fitOverlay(); drawOverlay();
  });
  new ResizeObserver(fitOverlay).observe(video);

  // Save button — POST to /ball-anchors/{shot}.
  saveBtn.onclick = async () => {
    const payload = { clip_id: shotId, image_size: imageSize, anchors };
    setStatus("Saving…");
    try {
      const r = await fetch(`/ball-anchors/${encodeURIComponent(shotId)}`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (r.ok) {
        const body = await r.json();
        setStatus(`Saved ${body.count} anchors. Re-run Ball stage to apply.`);
        dirty = false;
      } else {
        const txt = await r.text();
        setStatus(`Save failed (${r.status}): ${txt.slice(0, 80)}`);
      }
    } catch (exc) {
      setStatus(`Save error: ${exc}`);
    }
  };

  // Load camera + existing anchors, then project predicted ball
  // world_xyz to pixels so the prediction layer can render.
  (async () => {
    const cam = await fetchJsonOrNull(`/camera/track?shot=${encodeURIComponent(shotId)}`);
    if (cam && cam.fps) fps = cam.fps;
    if (cam && cam.image_size) imageSize = cam.image_size;
    if (cam && cam.frames) {
      for (const cf of cam.frames) camByFrame.set(cf.frame, cf);
      const tFallback = cam.t_world || null;
      for (const [frame, pred] of predictedWorldByFrame.entries()) {
        const uv = projectWorldToPixel(pred.xyz, camByFrame.get(frame), tFallback);
        if (uv) predictedPixelByFrame.set(frame, uv);
      }
    }
    const ar = await fetchJsonOrNull(`/ball-anchors/${encodeURIComponent(shotId)}`);
    anchors = (ar && ar.anchors) ? ar.anchors.map(a => ({
      frame: a.frame,
      image_xy: a.image_xy,
      state: a.state,
      player_id: a.player_id || null,
      bone: a.bone || null,
      goal_element: a.goal_element || null,
      touch_type: a.touch_type || null,
      spin: a.spin || null,
    })) : [];
    // Populate player dropdown from hmr_world tracks for this shot.
    const playerList = await fetchJsonOrNull(
      `/hmr_world/kp2d_players?shot=${encodeURIComponent(shotId)}`
    );
    availablePlayers = (playerList && playerList.players) || [];
    playerSel.innerHTML = "";
    if (availablePlayers.length === 0) {
      const opt = document.createElement("option");
      opt.value = ""; opt.textContent = "(no players in hmr_world)";
      opt.disabled = true;
      playerSel.appendChild(opt);
    } else {
      const empty = document.createElement("option");
      empty.value = ""; empty.textContent = "— pick a player —";
      playerSel.appendChild(empty);
      for (const p of availablePlayers) {
        const opt = document.createElement("option");
        opt.value = p.player_id;
        opt.textContent = p.player_name
          ? `${p.player_name} (${p.player_id})`
          : p.player_id;
        playerSel.appendChild(opt);
      }
    }
    renderTags();
    renderAnchors();
    updateTouchPicker();
    const predCount = predictedPixelByFrame.size;
    setStatus(
      predCount > 0
        ? `${anchors.length} anchors loaded • ${predCount} predicted ball frames`
        : `${anchors.length} anchors loaded`
    );
    drawOverlay();
  })();

  return { element: wrap, setFrameExternal, setOnFrameChanged };
}

// ── Top-down ball trajectory canvas ─────────────────────────────────
// Pitch + per-frame ball positions, color-coded by state:
//   grounded = green, flight = orange, missing = (no marker, line gap).
// A solid filled dot tracks the current frame.
function buildBallTopdown(data) {
  const PITCH_L = 105, PITCH_W = 68;
  const MARGIN = 8;
  const scale = 5.5, padding = 20;
  const W = (PITCH_L + 2 * MARGIN) * scale + padding * 2;
  const H = (PITCH_W + 2 * MARGIN) * scale + padding * 2;
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  canvas.style.cssText = "max-width:100%;height:auto;display:block;background:#0a1f10;border-radius:4px;";
  const ctx = canvas.getContext("2d");

  function pitch2px(x, y) {
    return [
      padding + (x + MARGIN) * scale,
      padding + (PITCH_W + MARGIN - y) * scale,
    ];
  }

  function drawPitch() {
    ctx.fillStyle = "#0a1f10";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#0b3b1a";
    const [x0, y0] = pitch2px(0, PITCH_W);
    ctx.fillRect(x0, y0, PITCH_L * scale, PITCH_W * scale);
    ctx.strokeStyle = "#e2e8f0"; ctx.lineWidth = 1.4;
    const corners = [[0, 0], [PITCH_L, 0], [PITCH_L, PITCH_W], [0, PITCH_W]];
    ctx.beginPath();
    for (let i = 0; i < corners.length; i++) {
      const [x, y] = pitch2px(...corners[i]);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.stroke();
    // Halfway line + centre circle
    ctx.beginPath();
    const m1 = pitch2px(PITCH_L / 2, 0), m2 = pitch2px(PITCH_L / 2, PITCH_W);
    ctx.moveTo(m1[0], m1[1]); ctx.lineTo(m2[0], m2[1]); ctx.stroke();
    ctx.beginPath();
    const c = pitch2px(PITCH_L / 2, PITCH_W / 2);
    ctx.arc(c[0], c[1], 9.15 * scale, 0, Math.PI * 2); ctx.stroke();
    // Penalty boxes
    function rectStroke(xa, ya, xb, yb) {
      const [pax, pay] = pitch2px(xa, ya);
      const [pbx, pby] = pitch2px(xb, yb);
      ctx.strokeRect(
        Math.min(pax, pbx), Math.min(pay, pby),
        Math.abs(pbx - pax), Math.abs(pby - pay),
      );
    }
    const yMid = PITCH_W / 2;
    rectStroke(0, yMid - 20.16, 16.5, yMid + 20.16);
    rectStroke(PITCH_L, yMid - 20.16, PITCH_L - 16.5, yMid + 20.16);
    rectStroke(0, yMid - 9.16, 5.5, yMid + 9.16);
    rectStroke(PITCH_L, yMid - 9.16, PITCH_L - 5.5, yMid + 9.16);
  }

  // Pre-index frames for O(1) seeks.
  const byFrame = new Map();
  for (const f of data.frames) byFrame.set(f.frame, f);

  function render(currentFrame) {
    drawPitch();

    // Trajectory polyline. Two passes: grounded (green) and flight (orange).
    function strokeRun(filter, color, lw) {
      ctx.strokeStyle = color; ctx.lineWidth = lw;
      let drawing = false;
      ctx.beginPath();
      for (const f of data.frames) {
        if (!f.world_xyz || !filter(f)) {
          drawing = false;
          continue;
        }
        const [px, py] = pitch2px(f.world_xyz[0], f.world_xyz[1]);
        if (!drawing) {
          ctx.moveTo(px, py);
          drawing = true;
        } else {
          ctx.lineTo(px, py);
        }
      }
      ctx.stroke();
    }
    strokeRun((f) => f.state === "grounded", "#4ade80", 1.6);
    strokeRun((f) => f.state === "flight", "#fb923c", 2.2);

    // Current-frame marker.
    const cur = byFrame.get(currentFrame);
    if (cur && cur.world_xyz) {
      const [px, py] = pitch2px(cur.world_xyz[0], cur.world_xyz[1]);
      ctx.fillStyle = cur.state === "flight" ? "#fb923c" : "#fafafa";
      ctx.strokeStyle = "#0a0e1a"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    }

    // Legend
    ctx.font = "11px -apple-system, sans-serif";
    ctx.fillStyle = "#cbd5e1";
    ctx.fillText("grounded", padding + 10, 14);
    ctx.fillStyle = "#4ade80"; ctx.fillRect(padding + 4, 6, 4, 10);
    ctx.fillStyle = "#cbd5e1";
    ctx.fillText("flight", padding + 80, 14);
    ctx.fillStyle = "#fb923c"; ctx.fillRect(padding + 74, 6, 4, 10);
  }

  return {
    element: canvas,
    setFrame: render,
  };
}

// ── 3D ball-only viewer (lazy three.js dynamic import) ─────────────
function buildBall3D(data) {
  const container = document.createElement("div");
  container.style.cssText = "position:relative;width:100%;aspect-ratio:16/10;background:#0a0a0a;border-radius:4px;overflow:hidden;";
  const loading = document.createElement("div");
  loading.style.cssText = "position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:13px;";
  loading.textContent = "Loading 3D viewer…";
  container.appendChild(loading);

  let setFrameImpl = () => {};
  let pending = null;

  (async () => {
    let THREE, OrbitControls;
    try {
      THREE = await import("three");
      ({ OrbitControls } = await import("three/addons/controls/OrbitControls.js"));
    } catch (err) {
      loading.textContent = `3D viewer unavailable (${err.message || err})`;
      return;
    }
    loading.remove();

    const PITCH_L = 105, PITCH_W = 68;
    function pitchToThree(p) { return [p[0], (p[2] || 0), -(p[1] || 0)]; }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);

    const cw = container.clientWidth, ch = container.clientHeight;
    const camera = new THREE.PerspectiveCamera(45, cw / ch, 0.1, 500);
    camera.position.set(52.5, 35, 50);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(cw, ch);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(52.5, 0, -34);
    controls.enableDamping = true;
    controls.update();

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dir = new THREE.DirectionalLight(0xffffff, 0.6);
    dir.position.set(20, 40, 20);
    scene.add(dir);

    // Pitch — copied from viewer.html's pattern.
    const pitchGroup = new THREE.Group();
    {
      const pitchMat = new THREE.MeshStandardMaterial({ color: 0x1a5e1a, side: THREE.DoubleSide });
      const pitchMesh = new THREE.Mesh(new THREE.PlaneGeometry(PITCH_L, PITCH_W), pitchMat);
      pitchMesh.rotation.x = -Math.PI / 2;
      pitchMesh.position.set(PITCH_L / 2, 0, -PITCH_W / 2);
      pitchGroup.add(pitchMesh);
      const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.55 });
      function line(x1, z1, x2, z2) {
        const pts = [new THREE.Vector3(x1, 0.01, -z1), new THREE.Vector3(x2, 0.01, -z2)];
        pitchGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lineMat));
      }
      line(0, 0, PITCH_L, 0);
      line(PITCH_L, 0, PITCH_L, PITCH_W);
      line(PITCH_L, PITCH_W, 0, PITCH_W);
      line(0, PITCH_W, 0, 0);
      line(PITCH_L / 2, 0, PITCH_L / 2, PITCH_W);
      const circPts = [];
      for (let a = 0; a <= Math.PI * 2; a += 0.1) {
        circPts.push(new THREE.Vector3(PITCH_L / 2 + 9.15 * Math.cos(a), 0.01, -(PITCH_W / 2 + 9.15 * Math.sin(a))));
      }
      pitchGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(circPts), lineMat));
      const box18 = (xs, sign) => {
        line(xs, 13.84, xs + sign * 16.5, 13.84);
        line(xs + sign * 16.5, 13.84, xs + sign * 16.5, 54.16);
        line(xs + sign * 16.5, 54.16, xs, 54.16);
      };
      box18(0, 1);
      box18(PITCH_L, -1);
    }
    scene.add(pitchGroup);

    // Build trajectory: split into grounded + flight runs so we can colour them.
    function runsAsLine(filter, color, dashed = false) {
      const pts = [];
      const breakAt = [];
      let runActive = false;
      for (const f of data.frames) {
        if (!f.world_xyz || !filter(f)) {
          if (runActive) breakAt.push(pts.length);
          runActive = false;
          continue;
        }
        const v = pitchToThree(f.world_xyz);
        pts.push(new THREE.Vector3(v[0], v[1], v[2]));
        runActive = true;
      }
      if (pts.length < 2) return;
      const segPts = [];
      let last = 0;
      const breakSet = new Set(breakAt);
      for (let i = 0; i < pts.length - 1; i++) {
        if (breakSet.has(i + 1)) continue;
        segPts.push(pts[i], pts[i + 1]);
      }
      if (segPts.length === 0) return;
      const geom = new THREE.BufferGeometry().setFromPoints(segPts);
      const mat = new THREE.LineBasicMaterial({ color, linewidth: 2 });
      scene.add(new THREE.LineSegments(geom, mat));
    }
    runsAsLine((f) => f.state === "grounded", 0x4ade80);
    runsAsLine((f) => f.state === "flight", 0xfb923c);

    // Ball marker — small sphere.
    const ballGeom = new THREE.SphereGeometry(0.4, 24, 16);
    const ballMat = new THREE.MeshStandardMaterial({ color: 0xfafafa, emissive: 0x222222 });
    const ballMesh = new THREE.Mesh(ballGeom, ballMat);
    ballMesh.visible = false;
    scene.add(ballMesh);

    // Drop shadow line (vertical) for flight clarity.
    const shadowMat = new THREE.LineDashedMaterial({ color: 0x94a3b8, dashSize: 0.3, gapSize: 0.3, transparent: true, opacity: 0.7 });
    const shadowGeom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
    const shadowLine = new THREE.Line(shadowGeom, shadowMat);
    shadowLine.computeLineDistances();
    shadowLine.visible = false;
    scene.add(shadowLine);

    camera.lookAt(controls.target);

    function render() { renderer.render(scene, camera); }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      render();
    }
    animate();

    const byFrame = new Map();
    for (const f of data.frames) byFrame.set(f.frame, f);

    setFrameImpl = (frameIdx) => {
      const f = byFrame.get(frameIdx);
      if (!f || !f.world_xyz) {
        ballMesh.visible = false;
        shadowLine.visible = false;
        return;
      }
      const v = pitchToThree(f.world_xyz);
      ballMesh.position.set(v[0], v[1], v[2]);
      ballMesh.material.color.setHex(f.state === "flight" ? 0xfb923c : 0xfafafa);
      ballMesh.visible = true;
      // Shadow line straight down to the pitch plane.
      shadowLine.geometry.setFromPoints([
        new THREE.Vector3(v[0], v[1], v[2]),
        new THREE.Vector3(v[0], 0.01, v[2]),
      ]);
      shadowLine.computeLineDistances();
      shadowLine.visible = f.state === "flight" && v[1] > 0.2;
    };

    // Resize handling — the panel can be docked or expanded, so refit
    // the renderer when the container's size changes.
    const ro = new ResizeObserver(() => {
      const nw = container.clientWidth, nh = container.clientHeight;
      if (nw === 0 || nh === 0) return;
      renderer.setSize(nw, nh);
      camera.aspect = nw / nh;
      camera.updateProjectionMatrix();
    });
    ro.observe(container);

    if (pending !== null) {
      setFrameImpl(pending);
      pending = null;
    }
  })();

  return {
    element: container,
    setFrame: (fi) => {
      if (setFrameImpl) setFrameImpl(fi);
      else pending = fi;
    },
  };
}

async function renderRefinedPoses(panel) {
  // ── Controls bar: run button + status ──
  const controls = document.createElement("div");
  controls.style.cssText = "display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px 14px;background:#1a1d27;border:1px solid #2d3148;border-radius:8px;font-size:13px;color:#cbd5e1;";
  const note = document.createElement("span");
  note.textContent = "Cross-shot fusion of HMR World tracks on the shared reference timeline.";
  note.style.color = "#94a3b8";
  const runBtn = document.createElement("button");
  runBtn.className = "btn btn-primary";
  runBtn.style.cssText = "font-size:12px;margin-left:auto;";
  runBtn.textContent = "Run refined_poses";
  runBtn.title = "Re-run cross-shot fusion for every player.";
  const status = document.createElement("span");
  status.style.cssText = "color:#94a3b8;font-size:12px;";
  controls.append(note, runBtn, status);
  panel.appendChild(controls);

  const body = document.createElement("div");
  body.style.cssText = "display:flex;flex-direction:column;gap:20px;margin-top:14px;";
  panel.appendChild(body);

  runBtn.addEventListener("click", async () => {
    runBtn.disabled = true;
    status.style.color = "#94a3b8";
    status.textContent = "Dispatching refined_poses…";
    try {
      const res = await fetch("/api/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ stages: "refined_poses" }),
      });
      const payload = await res.json().catch(() => ({}));
      if (!res.ok) {
        status.style.color = "#f87171";
        status.textContent = `Dispatch failed: ${payload.detail || res.statusText}`;
        runBtn.disabled = false;
        return;
      }
      status.style.color = "#4ade80";
      status.textContent = `Job ${payload.job_id} running — log panel above.`;
      attachToJob(payload.job_id, "refined_poses", async () => {
        runBtn.disabled = false;
        await loadStages();
        await renderRefinedShotBody(body);
      });
    } catch (err) {
      status.style.color = "#f87171";
      status.textContent = `Failed to dispatch: ${err.message || err}`;
      runBtn.disabled = false;
    }
  });

  await renderRefinedShotBody(body);
}

async function renderRefinedShotBody(panel) {
  panel.innerHTML = "";

  const [playersResp, summaryResp] = await Promise.all([
    fetchJsonOrNull("/refined_poses/players"),
    fetchJsonOrNull("/refined_poses/summary"),
  ]);
  const players = (playersResp && playersResp.players) || [];

  if (players.length === 0) {
    emptyNote(
      panel,
      "No refined tracks yet — run hmr_world first, then click Run refined_poses above.",
    );
    return;
  }

  // ── Summary card (pipeline-wide counters) ──
  const summary = summaryResp && Object.keys(summaryResp).length ? summaryResp : null;
  if (summary) {
    const { wrap: sWrap, body: sBody } = makePanel("Refined poses — pipeline summary");
    sBody.style.padding = "14px 16px";
    const lines = [
      `<div><strong>${summary.players_refined}</strong> players refined ` +
        `(<strong>${summary.multi_shot_players}</strong> multi-shot, ` +
        `<strong>${summary.single_shot_players}</strong> single-shot)</div>`,
      `<div>Fused frames: <strong>${summary.total_fused_frames}</strong> ` +
        `(<strong>${summary.single_view_frames}</strong> single-view, ` +
        `<strong>${summary.high_disagreement_frames}</strong> flagged)</div>`,
    ];
    if ((summary.shots_missing_sync || []).length > 0) {
      lines.push(
        `<div style="color:#fbbf24;">⚠ Shots missing from sync_map: ` +
          `${summary.shots_missing_sync.join(", ")}</div>`,
      );
    }
    if ((summary.beta_disagreement_warnings || []).length > 0) {
      lines.push(
        `<div style="color:#fbbf24;">⚠ Beta disagreement: ` +
          `${summary.beta_disagreement_warnings.join(", ")}</div>`,
      );
    }
    const div = document.createElement("div");
    div.style.cssText = "font-size:13px;color:#cbd5e1;line-height:1.7;";
    div.innerHTML = lines.join("");
    sBody.appendChild(div);
    panel.appendChild(sWrap);
  }

  // ── Per-player table ──
  const playerList = players.map((p, i) => ({ ...p, colour: playerColour(i) }));
  const { wrap: tWrap, body: tBody } = makePanel(
    `Refined poses — ${playerList.length} player${playerList.length === 1 ? "" : "s"}`,
  );
  const { t, tbody } = makeTable([
    "Player", "Frames", "Multi-view", "Single-view", "Contributing shots", "Mean confidence",
  ]);
  for (const p of playerList) {
    const dotHtml = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.colour};margin-right:6px;vertical-align:middle;"></span>`;
    const labelText = p.player_name ? `${p.player_name} (${p.player_id})` : p.player_id;
    const meanCls = p.mean_confidence > 0.7 ? "cell-green"
      : p.mean_confidence > 0.4 ? "cell-amber" : "cell-red";
    addRow(tbody, [
      { html: `${dotHtml}${labelText}` },
      p.n_frames,
      p.multi_view_frames,
      p.single_view_frames,
      (p.contributing_shots || []).join(", ") || "—",
      { html: `<span class="${meanCls}">${fmt(p.mean_confidence, 3)}</span>` },
    ]);
  }
  tBody.appendChild(t);
  panel.appendChild(tWrap);

  // ── Top-down trajectories (re-uses HMR World's panel) ──
  // Each player's preview returns the same shape as /hmr_world/preview
  // (frames + root_t + confidence) — buildTrajectoryPanel ignores any
  // other fields, so the same renderer works on the fused tracks.
  const previews = await Promise.all(
    playerList.map((p) =>
      fetchJsonOrNull(
        `/refined_poses/preview?player_id=${encodeURIComponent(p.player_id)}`,
      ).then((d) => ({ ...p, data: d })),
    ),
  );
  const withRoot = previews.filter(
    (x) => x.data && Array.isArray(x.data.root_t) && x.data.root_t.length > 0,
  );
  if (withRoot.length > 0) {
    // Pick a context shot for the side-by-side video — first shot any
    // player contributed to. (Pipeline uses one video per shot; the
    // refined track itself is on the reference timeline.)
    const firstShot =
      withRoot
        .map((x) => (x.data.contributing_shots || [])[0])
        .find((s) => !!s) || null;
    panel.appendChild(buildTrajectoryPanel(withRoot, firstShot));
  }
}

async function renderExport(panel) {
  // Two independent sources can drive the viewer:
  //   1. Per-shot exported scenes on disk (the export stage's output).
  //   2. Live data — camera_track + hmr_world .npz files — that the
  //      viewer renders client-side without needing a baked .glb.
  //
  // We surface BOTH so the viewer remains useful while iterating on a
  // single player: even before export has been re-run, the viewer can
  // still build a scene from the latest hmr_world output.
  const exportShotsResp = await fetchJsonOrNull("/api/export/shots");
  const exportShots = (exportShotsResp && exportShotsResp.shots) || [];
  const allShotsResp = await fetchJsonOrNull("/api/output/shots");
  const allShots = (allShotsResp && allShotsResp.shots) || [];

  // Union — every shot the viewer can possibly inspect — so single-
  // player iterations show up even before export has caught up.
  const viewerShots = Array.from(new Set([...exportShots, ...allShots]));

  if (viewerShots.length === 0) {
    emptyNote(panel, "No shots — run prepare_shots first.");
    return;
  }

  // ── Per-shot summary panel ──
  const { wrap: sumWrap, body: sumBody } = makePanel("Export status");
  sumBody.style.padding = "14px 16px";
  const summaryRows = await Promise.all(viewerShots.map(async (shotId) => {
    const meta = await fetchJsonOrNull(
      `/api/export/metadata?shot=${encodeURIComponent(shotId)}`,
    );
    const hmrList = await fetchJsonOrNull(
      `/hmr_world/players?shot=${encodeURIComponent(shotId)}`,
    );
    const hmrCount = (hmrList && hmrList.players) ? hmrList.players.length : 0;
    return { shotId, meta, hmrCount };
  }));
  const { t, tbody } = makeTable(["Shot", "Exported scene", "Players in scene", "HMR players on disk"]);
  for (const row of summaryRows) {
    const exported = row.meta ? "✓" : "—";
    const playersInScene = row.meta && row.meta.players
      ? row.meta.players.length
      : (row.meta ? 0 : "—");
    addRow(tbody, [
      row.shotId,
      { html: `<span class="${row.meta ? 'cell-green' : 'cell-dim'}">${exported}</span>` },
      String(playersInScene),
      { html: `<span class="${row.hmrCount > 0 ? 'cell-green' : 'cell-dim'}">${row.hmrCount}</span>` },
    ]);
  }
  sumBody.appendChild(t);
  panel.appendChild(sumWrap);

  // ── Embedded 3D viewer with shot picker ──
  // Default to the most recently-exported scene; fall back to whatever
  // shot has the most hmr players when no scene is baked yet.
  let defaultShot = exportShots[exportShots.length - 1];
  if (!defaultShot) {
    const sorted = [...summaryRows].sort((a, b) => b.hmrCount - a.hmrCount);
    defaultShot = sorted[0] && sorted[0].shotId;
  }
  panel.appendChild(buildEmbeddedViewer(viewerShots, defaultShot));
}

function buildEmbeddedViewer(shotIds, defaultShot) {
  const { wrap, body } = makePanel("3D Viewer");
  body.style.padding = "0";

  const header = document.createElement("div");
  header.style.cssText = "padding:8px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1f2937;flex-wrap:wrap;";
  header.innerHTML = `<span style="color:#94a3b8;font-size:12px;">Live SMPL skeletons + ball trajectory in pitch-world. Use the timeline to scrub. The viewer renders directly from camera/hmr_world data — works even with one player.</span>`;

  const select = document.createElement("select");
  select.style.cssText = "background:#252840;color:#e2e8f0;border:1px solid #2d3148;border-radius:4px;padding:4px 8px;font-size:12px;margin-left:auto;";
  for (const id of shotIds) {
    const opt = document.createElement("option");
    opt.value = id; opt.textContent = id;
    select.appendChild(opt);
  }
  if (defaultShot && shotIds.includes(defaultShot)) select.value = defaultShot;
  header.appendChild(select);

  const popOut = document.createElement("a");
  popOut.target = "_blank";
  popOut.style.cssText = "color:#a5b4fc;font-size:12px;text-decoration:none;";
  popOut.textContent = "Open in new tab ↗";
  header.appendChild(popOut);

  body.appendChild(header);

  const frame = document.createElement("iframe");
  frame.style.cssText = "width:100%;height:780px;border:0;display:block;background:#0a0e1a;";
  frame.title = "3D Viewer";
  body.appendChild(frame);

  function loadShot(shotId) {
    const target = shotId
      ? `/viewer?shot=${encodeURIComponent(shotId)}`
      : "/viewer";
    frame.src = target;
    popOut.href = target;
  }
  select.addEventListener("change", () => loadShot(select.value));
  loadShot(select.value);
  return wrap;
}

// ── Boot ─────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
