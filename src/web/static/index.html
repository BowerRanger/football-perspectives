    const base1 = [cx - dx * 5 - dy * 6, cy - dy * 5 + dx * 6];
    const base2 = [cx - dx * 5 + dy * 6, cy - dy * 5 - dx * 6];
    ctx.fillStyle = "#fde68a";
    ctx.strokeStyle = "#854d0e";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(tip[0], tip[1]);
    ctx.lineTo(base1[0], base1[1]);
    ctx.lineTo(base2[0], base2[1]);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // Camera-out-of-bounds annotation: when the recovered position is
    // off the canvas, project it to the nearest edge and label.
    const offX = cam.pos[0] < -3 || cam.pos[0] > 108;
    const offY = cam.pos[1] < -3 || cam.pos[1] > 71;
    const label = `cam (${cam.pos[0].toFixed(1)}, ${cam.pos[1].toFixed(1)}, ${cam.z.toFixed(1)})`;
    ctx.font = "bold 10px -apple-system, sans-serif";
    const tw = ctx.measureText(label).width + 6;
    const lx = Math.max(2, Math.min(W - tw - 2, cx + 10));
    const ly = Math.max(14, Math.min(H - 4, cy - 12));
    ctx.fillStyle = (offX || offY) ? "rgba(127,29,29,0.85)" : "rgba(0,0,0,0.65)";
    ctx.fillRect(lx, ly - 11, tw, 14);
    ctx.fillStyle = (offX || offY) ? "#fecaca" : "#fde68a";
    ctx.fillText(label, lx + 3, ly);
  }
  function render(fi) {
    currentFrame = fi;
    drawPitch();
    drawCameraMarker(fi);
    for (const p of playerIndex) {
      // Build the trail of recent positions inside [fi - TRAIL_LEN, fi].
      const trail = [];
      for (let f = Math.max(p.firstFrame, fi - TRAIL_LEN); f <= fi; f++) {
        const e = p.byFrame.get(f);
        if (!e || !e.pos || e.pos.length < 2 || e.conf < CONF_THRESH) continue;
        trail.push({ f, pos: e.pos });
      }
      if (trail.length === 0) continue;
      // Trail polyline with fading alpha.
      ctx.lineWidth = 1.6;
      ctx.lineCap = "round";
      for (let i = 1; i < trail.length; i++) {
        const aN = (trail[i - 1].f - (fi - TRAIL_LEN)) / TRAIL_LEN;
        const aB = (trail[i].f     - (fi - TRAIL_LEN)) / TRAIL_LEN;
        const alpha = Math.max(0, Math.min(1, (aN + aB) / 2));
        ctx.strokeStyle = withAlpha(p.colour, 0.15 + 0.6 * alpha);
        const [x0, y0] = pitch2px(trail[i - 1].pos[0], trail[i - 1].pos[1]);
        const [x1, y1] = pitch2px(trail[i].pos[0],     trail[i].pos[1]);
        ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
      }
      // Head dot + label at the most recent sample.
      const head = trail[trail.length - 1];
      const [hx, hy] = pitch2px(head.pos[0], head.pos[1]);
      ctx.fillStyle = p.colour;
      ctx.beginPath(); ctx.arc(hx, hy, 4, 0, Math.PI * 2); ctx.fill();
      // Off-pitch dots get a subtle warning ring so calibration errors
      // are visually obvious from the trajectory panel alone.
      const offPitch =
        head.pos[0] < 0 || head.pos[0] > 105 ||
        head.pos[1] < 0 || head.pos[1] > 68;
      if (offPitch) {
        ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.arc(hx, hy, 7, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.font = "bold 10px -apple-system, sans-serif";
      const tw = ctx.measureText(p.label).width + 6;
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(hx + 6, hy - 8, tw, 14);
      ctx.fillStyle = p.colour;
      ctx.fillText(p.label, hx + 9, hy + 2);
    }
    seek.value = String(fi);
    const sec = (fi / Math.max(1, fps)).toFixed(2);
    frameLabel.textContent = `Frame ${fi}  (${sec}s)`;
  }

  // Playback loop — uses requestAnimationFrame timestamps so playback
  // speed tracks the configured fps regardless of refresh rate.
  let playing = false, rafId = null, lastTs = 0;
  function tick(ts) {
    if (!playing) { rafId = null; return; }
    if (lastTs === 0) lastTs = ts;
    const dt = (ts - lastTs) / 1000;
    const advance = Math.max(1, Math.round(dt * fps));
    lastTs = ts;
    let next = currentFrame + advance;
    if (next > maxFrame) {
      next = maxFrame; render(next);
      playing = false; playBtn.textContent = "▶"; rafId = null; lastTs = 0; return;
    }
    render(next);
    rafId = requestAnimationFrame(tick);
  }
  playBtn.addEventListener("click", () => {
    if (playing) { playing = false; playBtn.textContent = "▶"; }
    else {
      if (currentFrame >= maxFrame) currentFrame = minFrame;
      playing = true; playBtn.textContent = "⏸";
      lastTs = 0; rafId = requestAnimationFrame(tick);
    }
  });
  stepBack.addEventListener("click", () => {
    playing = false; playBtn.textContent = "▶";
    render(Math.max(minFrame, currentFrame - 1));
  });
  stepFwd.addEventListener("click", () => {
    playing = false; playBtn.textContent = "▶";
    render(Math.min(maxFrame, currentFrame + 1));
  });
  seek.addEventListener("input", () => {
    playing = false; playBtn.textContent = "▶";
    render(parseInt(seek.value, 10));
  });

  // Initial paint at the first frame any player exists in.
  render(minFrame);
  return wrap;
}

function withAlpha(hexColour, alpha) {
  // Accepts #rgb / #rrggbb. Returns rgba(r,g,b,alpha).
  const c = hexColour.replace("#", "");
  let r, g, b;
  if (c.length === 3) {
    r = parseInt(c[0] + c[0], 16);
    g = parseInt(c[1] + c[1], 16);
    b = parseInt(c[2] + c[2], 16);
  } else {
    r = parseInt(c.slice(0, 2), 16);
    g = parseInt(c.slice(2, 4), 16);
    b = parseInt(c.slice(4, 6), 16);
  }
  return `rgba(${r},${g},${b},${alpha})`;
}

async function renderBall(panel) {
  const data = await fetchJsonOrNull("/ball/preview");
  if (!data || !data.frames || data.frames.length === 0) {
    emptyNote(panel, "No ball track yet — run ball to detect ball positions.");
    return;
  }
  const { wrap, body } = makePanel("Ball Track");
  const N = data.frames.length;
  const states = {};
  for (const f of data.frames) {
    states[f.state] = (states[f.state] || 0) + 1;
  }
  const stateSummary = Object.entries(states)
    .map(([s, n]) => `${s}: ${n} (${fmt((n / N) * 100, 1)}%)`)
    .join(", ");
  const summary = document.createElement("div");
  summary.style.cssText = "padding:14px 16px;font-size:13px;color:#cbd5e1;line-height:1.7;";
  summary.innerHTML = `
    <div>Clip: <strong>${data.clip_id}</strong>, FPS: ${fmt(data.fps, 2)}</div>
    <div>Frames: ${N}</div>
    <div>State distribution: ${stateSummary}</div>
    <div>Flight segments: ${(data.flight_segments || []).length}</div>
  `;
  body.appendChild(summary);
  panel.appendChild(wrap);
}

async function renderExport(panel) {
  const meta = await fetchJsonOrNull("/api/export/metadata");
  if (!meta) {
    emptyNote(panel, "No export yet — run export to produce scene.glb / FBX files.");
    return;
  }
  const { wrap, body } = makePanel("Export");
  const summary = document.createElement("div");
  summary.style.cssText = "padding:14px 16px;font-size:13px;color:#cbd5e1;line-height:1.7;";
  const items = [];
  if (meta.gltf_file) items.push(`glTF: ${meta.gltf_file}`);
  if (meta.metadata_file) items.push(`Metadata: ${meta.metadata_file}`);
  if (meta.fbx_files && meta.fbx_files.length) items.push(`FBX files: ${meta.fbx_files.length}`);
  if (meta.players) items.push(`Players: ${(meta.players || []).join(", ")}`);
  summary.innerHTML = items.map((s) => `<div>${s}</div>`).join("");

  const btnWrap = document.createElement("div");
  btnWrap.style.cssText = "padding:8px 12px;";
  const viewerBtn = document.createElement("a");
  viewerBtn.href = "/viewer";
  viewerBtn.target = "_blank";
  viewerBtn.textContent = "Open 3D Viewer";
  viewerBtn.style.cssText = "display:inline-block;background:#4f46e5;color:#fff;padding:8px 20px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:500;";
  btnWrap.appendChild(viewerBtn);
  body.appendChild(summary);
  body.appendChild(btnWrap);
  panel.appendChild(wrap);
}

// ── Boot ─────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", init);
