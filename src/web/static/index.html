    const fresh = await fetchJsonOrNull(`/tracking/preview?shot_id=${encodeURIComponent(shotId)}`);
    container.innerHTML = "";
    if (fresh && fresh.tracks) buildTrackEditor(container, shotId, fresh);
  });

  // ── Wire video + overlay ──
  let lastFrame = -1;
  let rafId = null;

  function fitOverlayToVideo() {
    if (!video.videoWidth) return;
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
    overlay.style.width = video.offsetWidth + "px";
    overlay.style.height = video.offsetHeight + "px";
  }

  function drawCurrent() {
    const fi = Math.round(video.currentTime * fps);
    if (fi !== lastFrame) {
      lastFrame = fi;
      frameLabel.textContent = `Frame ${fi}`;
      seek.value = String(fi);
      drawTrackOverlay(overlay, frameIndex.get(fi) || [], selectedTrackIdSet());
    }
  }

  video.addEventListener("loadedmetadata", () => {
    seek.max = String(Math.round(video.duration * fps));
    fitOverlayToVideo();
    drawCurrent();
  });
  new ResizeObserver(fitOverlayToVideo).observe(video);

  video.addEventListener("play", () => {
    playBtn.textContent = "⏸";
    if (!rafId) {
      const loop = () => { rafId = requestAnimationFrame(loop); drawCurrent(); };
      loop();
    }
  });
  video.addEventListener("pause", () => {
    playBtn.textContent = "▶";
    cancelAnimationFrame(rafId); rafId = null; drawCurrent();
  });
  video.addEventListener("seeked", () => { if (video.paused) drawCurrent(); });

  playBtn.addEventListener("click", () => { video.paused ? video.play() : video.pause(); });
  stepBack.addEventListener("click", () => {
    video.pause(); video.currentTime = Math.max(0, video.currentTime - 1 / fps);
  });
  stepFwd.addEventListener("click", () => {
    video.pause(); video.currentTime = Math.min(video.duration || 0, video.currentTime + 1 / fps);
  });
  seek.addEventListener("input", () => {
    const fi = parseInt(seek.value, 10);
    video.pause(); video.currentTime = fi / fps;
  });

  // Click on overlay → highlight matching row.
  overlay.addEventListener("click", (e) => {
    if (!overlay.width) return;
    const rect = overlay.getBoundingClientRect();
    const sx = overlay.width / rect.width, sy = overlay.height / rect.height;
    const cx = (e.clientX - rect.left) * sx, cy = (e.clientY - rect.top) * sy;
    const fi = Math.round(video.currentTime * fps);
    const boxes = frameIndex.get(fi) || [];
    for (const b of boxes) {
      const [x1, y1, x2, y2] = b.bbox;
      if (cx >= x1 && cx <= x2 && cy >= y1 && cy <= y2) {
        const r = rowsByTrackId.get(b.track_id);
        if (r) {
          r.item.scrollIntoView({ block: "nearest" });
          r.nameInput.focus();
          r.item.style.background = "#2d3148";
          setTimeout(() => { r.item.style.background = ""; }, 800);
        }
        return;
      }
    }
    video.paused ? video.play() : video.pause();
  });
}

function makeToolbarBtn(text, bg) {
  const btn = document.createElement("button");
  btn.textContent = text;
  btn.style.cssText = `background:${bg};color:#fff;border:none;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;`;
  return btn;
}

function rebuildDatalist(datalist, names) {
  datalist.innerHTML = "";
  for (const n of names) {
    const opt = document.createElement("option");
    opt.value = n;
    datalist.appendChild(opt);
  }
}

function drawTrackOverlay(canvas, boxes, selectedTrackIds) {
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.font = "bold 12px -apple-system, sans-serif";
  const SELECT_COLOR = "#f97316"; // orange — used while merge-selecting
  for (const b of boxes) {
    const [x1, y1, x2, y2] = b.bbox;
    // Annotated tracks render green with the player's name; unannotated
    // tracks render in the team colour with the raw track_id so the
    // operator can tell at a glance what's still pending. A selected
    // track (merge checkbox on) overrides to orange with a thicker
    // stroke so it pops against the rest of the frame.
    const named = b.player_name && b.player_name !== "ignore";
    const ignored = b.player_name === "ignore";
    const selected = selectedTrackIds && selectedTrackIds.has(b.track_id);
    const baseColor = ignored
      ? "#64748b"
      : named
        ? "#22c55e"
        : (TEAM_COLORS[b.team] || TEAM_COLORS.unknown);
    const color = selected ? SELECT_COLOR : baseColor;
    const tag = named ? b.player_name : (ignored ? "ignore" : b.track_id);
    ctx.lineWidth = selected ? 3 : 2;
    ctx.strokeStyle = color;
    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
    ctx.fillStyle = "rgba(0,0,0,0.65)";
    const tw = ctx.measureText(tag).width + 6;
    const labelY = y1 - 4 < 14 ? y1 + 16 : y1 - 4;
    ctx.fillRect(x1, labelY - 12, tw, 14);
    ctx.fillStyle = color;
    ctx.fillText(tag, x1 + 3, labelY);
  }
}

// ── Frame preview helper ─────────────────────────────────────────────
const TEAM_COLORS = { A: "#3b82f6", B: "#ef4444", referee: "#f59e0b", unknown: "#94a3b8" };

function buildFramePreview({ title, shotId, frames, drawOverlay }) {
  const { wrap, body } = makePanel(title);
  body.style.padding = "0";

  const container = document.createElement("div");
  container.style.cssText = "padding:12px 16px;";

  const stage = document.createElement("div");
  stage.style.cssText = "position:relative;background:#000;border-radius:4px;overflow:hidden;display:inline-block;max-width:100%;";

  const img = document.createElement("img");
  img.style.cssText = "display:block;max-width:100%;height:auto;";
  img.draggable = false;

  const overlay = document.createElement("canvas");
  overlay.style.cssText = "position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;";

  stage.appendChild(img);
  stage.appendChild(overlay);
  container.appendChild(stage);

  const sliderRow = document.createElement("div");
  sliderRow.style.cssText = "display:flex;gap:10px;align-items:center;margin-top:10px;font-size:12px;color:#cbd5e1;";
  const slider = document.createElement("input");
  slider.type = "range";
  slider.min = 0;
  slider.max = String(frames.length - 1);
  slider.value = 0;
  slider.style.cssText = "flex:1;";
  const label = document.createElement("span");
  label.style.minWidth = "120px";
  sliderRow.appendChild(slider);
  sliderRow.appendChild(label);
  container.appendChild(sliderRow);

  body.appendChild(container);

  function drawCurrent() {
    const idx = parseInt(slider.value, 10);
    const f = frames[idx];
    label.textContent = `Frame ${f.frame} (${idx + 1}/${frames.length})`;
    img.src = `/api/video/${encodeURIComponent(shotId)}/frame?frame_idx=${f.frame}`;
    img.onload = () => {
      overlay.width = img.naturalWidth;
      overlay.height = img.naturalHeight;
      const ctx = overlay.getContext("2d");
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      drawOverlay(ctx, f);
    };
  }

  slider.addEventListener("input", drawCurrent);
  drawCurrent();
  return wrap;
}

function drawBoxOverlay(ctx, frame) {
  ctx.lineWidth = 2;
  ctx.font = "14px -apple-system, sans-serif";
  for (const b of frame.boxes || []) {
    const [x1, y1, x2, y2] = b.bbox;
    const color = TEAM_COLORS[b.team] || TEAM_COLORS.unknown;
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
    const tag = b.track_id;
    const tw = ctx.measureText(tag).width + 8;
    ctx.fillRect(x1, Math.max(0, y1 - 18), tw, 16);
    ctx.fillStyle = "#000";
    ctx.fillText(tag, x1 + 4, Math.max(12, y1 - 5));
  }
}

async function renderCamera(panel) {
  const shotsData = await fetchJsonOrNull("/api/output/shots");
  const shotIds = (shotsData && shotsData.shots) || [];

  if (shotIds.length === 0) {
    const { wrap, body } = makePanel("Camera Track");
    const note = document.createElement("div");
    note.style.cssText = "padding:14px 16px;font-size:13px;color:#94a3b8;";
    note.textContent = "No shots — run prepare_shots first.";
    body.appendChild(note);
    panel.appendChild(wrap);
    panel.appendChild(buildEmbeddedAnchorEditor());
    return;
  }

  // Per-shot fetches (track + anchors). Done in parallel so adding more
  // shots doesn't lengthen the load serially.
  const perShot = await Promise.all(shotIds.map(async (id, i) => {
    const [track, anchors] = await Promise.all([
      fetchJsonOrNull(`/camera/track?shot=${encodeURIComponent(id)}`),
      fetchJsonOrNull(`/anchors/${encodeURIComponent(id)}`),
    ]);
    return { id, track, anchors, color: playerColour(i) };
  }));

  panel.appendChild(buildMultiShotCameraPanel(perShot));
  panel.appendChild(buildEmbeddedAnchorEditor());
}

// Render the camera stage's primary diagnostic: the pitch top-down map
// with every shot's camera marker overlaid, and a grid of per-shot info
// cards on the right. Designed for ≤4 shots — beyond that the cards
// wrap onto more rows but the map stays single-canvas.
function buildMultiShotCameraPanel(perShot) {
  const { wrap, body } = makePanel("Camera Tracks (all shots)");
  body.style.padding = "14px 16px";

  const layout = document.createElement("div");
  layout.style.cssText = "display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;";
  body.appendChild(layout);

  // ── Left: pitch top-down with every shot overlaid ──
  const mapCol = document.createElement("div");
  mapCol.style.cssText = "flex:1 1 520px;min-width:0;";
  mapCol.appendChild(buildOverlaidPitchMap(perShot));
  layout.appendChild(mapCol);

  // ── Right: grid of per-shot info cards ──
  const infoCol = document.createElement("div");
  infoCol.style.cssText = "flex:1 1 320px;min-width:280px;";
  const grid = document.createElement("div");
  grid.style.cssText = "display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;";
  for (const s of perShot) grid.appendChild(buildShotInfoCard(s));
  infoCol.appendChild(grid);
  layout.appendChild(infoCol);

  return wrap;
}

function buildShotInfoCard({ id, track, anchors, color }) {
  const card = document.createElement("div");
  card.style.cssText = "background:#0f1117;border:1px solid #1f2937;border-radius:6px;padding:10px 12px;font-size:12px;line-height:1.55;color:#cbd5e1;";

  const header = document.createElement("div");
  header.style.cssText = "display:flex;align-items:center;gap:8px;margin-bottom:6px;font-weight:600;color:#f1f5f9;font-size:13px;";
  const swatch = document.createElement("span");
  swatch.style.cssText = `width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0;`;
  const title = document.createElement("span");
  title.textContent = id;
  header.appendChild(swatch);
  header.appendChild(title);
  card.appendChild(header);

  const body = document.createElement("div");
  if (!track || !track.frames || track.frames.length === 0) {
    body.innerHTML = `<span class="cell-dim">No camera_track yet — run camera tracking for this shot.</span>`;
  } else {
    const N = track.frames.length;
    const meanConf = track.frames.reduce((s, f) => s + (f.confidence || 0), 0) / N;
    const anchorCount = track.frames.filter((f) => f.is_anchor).length;
    const confCls = meanConf > 0.7 ? "cell-green" : meanConf > 0.4 ? "cell-amber" : "cell-red";
    body.innerHTML = `
      <div>Frames: <strong>${N}</strong> @ ${fmt(track.fps, 2)} fps</div>
      <div>Image: ${track.image_size.join("×")}</div>
      <div>t_world: [${track.t_world.map((v) => fmt(v, 1)).join(", ")}]</div>
      <div>Mean conf: <span class="${confCls}">${fmt(meanConf, 3)}</span></div>
      <div>Anchored: ${anchorCount} / ${N}</div>
    `;
  }
  const anchorN = (anchors && anchors.anchors) ? anchors.anchors.length : 0;
  const anchorLine = document.createElement("div");
  anchorLine.style.cssText = "margin-top:6px;padding-top:6px;border-top:1px solid #1f2937;";
  if (anchorN > 0) {
    anchorLine.innerHTML = `Anchor set: <strong>${anchorN}</strong> frame${anchorN === 1 ? "" : "s"}`;
  } else {
    anchorLine.innerHTML = `<span style="color:#94a3b8;">No anchors yet</span>`;
  }
  body.appendChild(anchorLine);
  card.appendChild(body);
  return card;
}

// One canvas, one pitch, every shot's camera marker drawn at its
// t_world in the shot's colour. The camera body is fixed in the
// broadcast-mono setup so position is constant per shot — only the
// bearing animates as you scrub the shared timeline below the map.
// Shots that don't cover the current frame hold at their nearest end
// (so the marker stays visible rather than blinking out).
function buildOverlaidPitchMap(perShot) {
  const wrap = document.createElement("div");

  const PITCH_L = 105, PITCH_W = 68;
  const MARGIN_X = 8, MARGIN_FAR = 5, MARGIN_NEAR = 30;
  const scale = 6, padding = 20;
  const W = (PITCH_L + 2 * MARGIN_X) * scale + padding * 2;
  const H = (PITCH_W + MARGIN_FAR + MARGIN_NEAR) * scale + padding * 2;

  const canvas = document.createElement("canvas");
  canvas.width = W;
  canvas.height = H;
  canvas.style.cssText = "max-width:100%;height:auto;display:block;background:#0a1f10;border-radius:4px;";
  wrap.appendChild(canvas);
  const ctx = canvas.getContext("2d");

  function pitch2px(x, y) {
    return [
      padding + (x + MARGIN_X) * scale,
      padding + (PITCH_W + MARGIN_FAR - y) * scale,
    ];
  }

  function drawPitch() {
    ctx.fillStyle = "#0a1f10";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#0b3b1a";
    const [x0, y0] = pitch2px(0, PITCH_W);
    ctx.fillRect(x0, y0, PITCH_L * scale, PITCH_W * scale);
    ctx.strokeStyle = "#e2e8f0"; ctx.lineWidth = 1.5;
    const corners = [[0, 0], [PITCH_L, 0], [PITCH_L, PITCH_W], [0, PITCH_W]];
    ctx.beginPath();
    for (let i = 0; i < corners.length; i++) {
      const [x, y] = pitch2px(...corners[i]);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.stroke();
    ctx.beginPath();
    const m1 = pitch2px(PITCH_L / 2, 0), m2 = pitch2px(PITCH_L / 2, PITCH_W);
    ctx.moveTo(m1[0], m1[1]); ctx.lineTo(m2[0], m2[1]); ctx.stroke();
    ctx.beginPath();
    const c = pitch2px(PITCH_L / 2, PITCH_W / 2);
    ctx.arc(c[0], c[1], 9.15 * scale, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = "#e2e8f0";
    ctx.beginPath(); ctx.arc(c[0], c[1], 1.6, 0, Math.PI * 2); ctx.fill();

    const PEN_DEPTH = 16.5, PEN_HALF = 20.16;
    const SIX_DEPTH = 5.5,  SIX_HALF = 9.16;
    const SPOT_FROM_GOAL = 11.0, ARC_R = 9.15, GOAL_HALF = 3.66;
    const yMid = PITCH_W / 2;
    const halfAngle = Math.acos((PEN_DEPTH - SPOT_FROM_GOAL) / ARC_R);
    function rectPath(xa, ya, xb, yb) {
      const [pax, pay] = pitch2px(xa, ya);
      const [pbx, pby] = pitch2px(xb, yb);
      ctx.beginPath();
      ctx.rect(Math.min(pax, pbx), Math.min(pay, pby), Math.abs(pbx - pax), Math.abs(pby - pay));
      ctx.stroke();
    }
    for (const left of [true, false]) {
      const xGoal = left ? 0 : PITCH_L;
      const sgn = left ? 1 : -1;
      rectPath(xGoal, yMid - PEN_HALF, xGoal + sgn * PEN_DEPTH, yMid + PEN_HALF);
      rectPath(xGoal, yMid - SIX_HALF, xGoal + sgn * SIX_DEPTH, yMid + SIX_HALF);
      const xSpot = xGoal + sgn * SPOT_FROM_GOAL;
      const [sx, sy] = pitch2px(xSpot, yMid);
      ctx.fillStyle = "#e2e8f0";
      ctx.beginPath(); ctx.arc(sx, sy, 1.6, 0, Math.PI * 2); ctx.fill();
      const startAng = left ? -halfAngle : (Math.PI - halfAngle);
      const endAng   = left ?  halfAngle : (Math.PI + halfAngle);
      ctx.beginPath();
      const N_SEG = 32;
      for (let i = 0; i <= N_SEG; i++) {
        const a = startAng + (endAng - startAng) * (i / N_SEG);
        const [px, py] = pitch2px(xSpot + ARC_R * Math.cos(a), yMid + ARC_R * Math.sin(a));
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.strokeStyle = "#fde68a"; ctx.lineWidth = 3;
      const [gAx, gAy] = pitch2px(xGoal, yMid - GOAL_HALF);
      const [gBx, gBy] = pitch2px(xGoal, yMid + GOAL_HALF);
      ctx.beginPath();
      ctx.moveTo(gAx, gAy); ctx.lineTo(gBx, gBy);
      ctx.stroke();
      ctx.strokeStyle = "#e2e8f0"; ctx.lineWidth = 1.5;
    }
  }

  // ── Pre-compute per-shot frame data so playback redraws are cheap ──
  // Shape: { id, color, fps, frames: [{frame, pos:[x,y], z, fwd:[x,y], isAnchor}, ...], byFrame: Map }
  const indexedShots = [];
  for (const { id, track, color } of perShot) {
    if (!track || !track.frames || track.frames.length === 0) continue;
    const t_world = track.t_world && track.t_world.length === 3 ? track.t_world : null;
    const frames = [];
    const byFrame = new Map();
    for (const f of track.frames) {
      const t = (f.t && f.t.length === 3) ? f.t : t_world;
      if (!t || !f.R) continue;
      const R = f.R;
      const C = [
        -(R[0][0] * t[0] + R[1][0] * t[1] + R[2][0] * t[2]),
        -(R[0][1] * t[0] + R[1][1] * t[1] + R[2][1] * t[2]),
        -(R[0][2] * t[0] + R[1][2] * t[1] + R[2][2] * t[2]),
      ];
      let fx = R[2][0], fy = R[2][1];
      const mag = Math.hypot(fx, fy) || 1;
      fx /= mag; fy /= mag;
      const entry = {
        frame: f.frame,
        pos: [C[0], C[1]],
        z: C[2],
        fwd: [fx, fy],
        isAnchor: !!f.is_anchor,
      };
      frames.push(entry);
      byFrame.set(f.frame, entry);
    }
    if (frames.length === 0) continue;
    frames.sort((a, b) => a.frame - b.frame);
    indexedShots.push({
      id, color,
      fps: track.fps || 30,
      frames,
      byFrame,
      minFrame: frames[0].frame,
      maxFrame: frames[frames.length - 1].frame,
    });
  }

  if (indexedShots.length === 0) {
    drawPitch();
    ctx.fillStyle = "rgba(15, 23, 42, 0.85)";
    ctx.fillRect(W / 2 - 160, H / 2 - 18, 320, 36);
    ctx.fillStyle = "#fde68a";
    ctx.font = "13px -apple-system, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("No camera tracks yet — run camera tracking first.", W / 2, H / 2 + 4);
    ctx.textAlign = "start";
    return wrap;
  }

  const minFrame = Math.min(...indexedShots.map((s) => s.minFrame));
  const maxFrame = Math.max(...indexedShots.map((s) => s.maxFrame));
  const playFps = indexedShots[0].fps || 30;

  function nearestInShot(shot, fi) {
    if (shot.byFrame.has(fi)) return shot.byFrame.get(fi);
    if (fi <= shot.minFrame) return shot.byFrame.get(shot.minFrame);
    if (fi >= shot.maxFrame) return shot.byFrame.get(shot.maxFrame);
    // Linear scan is fine — broadcast clips are O(hundreds) of frames
    // and the slider only fires per drag tick.
    let best = shot.frames[0], bestD = Math.abs(best.frame - fi);
    for (const e of shot.frames) {
      const d = Math.abs(e.frame - fi);
      if (d < bestD) { best = e; bestD = d; }
    }
    return best;
  }

  function drawCameraMarker(color, entry, isLive) {
    const { pos, z, fwd, isAnchor } = entry;
    const [cx, cy] = pitch2px(pos[0], pos[1]);
    const [fxn, fyn] = fwd;
    const dx = fxn, dy = -fyn;  // canvas y is flipped vs world y
    const size = 10;
    const tip = [cx + dx * size, cy + dy * size];
    const base1 = [cx - dx * 5 - dy * 6, cy - dy * 5 + dx * 6];
    const base2 = [cx - dx * 5 + dy * 6, cy - dy * 5 - dx * 6];

    // Sight-line first (under the marker)
    ctx.strokeStyle = color + (isLive ? "b3" : "55");  // ~70% / ~33% alpha
    ctx.lineWidth = isLive ? 1.4 : 1;
    const sight = pitch2px(pos[0] + fxn * 30, pos[1] + fyn * 30);
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(sight[0], sight[1]); ctx.stroke();

    // Marker triangle — outlined gold when at an anchor frame so the
    // operator can spot which markers are anchored vs interpolated.
    ctx.fillStyle = color;
    ctx.strokeStyle = isAnchor ? "#facc15" : "#0a0e1a";
    ctx.lineWidth = isAnchor ? 2 : 1.6;
    ctx.beginPath();
    ctx.moveTo(tip[0], tip[1]);
    ctx.lineTo(base1[0], base1[1]);
    ctx.lineTo(base2[0], base2[1]);
    ctx.closePath(); ctx.fill(); ctx.stroke();

    // Label
    const offX = pos[0] < -3 || pos[0] > 108;
    const offY = pos[1] < -3 || pos[1] > 71;
    const idLabel = entry._shotId || "";
    const label = `${idLabel} (${pos[0].toFixed(1)}, ${pos[1].toFixed(1)}, ${z.toFixed(1)})`;
    ctx.font = "bold 10px -apple-system, sans-serif";
    const tw = ctx.measureText(label).width + 6;
    const lx = Math.max(2, Math.min(W - tw - 2, cx + 12));
    const ly = Math.max(14, Math.min(H - 4, cy - 10));
    ctx.fillStyle = (offX || offY) ? "rgba(127,29,29,0.92)" : "rgba(0,0,0,0.72)";
    ctx.fillRect(lx, ly - 11, tw, 14);
    ctx.fillStyle = (offX || offY) ? "#fecaca" : color;
    ctx.fillText(label, lx + 3, ly);
  }

  function render(fi) {
    drawPitch();
    for (const shot of indexedShots) {
      const entry = nearestInShot(shot, fi);
      if (!entry) continue;
      entry._shotId = shot.id;
      const isLive = fi >= shot.minFrame && fi <= shot.maxFrame;
      drawCameraMarker(shot.color, entry, isLive);
    }
    seek.value = String(fi);
    const sec = (fi / Math.max(1, playFps)).toFixed(2);
    frameLabel.textContent = `Frame ${fi}  (${sec}s)`;
  }

  // ── Controls (play / step / seek) — shared across all shots ──
  const controls = document.createElement("div");
  controls.style.cssText = "display:flex;align-items:center;gap:8px;padding:8px 0 0;";
  const playBtn = makeToolbarBtn("▶", "#4f46e5"); playBtn.style.minWidth = "36px";
  const stepBack = makeToolbarBtn("◀", "#334155"); stepBack.title = "Previous frame";
  const stepFwd = makeToolbarBtn("▶", "#334155"); stepFwd.title = "Next frame";
  const seek = document.createElement("input");
  seek.type = "range"; seek.min = String(minFrame); seek.max = String(maxFrame); seek.value = String(minFrame);
  seek.style.cssText = "flex:1;";
  const frameLabel = document.createElement("span");
  frameLabel.style.cssText = "color:#94a3b8;font-size:11px;min-width:140px;text-align:right;font-variant-numeric:tabular-nums;";
  controls.append(playBtn, stepBack, stepFwd, seek, frameLabel);
  wrap.appendChild(controls);

  let currentFrame = minFrame;
  let playing = false, rafId = null, lastTs = 0;
  function tick(ts) {
    if (!playing) { rafId = null; return; }
    if (lastTs === 0) lastTs = ts;
    const dt = (ts - lastTs) / 1000;
    const advance = Math.max(1, Math.round(dt * playFps));
    lastTs = ts;
    let next = currentFrame + advance;
    if (next > maxFrame) {
      next = maxFrame; currentFrame = next; render(next);
      playing = false; playBtn.textContent = "▶"; rafId = null; lastTs = 0; return;
    }
    currentFrame = next;
    render(next);
    rafId = requestAnimationFrame(tick);
  }
  playBtn.addEventListener("click", () => {
    if (playing) { playing = false; playBtn.textContent = "▶"; }
    else {
      if (currentFrame >= maxFrame) currentFrame = minFrame;
      playing = true; playBtn.textContent = "⏸";
      lastTs = 0; rafId = requestAnimationFrame(tick);
    }
  });
  stepBack.addEventListener("click", () => {
    playing = false; playBtn.textContent = "▶";
    currentFrame = Math.max(minFrame, currentFrame - 1);
    render(currentFrame);
  });
  stepFwd.addEventListener("click", () => {
    playing = false; playBtn.textContent = "▶";
    currentFrame = Math.min(maxFrame, currentFrame + 1);
    render(currentFrame);
  });
  seek.addEventListener("input", () => {
    playing = false; playBtn.textContent = "▶";
    currentFrame = parseInt(seek.value, 10);
    render(currentFrame);
  });

  render(minFrame);
  return wrap;
}

function buildCameraPitchMap(track) {
  const { wrap, body } = makePanel("Camera position (pitch-world top-down)");
  body.style.padding = "14px 16px";

  const PITCH_L = 105, PITCH_W = 68;
  // Asymmetric margins: tiny strip above the far touchline (visual
  // breathing room only) and a larger surround below the near
  // touchline where the camera marker sits. y_world=68 is the far
  // touchline (visual top), y_world=0 is the near touchline (visual
  // bottom), so MARGIN_FAR maps to canvas top and MARGIN_NEAR to
  // canvas bottom.
  const MARGIN_X = 8, MARGIN_FAR = 5, MARGIN_NEAR = 30;
  const scale = 6, padding = 20;
  const W = (PITCH_L + 2 * MARGIN_X) * scale + padding * 2;
  const H = (PITCH_W + MARGIN_FAR + MARGIN_NEAR) * scale + padding * 2;
  const DEFAULT_FPS = track.fps || 30;

  const canvas = document.createElement("canvas");
  canvas.width = W;
  canvas.height = H;
  canvas.style.cssText = "max-width:100%;height:auto;display:block;background:#0a1f10;border-radius:4px;";
  body.appendChild(canvas);
  const ctx = canvas.getContext("2d");

  function pitch2px(x, y) {
    return [
      padding + (x + MARGIN_X) * scale,
      padding + (PITCH_W + MARGIN_FAR - y) * scale,
    ];
  }
  function drawPitch() {
    ctx.fillStyle = "#0a1f10";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#0b3b1a";
    const [x0, y0] = pitch2px(0, PITCH_W);
    ctx.fillRect(x0, y0, PITCH_L * scale, PITCH_W * scale);
    ctx.strokeStyle = "#e2e8f0"; ctx.lineWidth = 1.5;
    const corners = [[0, 0], [PITCH_L, 0], [PITCH_L, PITCH_W], [0, PITCH_W]];
    ctx.beginPath();
    for (let i = 0; i < corners.length; i++) {
      const [x, y] = pitch2px(...corners[i]);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.stroke();
    ctx.beginPath();
    const m1 = pitch2px(PITCH_L / 2, 0), m2 = pitch2px(PITCH_L / 2, PITCH_W);
    ctx.moveTo(m1[0], m1[1]); ctx.lineTo(m2[0], m2[1]); ctx.stroke();
    ctx.beginPath();
    const c = pitch2px(PITCH_L / 2, PITCH_W / 2);
    ctx.arc(c[0], c[1], 9.15 * scale, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = "#e2e8f0";
    ctx.beginPath(); ctx.arc(c[0], c[1], 1.6, 0, Math.PI * 2); ctx.fill();

    // FIFA-standard box markings (penalty box, 6-yard, spot, D, goal mouth).
    const PEN_DEPTH = 16.5, PEN_HALF = 20.16;
    const SIX_DEPTH = 5.5,  SIX_HALF = 9.16;
    const SPOT_FROM_GOAL = 11.0, ARC_R = 9.15, GOAL_HALF = 3.66;
    const yMid = PITCH_W / 2;
    const halfAngle = Math.acos((PEN_DEPTH - SPOT_FROM_GOAL) / ARC_R);
    function rectPath(xa, ya, xb, yb) {
      const [pax, pay] = pitch2px(xa, ya);
      const [pbx, pby] = pitch2px(xb, yb);
      ctx.beginPath();
      ctx.rect(Math.min(pax, pbx), Math.min(pay, pby), Math.abs(pbx - pax), Math.abs(pby - pay));
      ctx.stroke();
    }
    for (const left of [true, false]) {
      const xGoal = left ? 0 : PITCH_L;
      const sgn = left ? 1 : -1;
      rectPath(xGoal, yMid - PEN_HALF, xGoal + sgn * PEN_DEPTH, yMid + PEN_HALF);
      rectPath(xGoal, yMid - SIX_HALF, xGoal + sgn * SIX_DEPTH, yMid + SIX_HALF);
      const xSpot = xGoal + sgn * SPOT_FROM_GOAL;
      const [sx, sy] = pitch2px(xSpot, yMid);
      ctx.fillStyle = "#e2e8f0";
      ctx.beginPath(); ctx.arc(sx, sy, 1.6, 0, Math.PI * 2); ctx.fill();
      const startAng = left ? -halfAngle : (Math.PI - halfAngle);
      const endAng   = left ?  halfAngle : (Math.PI + halfAngle);
      ctx.beginPath();
      const N_SEG = 32;
      for (let i = 0; i <= N_SEG; i++) {
        const a = startAng + (endAng - startAng) * (i / N_SEG);
        const [px, py] = pitch2px(xSpot + ARC_R * Math.cos(a), yMid + ARC_R * Math.sin(a));
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
      // Goal mouth in highlight yellow so left/right goals are easy to
      // pick out when the camera marker lands far off-pitch.
      ctx.strokeStyle = "#fde68a"; ctx.lineWidth = 3;
      const [gAx, gAy] = pitch2px(xGoal, yMid - GOAL_HALF);
      const [gBx, gBy] = pitch2px(xGoal, yMid + GOAL_HALF);
      ctx.beginPath();
      ctx.moveTo(gAx, gAy); ctx.lineTo(gBx, gBy);
      ctx.stroke();
      ctx.strokeStyle = "#e2e8f0"; ctx.lineWidth = 1.5;
    }
  }

  // Camera centre per frame: C = -R^T t. fwd = R[2] (third row of R is
  // R^T's third column, the world-frame camera "look-at" direction).
  const t_world = track.t_world && track.t_world.length === 3 ? track.t_world : null;
  const cameraByFrame = new Map();
  for (const f of track.frames) {
    const t = (f.t && f.t.length === 3) ? f.t : t_world;
    if (!t || !f.R) continue;
    const R = f.R;
    const C = [
      -(R[0][0] * t[0] + R[1][0] * t[1] + R[2][0] * t[2]),
      -(R[0][1] * t[0] + R[1][1] * t[1] + R[2][1] * t[2]),
      -(R[0][2] * t[0] + R[1][2] * t[1] + R[2][2] * t[2]),
    ];
    const fwd = [R[2][0], R[2][1]];
    cameraByFrame.set(f.frame, {
      pos: [C[0], C[1]], z: C[2], fwd,
      conf: f.confidence != null ? f.confidence : 1,
      isAnchor: !!f.is_anchor,
    });
  }
  const frameNumbers = [...cameraByFrame.keys()].sort((a, b) => a - b);
  const minFrame = frameNumbers[0] || 0;
  const maxFrame = frameNumbers[frameNumbers.length - 1] || 0;

  // Controls
  const controls = document.createElement("div");
  controls.style.cssText = "display:flex;align-items:center;gap:8px;padding:8px 0 0;";
  const playBtn = makeToolbarBtn("▶", "#4f46e5"); playBtn.style.minWidth = "36px";
  const stepBack = makeToolbarBtn("◀", "#334155"); stepBack.title = "Previous frame";
  const stepFwd = makeToolbarBtn("▶", "#334155"); stepFwd.title = "Next frame";
  const seek = document.createElement("input");
  seek.type = "range"; seek.min = String(minFrame); seek.max = String(maxFrame); seek.value = String(minFrame);
  seek.style.cssText = "flex:1;";
  const frameLabel = document.createElement("span");
  frameLabel.style.cssText = "color:#94a3b8;font-size:11px;min-width:160px;text-align:right;font-variant-numeric:tabular-nums;";
  controls.append(playBtn, stepBack, stepFwd, seek, frameLabel);
  body.appendChild(controls);

  let currentFrame = minFrame;

  function nearestFrame(fi) {
    // Slider value may not match a recorded frame; pick nearest.
    if (cameraByFrame.has(fi)) return fi;
    let best = frameNumbers[0], bestD = Math.abs(best - fi);
    for (const k of frameNumbers) {
      const d = Math.abs(k - fi);
      if (d < bestD) { best = k; bestD = d; }
    }
    return best;
  }
  function drawCameraMarker(cam) {
    const [cx, cy] = pitch2px(cam.pos[0], cam.pos[1]);
    let [fx, fy] = cam.fwd;
    const mag = Math.hypot(fx, fy) || 1;
    fx /= mag; fy /= mag;
    const dx = fx, dy = -fy;  // canvas y is flipped vs world y
    const size = 10;
    const tip = [cx + dx * size, cy + dy * size];
    const base1 = [cx - dx * 5 - dy * 6, cy - dy * 5 + dx * 6];
    const base2 = [cx - dx * 5 + dy * 6, cy - dy * 5 - dx * 6];
    ctx.fillStyle = cam.isAnchor ? "#fef3c7" : "#fde68a";
    ctx.strokeStyle = cam.isAnchor ? "#a16207" : "#854d0e";
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(tip[0], tip[1]);
    ctx.lineTo(base1[0], base1[1]);
    ctx.lineTo(base2[0], base2[1]);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Direction sight-line — a faint line from camera projecting forward
    // for ~30 m so you can tell at a glance which goal it's looking at.
    ctx.strokeStyle = "rgba(253, 230, 138, 0.45)";
    ctx.lineWidth = 1;
    const sight = pitch2px(cam.pos[0] + fx * 30, cam.pos[1] + fy * 30);
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(sight[0], sight[1]); ctx.stroke();
    // Position label
    const offX = cam.pos[0] < -3 || cam.pos[0] > 108;
    const offY = cam.pos[1] < -3 || cam.pos[1] > 71;
    const label = `cam (${cam.pos[0].toFixed(1)}, ${cam.pos[1].toFixed(1)}, ${cam.z.toFixed(1)})`;
    ctx.font = "bold 10px -apple-system, sans-serif";
    const tw = ctx.measureText(label).width + 6;
    const lx = Math.max(2, Math.min(W - tw - 2, cx + 12));
    const ly = Math.max(14, Math.min(H - 4, cy - 10));
    ctx.fillStyle = (offX || offY) ? "rgba(127,29,29,0.9)" : "rgba(0,0,0,0.65)";
    ctx.fillRect(lx, ly - 11, tw, 14);
    ctx.fillStyle = (offX || offY) ? "#fecaca" : "#fde68a";
    ctx.fillText(label, lx + 3, ly);
  }
  function render(fi) {
    currentFrame = fi;
    drawPitch();
    const cam = cameraByFrame.get(nearestFrame(fi));
    if (cam) drawCameraMarker(cam);
    seek.value = String(fi);
    const sec = (fi / Math.max(1, DEFAULT_FPS)).toFixed(2);
    const isAnchor = cam && cam.isAnchor ? "  (anchor)" : "";
    frameLabel.textContent = `Frame ${fi}  (${sec}s)${isAnchor}`;
  }

  let playing = false, rafId = null, lastTs = 0;
  function tick(ts) {
    if (!playing) { rafId = null; return; }
    if (lastTs === 0) lastTs = ts;
    const dt = (ts - lastTs) / 1000;
    const advance = Math.max(1, Math.round(dt * DEFAULT_FPS));
    lastTs = ts;
    let next = currentFrame + advance;
    if (next > maxFrame) {
      next = maxFrame; render(next);
      playing = false; playBtn.textContent = "▶"; rafId = null; lastTs = 0; return;
    }
    render(next);
    rafId = requestAnimationFrame(tick);
  }
  playBtn.addEventListener("click", () => {
    if (playing) { playing = false; playBtn.textContent = "▶"; }
    else {
      if (currentFrame >= maxFrame) currentFrame = minFrame;
      playing = true; playBtn.textContent = "⏸";
      lastTs = 0; rafId = requestAnimationFrame(tick);
    }
  });
  stepBack.addEventListener("click", () => {
    playing = false; playBtn.textContent = "▶";
    render(Math.max(minFrame, currentFrame - 1));
  });
  stepFwd.addEventListener("click", () => {
    playing = false; playBtn.textContent = "▶";
    render(Math.min(maxFrame, currentFrame + 1));
  });
  seek.addEventListener("input", () => {
    playing = false; playBtn.textContent = "▶";
    render(parseInt(seek.value, 10));
  });

  render(minFrame);
  return wrap;
}

function buildEmbeddedAnchorEditor() {
  const { wrap, body } = makePanel("Anchor Editor");
  body.style.padding = "0";

  // Header bar with a "pop out" link in case the in-page iframe gets
  // cramped — opens the standalone full-page editor.
  const header = document.createElement("div");
  header.style.cssText = "padding:8px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1f2937;";
  header.innerHTML = `
    <span style="color:#94a3b8;font-size:12px;">Mark pitch landmarks on key frames; the camera stage solves anchors first, then propagates between them.</span>
    <a href="/anchor_editor" target="_blank" style="margin-left:auto;color:#a5b4fc;font-size:12px;text-decoration:none;">Open in new tab ↗</a>
  `;
  body.appendChild(header);

  // The embedded editor is the same standalone HTML — iframe avoids
  // having to refactor anchor_editor.html into a reusable component.
  const frame = document.createElement("iframe");
  frame.src = "/anchor_editor";
  frame.style.cssText = "width:100%;height:780px;border:0;display:block;background:#0a0e1a;";
  frame.title = "Anchor Editor";
  body.appendChild(frame);
  return wrap;
}

// Stable color palette — shared between trajectory legend, kp2d overlay,
// and the per-player tooltip so the same player keeps the same colour
// across panels.
const PLAYER_PALETTE = ["#60a5fa", "#f87171", "#34d399", "#fbbf24", "#c084fc", "#fb7185", "#22d3ee", "#facc15", "#a78bfa", "#f472b6", "#4ade80", "#fb923c", "#38bdf8", "#e879f9", "#a3e635", "#facc15"];

function playerColour(idx) {
  return PLAYER_PALETTE[idx % PLAYER_PALETTE.length];
}

function playerLabel(p) {
  return p && p.player_name ? p.player_name : (p && p.player_id) || "?";
}

async function renderKp2dPanel(panel, shotId) {
  const shotQ = shotId
    ? `?shot=${encodeURIComponent(shotId)}`
    : "";
  const data = await fetchJsonOrNull(`/hmr_world/kp2d_players${shotQ}`);
  if (!data || !data.players || data.players.length === 0) return;

  // Server returns [{shot_id, player_id, player_name}].
  const playerList = data.players.map((p, i) => ({ ...p, colour: playerColour(i) }));
  const shotParam = shotId
    ? `&shot=${encodeURIComponent(shotId)}`
    : "";
  const previews = await Promise.all(
    playerList.map((p) =>
      fetchJsonOrNull(`/hmr_world/kp2d_preview?player_id=${encodeURIComponent(p.player_id)}${shotParam}`)
        .then((d) => ({ ...p, data: d }))
    )
  );
  const playersWithFrames = previews.filter((x) => x.data && x.data.frames && x.data.frames.length > 0);
  const total = previews.reduce((s, x) => s + ((x.data && x.data.frames) ? x.data.frames.length : 0), 0);
  const empty = previews.length - playersWithFrames.length;

  const { wrap: hwrap, body: hbody } = makePanel(`2D keypoints (${playerList.length} players, from GVHMR ViTPose)`);
  const summary = document.createElement("div");
  summary.style.cssText = "padding:14px 16px;font-size:13px;color:#cbd5e1;line-height:1.7;";
  summary.innerHTML = `
    <div>Total keypoint frames: ${total}</div>
    <div>Players with empty keypoints: ${empty} / ${playerList.length}</div>
  `;
  hbody.appendChild(summary);
  panel.appendChild(hwrap);

  if (playersWithFrames.length === 0) return;

  // Prefer the caller-supplied shotId (from the HMR World shot picker);
  // fall back to whichever shot_id the first populated player's kp2d
  // JSON references for legacy callers that don't pass one.
  const resolvedShotId = shotId || playersWithFrames[0].data.shot_id || "";

  buildKp2dPlayer(panel, resolvedShotId, playersWithFrames);

  const tablePanel = makePanel("Per-player frame counts");
  const { t, tbody } = makeTable(["Player", "Shot", "Frames"]);
  for (const x of previews) {
    const n = (x.data && x.data.frames) ? x.data.frames.length : 0;
    const cls = n === 0 ? "cell-dim" : "cell-green";
    const label = playerLabel(x);
    const idTag = x.player_name ? ` <span style="color:#64748b;font-size:11px;">(${x.player_id})</span>` : "";
    addRow(tbody, [
      { html: `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${x.colour};margin-right:6px;"></span>${label}${idTag}` },
      (x.data && x.data.shot_id) || "—",
      { html: `<span class="${cls}">${n}</span>` },
    ]);
  }
  tablePanel.body.appendChild(t);
  panel.appendChild(tablePanel.wrap);
}

// Video-based skeleton viewer. "All players" is the default; the picker
// can drill into a single player to debug a specific track.
function buildKp2dPlayer(panel, shotId, playersWithFrames) {
  // Picker
  const picker = document.createElement("div");
  picker.style.cssText = "padding:14px 16px 6px;font-size:13px;color:#cbd5e1;display:flex;gap:10px;align-items:center;flex-wrap:wrap;";
  picker.innerHTML = "<span>Player:</span>";
  const select = document.createElement("select");
  select.style.cssText = "background:#252840;color:#e2e8f0;border:1px solid #2d3148;border-radius:4px;padding:4px 8px;font-size:13px;";
  const allOpt = document.createElement("option");
  allOpt.value = "__all__"; allOpt.textContent = `All players (${playersWithFrames.length})`;
  select.appendChild(allOpt);
  for (const p of playersWithFrames) {
    const opt = document.createElement("option");
    opt.value = p.player_id;
    opt.textContent = `${playerLabel(p)} (${p.data.frames.length} frames)`;
    select.appendChild(opt);
  }
  picker.appendChild(select);
  panel.appendChild(picker);

  // Build a per-frame index: frame → [{player, keypoints}, ...]
  // (limited to the players currently visible; rebuilt on selection change).
  const allByFrame = new Map();
  for (const p of playersWithFrames) {
    for (const f of p.data.frames) {
      const arr = allByFrame.get(f.frame) || [];
      arr.push({ player: p, keypoints: f.keypoints });
      allByFrame.set(f.frame, arr);
    }
  }

  // Video stage with overlay (same pattern as the tracking editor).
  const stage = document.createElement("div");
  stage.style.cssText = "position:relative;background:#000;border-radius:4px;overflow:hidden;margin:0 16px;";
  const video = document.createElement("video");
  video.src = `/api/video/${encodeURIComponent(shotId)}`;
  video.preload = "metadata";
  video.style.cssText = "display:block;width:100%;height:auto;";
  const overlay = document.createElement("canvas");
  overlay.style.cssText = "position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;";
  stage.appendChild(video);
  stage.appendChild(overlay);
  panel.appendChild(stage);

  // Controls
  const controls = document.createElement("div");
  controls.style.cssText = "display:flex;align-items:center;gap:8px;padding:6px 16px;";
  const playBtn = makeToolbarBtn("▶", "#4f46e5"); playBtn.style.minWidth = "36px";
  const stepBack = makeToolbarBtn("◀", "#334155"); stepBack.title = "Previous frame";
  const stepFwd = makeToolbarBtn("▶", "#334155"); stepFwd.title = "Next frame";
  const seek = document.createElement("input");
  seek.type = "range"; seek.min = "0"; seek.max = "1000"; seek.value = "0";
  seek.style.cssText = "flex:1;";
  const frameLabel = document.createElement("span");
  frameLabel.style.cssText = "color:#94a3b8;font-size:11px;min-width:90px;text-align:right;font-variant-numeric:tabular-nums;";
  frameLabel.textContent = "Frame 0";
  controls.append(playBtn, stepBack, stepFwd, seek, frameLabel);
  panel.appendChild(controls);

  // Pull the configured fps once (camera_track is the source of truth).
  let fps = 30;
  fetchJsonOrNull("/camera/track").then((ct) => { if (ct && ct.fps) fps = ct.fps; });

  let visiblePids = new Set(playersWithFrames.map((p) => p.player_id));
  let lastFrame = -1, rafId = null;

  function fitOverlay() {
    if (!video.videoWidth) return;
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
    overlay.style.width = video.offsetWidth + "px";
    overlay.style.height = video.offsetHeight + "px";
  }
  function drawCurrent() {
    const fi = Math.round(video.currentTime * fps);
    if (fi === lastFrame) return;
    lastFrame = fi;
    seek.value = String(fi);
    frameLabel.textContent = `Frame ${fi}`;
    const ctx = overlay.getContext("2d");
    ctx.clearRect(0, 0, overlay.width, overlay.height);
    const entries = allByFrame.get(fi) || [];
    for (const e of entries) {
      if (!visiblePids.has(e.player.player_id)) continue;
      drawSkeleton(ctx, e.keypoints, e.player.colour, playerLabel(e.player));
    }
  }
  video.addEventListener("loadedmetadata", () => {
    seek.max = String(Math.round(video.duration * fps));
    fitOverlay(); drawCurrent();
  });
  new ResizeObserver(fitOverlay).observe(video);
  video.addEventListener("play", () => {
    playBtn.textContent = "⏸";
    if (!rafId) {
      const loop = () => { rafId = requestAnimationFrame(loop); drawCurrent(); };
      loop();
    }
  });
  video.addEventListener("pause", () => {
    playBtn.textContent = "▶";
    cancelAnimationFrame(rafId); rafId = null; drawCurrent();
  });
  video.addEventListener("seeked", () => { if (video.paused) drawCurrent(); });

  playBtn.addEventListener("click", () => { video.paused ? video.play() : video.pause(); });
  stepBack.addEventListener("click", () => { video.pause(); video.currentTime = Math.max(0, video.currentTime - 1 / fps); });
  stepFwd.addEventListener("click", () => { video.pause(); video.currentTime = Math.min(video.duration || 0, video.currentTime + 1 / fps); });
  seek.addEventListener("input", () => { video.pause(); video.currentTime = parseInt(seek.value, 10) / fps; });

  select.addEventListener("change", () => {
    if (select.value === "__all__") {
      visiblePids = new Set(playersWithFrames.map((p) => p.player_id));
    } else {
      visiblePids = new Set([select.value]);
      // Jump to the middle of the chosen player's frame range so the
      // overlay isn't blank when the player isn't on-screen yet.
      const p = playersWithFrames.find((x) => x.player_id === select.value);
      if (p && p.data.frames.length) {
        const mid = p.data.frames[Math.floor(p.data.frames.length / 2)].frame;
        video.pause(); video.currentTime = mid / fps;
      }
    }
    lastFrame = -1; drawCurrent();
  });
}

function drawSkeleton(ctx, kps, colour, label) {
  if (!kps || !kps.length) return;
  ctx.lineWidth = 2;
  ctx.strokeStyle = colour;
  for (const [a, b] of COCO_SKELETON) {
    if (a >= kps.length || b >= kps.length) continue;
    const ka = kps[a], kb = kps[b];
    if (!ka || !kb) continue;
    if ((ka[2] || 0) < 0.3 || (kb[2] || 0) < 0.3) continue;
    ctx.beginPath();
    ctx.moveTo(ka[0], ka[1]);
    ctx.lineTo(kb[0], kb[1]);
    ctx.stroke();
  }
  ctx.fillStyle = colour;
  for (const k of kps) {
    if (!k || (k[2] || 0) < 0.3) continue;
    ctx.beginPath();
    ctx.arc(k[0], k[1], 3, 0, Math.PI * 2);
    ctx.fill();
  }
  // Floating name tag near the head (kp 0 = nose) so multiple skeletons
  // are still legible when they overlap.
  if (label && kps[0] && (kps[0][2] || 0) >= 0.3) {
    ctx.font = "bold 11px -apple-system, sans-serif";
    const tw = ctx.measureText(label).width + 6;
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(kps[0][0] - tw / 2, kps[0][1] - 22, tw, 14);
    ctx.fillStyle = colour;
    ctx.fillText(label, kps[0][0] - tw / 2 + 3, kps[0][1] - 11);
  }
}

// ── COCO-17 skeleton (kp2d overlay) ──────────────────────────────────
const COCO_SKELETON = [
  [5, 7], [7, 9], [6, 8], [8, 10],          // arms
  [11, 13], [13, 15], [12, 14], [14, 16],   // legs
  [5, 6], [11, 12], [5, 11], [6, 12],       // torso
  [0, 1], [0, 2], [1, 3], [2, 4],           // head
];

async function renderHmrWorld(panel) {
  const shotsData = await fetchJsonOrNull("/api/output/shots");
  const shotIds = (shotsData && shotsData.shots) || [];
  if (shotIds.length === 0) {
    emptyNote(panel, "No shots — run prepare_shots first.");
    return;
  }

  // ── Controls bar: shot + player pickers + Run button ──
  const controls = document.createElement("div");
  controls.style.cssText = "display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px 14px;background:#1a1d27;border:1px solid #2d3148;border-radius:8px;font-size:13px;color:#cbd5e1;";

  const shotLabel = document.createElement("span");
  shotLabel.textContent = "Shot:";
  const shotSelect = document.createElement("select");
  shotSelect.style.cssText = "background:#252840;color:#e2e8f0;border:1px solid #2d3148;border-radius:4px;padding:4px 8px;font-size:13px;";
  for (const id of shotIds) {
    const opt = document.createElement("option");
    opt.value = id; opt.textContent = id;
    shotSelect.appendChild(opt);
  }

  const playerLabelEl = document.createElement("span");
  playerLabelEl.textContent = "Player:";
  playerLabelEl.style.marginLeft = "10px";
  const playerSelect = document.createElement("select");
  playerSelect.style.cssText = "background:#252840;color:#e2e8f0;border:1px solid #2d3148;border-radius:4px;padding:4px 8px;font-size:13px;min-width:160px;";

  const runBtn = document.createElement("button");
  runBtn.className = "btn btn-primary";
  runBtn.style.cssText = "font-size:12px;margin-left:auto;";
  runBtn.textContent = "Run for selection";
  runBtn.title = "Run hmr_world for the selected shot. With a player chosen the run is filtered to that one player_id (fast iteration).";

  const status = document.createElement("span");
  status.style.cssText = "color:#94a3b8;font-size:12px;";

  controls.append(shotLabel, shotSelect, playerLabelEl, playerSelect, runBtn, status);
  panel.appendChild(controls);

  // Body re-rendered on shot change.
  const body = document.createElement("div");
  body.style.cssText = "display:flex;flex-direction:column;gap:20px;margin-top:14px;";
  panel.appendChild(body);

  async function refreshPlayerOptions(shotId) {
    // Player dropdown lists every player the tracking stage saw in this
    // shot — even ones not yet processed by hmr_world — so the operator
    // can target a specific player for a fresh run.
    const tracks = await fetchJsonOrNull(`/tracking/preview?shot_id=${encodeURIComponent(shotId)}`);
    playerSelect.innerHTML = "";
    const allOpt = document.createElement("option");
    allOpt.value = "__all__";
    allOpt.textContent = "All players";
    playerSelect.appendChild(allOpt);
    if (!tracks || !tracks.tracks) return;
    const seen = new Map();
    for (const t of tracks.tracks) {
      if (t.class_name !== "player" && t.class_name !== "goalkeeper") continue;
      if (t.player_name === "ignore") continue;
      const pid = t.player_id || `${shotId}_T${t.track_id}`;
      if (seen.has(pid)) continue;
      seen.set(pid, t.player_name || "");
    }
    for (const [pid, name] of [...seen.entries()].sort()) {
      const opt = document.createElement("option");
      opt.value = pid;
      opt.textContent = name ? `${name} (${pid})` : pid;
      playerSelect.appendChild(opt);
    }
  }

  async function loadShot(shotId) {
    body.innerHTML = "";
    status.textContent = "";
    await refreshPlayerOptions(shotId);
    await renderHmrShotBody(body, shotId);
  }

  shotSelect.addEventListener("change", () => loadShot(shotSelect.value));

  runBtn.addEventListener("click", async () => {
    const shotId = shotSelect.value;
    const playerId = playerSelect.value;
    runBtn.disabled = true;
    status.style.color = "#94a3b8";
    let res, payload;
    try {
      if (playerId === "__all__") {
        status.textContent = `Dispatching hmr_world for shot ${shotId}…`;
        res = await fetch("/api/run-shot", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ stage: "hmr_world", shot_id: shotId }),
        });
      } else {
        status.textContent = `Dispatching hmr_world for ${shotId}__${playerId}…`;
        res = await fetch("/api/run-shot-player", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ shot_id: shotId, player_id: playerId }),
        });
      }
      payload = await res.json().catch(() => ({}));
    } catch (err) {
      status.style.color = "#f87171";
      status.textContent = `Failed to dispatch: ${err.message || err}`;
      runBtn.disabled = false;
      return;
    }
    if (!res.ok) {
      status.style.color = "#f87171";
      status.textContent = `Dispatch failed: ${payload.detail || res.statusText}`;
      runBtn.disabled = false;
      return;
    }
    status.style.color = "#4ade80";
    status.textContent = `Job ${payload.job_id} running — log panel above.`;
    attachToJob(payload.job_id, "hmr_world", async () => {
      runBtn.disabled = false;
      await loadStages();
      await loadShot(shotSelect.value);
    });
  });

  shotSelect.value = shotIds[0];
  await loadShot(shotIds[0]);
}

// One shot's worth of HMR World output: summary table, top-down trajectory,
// and 2D keypoint preview. Re-rendered on shot change so the dropdown's
// choice drives every panel below.
async function renderHmrShotBody(panel, shotId) {
  const data = await fetchJsonOrNull(
    `/hmr_world/players?shot=${encodeURIComponent(shotId)}`,
  );
  if (!data || !data.players || data.players.length === 0) {
    emptyNote(panel, `No hmr_world tracks for ${shotId} yet — pick a player above and click Run for selection.`);
    return;
  }

  const playerList = data.players.map((p, i) => ({ ...p, colour: playerColour(i) }));
  const previews = await Promise.all(
    playerList.map((p) =>
      fetchJsonOrNull(
        `/hmr_world/preview?shot=${encodeURIComponent(shotId)}` +
        `&player_id=${encodeURIComponent(p.player_id)}`
      ).then((d) => ({ ...p, data: d }))
    )
  );

  const { wrap: tWrap, body: tBody } = makePanel(
    `HMR World — ${shotId} (${playerList.length} player${playerList.length === 1 ? "" : "s"})`
  );
  const { t, tbody } = makeTable(["Player", "Frames", "Mean confidence"]);
  for (const x of previews) {
    const dotHtml = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${x.colour};margin-right:6px;vertical-align:middle;"></span>`;
    const label = playerLabel(x);
    const idTag = x.player_name ? ` <span style="color:#64748b;font-size:11px;">(${x.player_id})</span>` : "";
    if (!x.data) {
      addRow(tbody, [{ html: `${dotHtml}${label}${idTag}` }, "—", "—"]);
      continue;
    }
    const N = (x.data.frames || []).length;
    const conf = x.data.confidence || [];
    const mean = conf.length ? conf.reduce((s, v) => s + v, 0) / conf.length : 0;
    const cls = mean > 0.7 ? "cell-green" : mean > 0.4 ? "cell-amber" : "cell-red";
    addRow(tbody, [
      { html: `${dotHtml}${label}${idTag}` },
      N,
      { html: `<span class="${cls}">${fmt(mean, 3)}</span>` },
    ]);
  }
  tBody.appendChild(t);
  panel.appendChild(tWrap);

  const withRoot = previews.filter((x) => x.data && Array.isArray(x.data.root_t) && x.data.root_t.length > 0);
  if (withRoot.length > 0) {
    panel.appendChild(buildTrajectoryPanel(withRoot, shotId));
  }

  await renderKp2dPanel(panel, shotId);
}

function buildTrajectoryPanel(playerPreviews, shotIdHint) {
  const { wrap, body } = makePanel("Top-down player trajectories (pitch-world)");
  body.style.padding = "14px 16px";

  const PITCH_L = 105, PITCH_W = 68;
  // Asymmetric margins: tiny strip above the far touchline (visual
  // breathing room only) and a larger surround below the near
  // touchline so the camera marker (typically y ≈ -30) still lands on
  // the canvas. y_world=68 is the far touchline (visual top), y_world=0
  // is the near touchline (visual bottom), so MARGIN_FAR maps to canvas
  // top and MARGIN_NEAR to canvas bottom.
  const MARGIN_X = 8, MARGIN_FAR = 5, MARGIN_NEAR = 30;
  const scale = 6;
  const padding = 20;
  const W = (PITCH_L + 2 * MARGIN_X) * scale + padding * 2;
  const H = (PITCH_W + MARGIN_FAR + MARGIN_NEAR) * scale + padding * 2;
  const TRAIL_LEN = 30;        // frames of fading trail behind each dot
  const CONF_THRESH = 0.2;     // hide samples below this confidence
  const DEFAULT_FPS = 30;

  // Side-by-side layout: top-down pitch on the left at 70%, original
  // clip on the right at 30%. Both cells share a row height so the
  // views align visually.
  const stageWrap = document.createElement("div");
  stageWrap.style.cssText = "display:flex;gap:12px;align-items:stretch;";
  // ``flex: 7`` / ``flex: 3`` produces the 70/30 split. ``min-width:0``
  // lets the cells collapse below their content's preferred width on
  // narrow panels.
  const pitchCell = document.createElement("div");
  pitchCell.style.cssText = "flex:7;min-width:0;display:flex;align-items:center;justify-content:center;background:#0b3b1a;border-radius:4px;overflow:hidden;";
  const videoCell = document.createElement("div");
  videoCell.style.cssText = "flex:3;min-width:0;display:flex;align-items:center;justify-content:center;background:#000;border-radius:4px;overflow:hidden;";
  // ``video`` is the playback master clock when its src loads — the
  // rAF tick reads ``video.currentTime`` and renders the trajectory
  // at the matching frame so the two views stay in lock-step. If the
  // video can't load (test fixtures, missing shot file) the panel
  // falls back to a self-paced rAF timer.
  const pip = document.createElement("video");
  pip.preload = "metadata";
  pip.muted = true;
  pip.playsInline = true;
  pip.style.cssText = "width:100%;height:100%;object-fit:contain;display:block;line-height:0;";
  videoCell.appendChild(pip);
  const canvas = document.createElement("canvas");
  canvas.width = W;
  canvas.height = H;
  // ``max-width/max-height:100%`` of the cell + ``width/height:auto``
  // preserves the canvas's intrinsic aspect ratio while fitting inside
  // whichever cell dimension is the constraint.
  canvas.style.cssText = "max-width:100%;max-height:100%;width:auto;height:auto;display:block;line-height:0;";
  pitchCell.appendChild(canvas);
  stageWrap.appendChild(pitchCell);
  stageWrap.appendChild(videoCell);
  // Cap row height so the timeline + legend stay on-screen on
  // 1080p-class viewports without scrolling. 62vh leaves about a third
  // of the viewport for controls + other panels.
  stageWrap.style.height = "62vh";
  body.appendChild(stageWrap);
  const ctx = canvas.getContext("2d");

  // Prefer the caller-supplied shot id (from the HMR World shot picker)
  // so the PiP video matches the trajectories drawn on the pitch. Fall
  // back to the tracking stage's first shot for legacy single-shot
  // panels that don't pass a hint.
  let pipReady = false;
  if (shotIdHint) {
    pip.src = `/api/video/${encodeURIComponent(shotIdHint)}`;
  } else {
    fetchJsonOrNull("/tracking/shots").then((d) => {
      const shotId = d && d.shots && d.shots[0];
      if (!shotId) return;
      pip.src = `/api/video/${encodeURIComponent(shotId)}`;
    });
  }
  pip.addEventListener("loadedmetadata", () => { pipReady = true; });
  pip.addEventListener("error", () => { pipReady = false; });

  function pitch2px(x, y) {
    // Origin of the pitch box is offset by MARGIN_X / MARGIN_FAR so
    // the surround widths match the constants above. y is canvas-flipped.
    return [
      padding + (x + MARGIN_X) * scale,
      padding + (PITCH_W + MARGIN_FAR - y) * scale,
    ];
  }

  function drawPitch() {
    // Surround region (off-pitch space) — slightly darker so the actual
    // pitch is visually framed.
    ctx.fillStyle = "#0a1f10";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#0b3b1a";
    const [topLeftX, topLeftY] = pitch2px(0, PITCH_W);
    ctx.fillRect(topLeftX, topLeftY, PITCH_L * scale, PITCH_W * scale);
    ctx.strokeStyle = "#e2e8f0";
    ctx.lineWidth = 1.5;

    // Outer touchlines + goal lines.
    const corners = [[0, 0], [PITCH_L, 0], [PITCH_L, PITCH_W], [0, PITCH_W]];
    ctx.beginPath();
    for (let i = 0; i < corners.length; i++) {
      const [x, y] = pitch2px(...corners[i]);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.stroke();

    // Halfway line + centre circle + centre spot.
    ctx.beginPath();
    const m1 = pitch2px(PITCH_L / 2, 0), m2 = pitch2px(PITCH_L / 2, PITCH_W);
    ctx.moveTo(m1[0], m1[1]); ctx.lineTo(m2[0], m2[1]); ctx.stroke();
    ctx.beginPath();
    const c = pitch2px(PITCH_L / 2, PITCH_W / 2);
    ctx.arc(c[0], c[1], 9.15 * scale, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = "#e2e8f0";
    ctx.beginPath(); ctx.arc(c[0], c[1], 1.6, 0, Math.PI * 2); ctx.fill();

    // FIFA-standard box markings on each end. Drawing both halves in
    // one helper keeps the geometry symmetric and easy to tweak. All
    // dimensions in pitch metres, converted by ``pitch2px``.
    //   penalty box: 16.5 × 40.32  (centred on the goal)
    //   6-yard box:  5.5  × 18.32
    //   penalty spot at 11 m from the goal-line
    //   penalty arc:  9.15 m radius around the spot, the part outside the box (the "D")
    //   goal mouth:   7.32 m, marked as a thicker stub on the goal-line
    const PEN_DEPTH = 16.5, PEN_HALF = 20.16;
    const SIX_DEPTH = 5.5,  SIX_HALF = 9.16;
    const SPOT_FROM_GOAL = 11.0;
    const ARC_R = 9.15;
    const GOAL_HALF = 3.66;
    const yMid = PITCH_W / 2;
    const halfAngle = Math.acos((PEN_DEPTH - SPOT_FROM_GOAL) / ARC_R);

    function rectPath(x0, y0, x1, y1) {
      const [a, b] = pitch2px(x0, y0);
      const [c, d] = pitch2px(x1, y1);
      ctx.beginPath();
      ctx.rect(Math.min(a, c), Math.min(b, d), Math.abs(c - a), Math.abs(d - b));
      ctx.stroke();
    }

    for (const left of [true, false]) {
      const xGoal = left ? 0 : PITCH_L;
      const sgn   = left ? 1 : -1;
      // Penalty box.
      rectPath(xGoal, yMid - PEN_HALF, xGoal + sgn * PEN_DEPTH, yMid + PEN_HALF);
      // 6-yard box.
      rectPath(xGoal, yMid - SIX_HALF, xGoal + sgn * SIX_DEPTH, yMid + SIX_HALF);
      // Penalty spot.
      const xSpot = xGoal + sgn * SPOT_FROM_GOAL;
      const [sx, sy] = pitch2px(xSpot, yMid);
      ctx.fillStyle = "#e2e8f0";
      ctx.beginPath(); ctx.arc(sx, sy, 1.6, 0, Math.PI * 2); ctx.fill();
      // Penalty arc — the part of the 9.15 m radius circle that sits
      // outside the penalty box. We sample the arc parametrically and
      // line-segment between samples; using ctx.arc directly would
      // need careful direction handling because pitch2px flips y.
      const startAng = left ? -halfAngle : (Math.PI - halfAngle);
      const endAng   = left ?  halfAngle : (Math.PI + halfAngle);
      const N_SEG = 32;
      ctx.beginPath();
      for (let i = 0; i <= N_SEG; i++) {
        const a = startAng + (endAng - startAng) * (i / N_SEG);
        const [px, py] = pitch2px(xSpot + ARC_R * Math.cos(a), yMid + ARC_R * Math.sin(a));
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
      // Goal mouth — a thicker stub on the goal-line so left/right
      // goals are visually distinct from the rest of the line.
      ctx.lineWidth = 3;
      const [gAx, gAy] = pitch2px(xGoal, yMid - GOAL_HALF);
      const [gBx, gBy] = pitch2px(xGoal, yMid + GOAL_HALF);
      ctx.beginPath();
      ctx.moveTo(gAx, gAy); ctx.lineTo(gBx, gBy);
      ctx.stroke();
      ctx.lineWidth = 1.5;
    }
  }

  // Per-player {frame → {pos:[x,y,z], conf}} map for O(1) lookup as we
  // scrub the timeline.
  const playerIndex = playerPreviews.map((entry) => {
    const frames = entry.data.frames || [];
    const root_t = entry.data.root_t || [];
    const conf = entry.data.confidence || [];
    const m = new Map();
    for (let i = 0; i < frames.length; i++) {
      m.set(frames[i], { pos: root_t[i], conf: conf[i] != null ? conf[i] : 1 });
    }
    return {
      pid: entry.player_id,
      label: playerLabel(entry),
      colour: entry.colour || playerColour(0),
      byFrame: m,
      firstFrame: frames.length ? frames[0] : 0,
      lastFrame: frames.length ? frames[frames.length - 1] : 0,
    };
  });

  // Global frame range across all players — drives the slider extents.
  let minFrame = Infinity, maxFrame = -Infinity;
  for (const p of playerIndex) {
    if (p.byFrame.size === 0) continue;
    if (p.firstFrame < minFrame) minFrame = p.firstFrame;
    if (p.lastFrame > maxFrame) maxFrame = p.lastFrame;
  }
  if (!isFinite(minFrame)) { minFrame = 0; maxFrame = 0; }

  // Controls: play/step/seek. Mirror the kp2d-preview pattern.
  const controls = document.createElement("div");
  controls.style.cssText = "display:flex;align-items:center;gap:8px;padding:8px 0 0;";
  const playBtn = makeToolbarBtn("▶", "#4f46e5"); playBtn.style.minWidth = "36px";
  const stepBack = makeToolbarBtn("◀", "#334155"); stepBack.title = "Previous frame";
  const stepFwd = makeToolbarBtn("▶", "#334155"); stepFwd.title = "Next frame";
  const seek = document.createElement("input");
  seek.type = "range"; seek.min = String(minFrame); seek.max = String(maxFrame); seek.value = String(minFrame);
  seek.style.cssText = "flex:1;";
  const frameLabel = document.createElement("span");
  frameLabel.style.cssText = "color:#94a3b8;font-size:11px;min-width:120px;text-align:right;font-variant-numeric:tabular-nums;";
  controls.append(playBtn, stepBack, stepFwd, seek, frameLabel);
  body.appendChild(controls);

  let fps = DEFAULT_FPS;
  // Camera-position overlay: per-frame {pos:[x,y], heading:[x,y]} in
  // pitch-world (y-flipped done at draw time). Drawing the camera on
  // the same panel as the players makes mirror-solution calibration
  // bugs visually obvious — the marker should sit at the touchline
  // side opposite the action; if it lands at a corner or behind the
  // far line, the solver picked a degenerate minimum.
  const cameraByFrame = new Map();
  fetchJsonOrNull("/camera/track").then((ct) => {
    if (!ct || !ct.frames) return;
    if (ct.fps) fps = ct.fps;
    const t_world = (ct.t_world && ct.t_world.length === 3) ? ct.t_world : null;
    for (const f of ct.frames) {
      // C = -R^T t  (OpenCV convention: cam = R X + t).
      const t = (f.t && f.t.length === 3) ? f.t : t_world;
      if (!t || !f.R) continue;
      const R = f.R;
      // R is row-major 3x3. R^T t = column-vector with components
      //   sum_i R[i][k] * t[i] for k in 0..2
      const C = [
        -(R[0][0] * t[0] + R[1][0] * t[1] + R[2][0] * t[2]),
        -(R[0][1] * t[0] + R[1][1] * t[1] + R[2][1] * t[2]),
        -(R[0][2] * t[0] + R[1][2] * t[1] + R[2][2] * t[2]),
      ];
      // Camera "forward" in world frame = R^T @ [0,0,1] = third column of R^T = third row of R.
      // Project to pitch x-y plane for the heading arrow.
      const fwd = [R[2][0], R[2][1]];
      cameraByFrame.set(f.frame, { pos: [C[0], C[1]], z: C[2], fwd });
    }
    render(currentFrame);
  });

  const legend = document.createElement("div");
  legend.style.cssText = "margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:#cbd5e1;";
  for (const p of playerIndex) {
    const swatch = document.createElement("span");
    swatch.dataset.pid = p.pid;
    swatch.style.cssText = `display:inline-flex;align-items:center;gap:5px;padding:2px 6px;background:#252840;border-radius:3px;cursor:pointer;`;
    swatch.innerHTML = `<span style="width:10px;height:10px;border-radius:50%;background:${p.colour};"></span>${p.label}`;
    legend.appendChild(swatch);
  }
  body.appendChild(legend);

  // Frame the trajectory at a given playhead. Older trail samples get
  // exponential alpha falloff so the eye reads direction without the
  // canvas turning into spaghetti.
  let currentFrame = minFrame;
  function drawCameraMarker(fi) {
    const cam = cameraByFrame.get(fi) || cameraByFrame.get(minFrame);
    if (!cam) return;
    const [cx, cy] = pitch2px(cam.pos[0], cam.pos[1]);
    // Triangular marker pointing along the camera's projected forward.
    let [fx, fy] = cam.fwd;
    const mag = Math.hypot(fx, fy) || 1;
    fx /= mag; fy /= mag;
    // Note: pitch2px flips y, so the marker's world-y direction must be
    // negated when expressed in canvas pixels.
    const dx = fx, dy = -fy;
    const size = 10;
    const tip = [cx + dx * size, cy + dy * size];
    const base1 = [cx - dx * 5 - dy * 6, cy - dy * 5 + dx * 6];
    const base2 = [cx - dx * 5 + dy * 6, cy - dy * 5 - dx * 6];
    ctx.fillStyle = "#fde68a";
    ctx.strokeStyle = "#854d0e";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(tip[0], tip[1]);
    ctx.lineTo(base1[0], base1[1]);
    ctx.lineTo(base2[0], base2[1]);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // Camera-out-of-bounds annotation: when the recovered position is
    // off the canvas, project it to the nearest edge and label.
    const offX = cam.pos[0] < -3 || cam.pos[0] > 108;
    const offY = cam.pos[1] < -3 || cam.pos[1] > 71;
    const label = `cam (${cam.pos[0].toFixed(1)}, ${cam.pos[1].toFixed(1)}, ${cam.z.toFixed(1)})`;
    ctx.font = "bold 10px -apple-system, sans-serif";
    const tw = ctx.measureText(label).width + 6;
    const lx = Math.max(2, Math.min(W - tw - 2, cx + 10));
    const ly = Math.max(14, Math.min(H - 4, cy - 12));
    ctx.fillStyle = (offX || offY) ? "rgba(127,29,29,0.85)" : "rgba(0,0,0,0.65)";
    ctx.fillRect(lx, ly - 11, tw, 14);
    ctx.fillStyle = (offX || offY) ? "#fecaca" : "#fde68a";
    ctx.fillText(label, lx + 3, ly);
  }
  function render(fi) {
    currentFrame = fi;
    drawPitch();
    drawCameraMarker(fi);
    for (const p of playerIndex) {
      // Build the trail of recent positions inside [fi - TRAIL_LEN, fi].
      const trail = [];
      for (let f = Math.max(p.firstFrame, fi - TRAIL_LEN); f <= fi; f++) {
        const e = p.byFrame.get(f);
        if (!e || !e.pos || e.pos.length < 2 || e.conf < CONF_THRESH) continue;
        trail.push({ f, pos: e.pos });
      }
      if (trail.length === 0) continue;
      // Trail polyline with fading alpha.
      ctx.lineWidth = 1.6;
      ctx.lineCap = "round";
      for (let i = 1; i < trail.length; i++) {
        const aN = (trail[i - 1].f - (fi - TRAIL_LEN)) / TRAIL_LEN;
        const aB = (trail[i].f     - (fi - TRAIL_LEN)) / TRAIL_LEN;
        const alpha = Math.max(0, Math.min(1, (aN + aB) / 2));
        ctx.strokeStyle = withAlpha(p.colour, 0.15 + 0.6 * alpha);
        const [x0, y0] = pitch2px(trail[i - 1].pos[0], trail[i - 1].pos[1]);
        const [x1, y1] = pitch2px(trail[i].pos[0],     trail[i].pos[1]);
        ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
      }
      // Head dot + label at the most recent sample.
      const head = trail[trail.length - 1];
      const [hx, hy] = pitch2px(head.pos[0], head.pos[1]);
      ctx.fillStyle = p.colour;
      ctx.beginPath(); ctx.arc(hx, hy, 4, 0, Math.PI * 2); ctx.fill();
      // Off-pitch dots get a subtle warning ring so calibration errors
      // are visually obvious from the trajectory panel alone.
      const offPitch =
        head.pos[0] < 0 || head.pos[0] > 105 ||
        head.pos[1] < 0 || head.pos[1] > 68;
      if (offPitch) {
        ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.arc(hx, hy, 7, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.font = "bold 10px -apple-system, sans-serif";
      const tw = ctx.measureText(p.label).width + 6;
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(hx + 6, hy - 8, tw, 14);
      ctx.fillStyle = p.colour;
      ctx.fillText(p.label, hx + 9, hy + 2);
    }
    seek.value = String(fi);
    const sec = (fi / Math.max(1, fps)).toFixed(2);
    frameLabel.textContent = `Frame ${fi}  (${sec}s)`;
  }

  // Playback. When the PiP video has loaded we use it as the master
  // clock — every animation tick reads ``pip.currentTime`` and renders
  // the trajectory at the matching frame, so the two views can never
  // drift. Without the video we fall back to a self-paced rAF tick.
  let playing = false, rafId = null, lastTs = 0;
  function syncPipTo(fi) {
    if (!pipReady) return;
    const target = fi / Math.max(1, fps);
    // Avoid pointless seeks while playing — the natural playback already
    // walks currentTime forward; only force a seek if we've drifted by
    // more than a frame. When paused (or stepping) always seek.
    if (pip.paused || Math.abs(pip.currentTime - target) > 1.5 / fps) {
      try { pip.currentTime = Math.max(0, Math.min(pip.duration || target, target)); }
      catch { /* ignore — happens before metadata loads */ }
    }
  }
  function tick(ts) {
    if (!playing) { rafId = null; return; }
    let next;
    if (pipReady) {
      // Master-clock branch: derive the playhead frame from the PiP
      // video. Stop when the video ends or we hit the data range end.
      next = Math.round(pip.currentTime * fps);
      if (pip.ended || next > maxFrame) {
        if (next > maxFrame) next = maxFrame;
        render(next);
        playing = false; playBtn.textContent = "▶"; rafId = null;
        if (!pip.paused) pip.pause();
        return;
      }
    } else {
      // Fallback branch: dt-based advance against the configured fps.
      if (lastTs === 0) lastTs = ts;
      const dt = (ts - lastTs) / 1000;
      const advance = Math.max(1, Math.round(dt * fps));
      lastTs = ts;
      next = currentFrame + advance;
      if (next > maxFrame) {
        next = maxFrame; render(next);
        playing = false; playBtn.textContent = "▶"; rafId = null; lastTs = 0;
        return;
      }
    }
    render(next);
    rafId = requestAnimationFrame(tick);
  }
  playBtn.addEventListener("click", () => {
    if (playing) {
      playing = false; playBtn.textContent = "▶";
      if (pipReady && !pip.paused) pip.pause();
    } else {
      if (currentFrame >= maxFrame) currentFrame = minFrame;
      playing = true; playBtn.textContent = "⏸";
      lastTs = 0;
      if (pipReady) {
        syncPipTo(currentFrame);
        // Best-effort play() — autoplay policies on macOS Safari can
        // refuse without user interaction; the click satisfies that.
        pip.play().catch(() => {});
      }
      rafId = requestAnimationFrame(tick);
    }
  });
  stepBack.addEventListener("click", () => {
    playing = false; playBtn.textContent = "▶";
    if (pipReady && !pip.paused) pip.pause();
    const next = Math.max(minFrame, currentFrame - 1);
    render(next); syncPipTo(next);
  });
  stepFwd.addEventListener("click", () => {
    playing = false; playBtn.textContent = "▶";
    if (pipReady && !pip.paused) pip.pause();
    const next = Math.min(maxFrame, currentFrame + 1);
    render(next); syncPipTo(next);
  });
  seek.addEventListener("input", () => {
    playing = false; playBtn.textContent = "▶";
    if (pipReady && !pip.paused) pip.pause();
    const fi = parseInt(seek.value, 10);
    render(fi); syncPipTo(fi);
  });

  // Initial paint at the first frame any player exists in.
  render(minFrame);
  return wrap;
}

function withAlpha(hexColour, alpha) {
  // Accepts #rgb / #rrggbb. Returns rgba(r,g,b,alpha).
  const c = hexColour.replace("#", "");
  let r, g, b;
  if (c.length === 3) {
    r = parseInt(c[0] + c[0], 16);
    g = parseInt(c[1] + c[1], 16);
    b = parseInt(c[2] + c[2], 16);
  } else {
    r = parseInt(c.slice(0, 2), 16);
    g = parseInt(c.slice(2, 4), 16);
    b = parseInt(c.slice(4, 6), 16);
  }
  return `rgba(${r},${g},${b},${alpha})`;
}

async function renderBall(panel) {
  // ── Shot picker (only shown if multiple shots exist) ──
  const shotsData = await fetchJsonOrNull("/api/output/shots");
  const shotIds = (shotsData && shotsData.shots) || [];

  const controls = document.createElement("div");
  controls.style.cssText = "display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px 14px;background:#1a1d27;border:1px solid #2d3148;border-radius:8px;font-size:13px;color:#cbd5e1;";
  const shotLabel = document.createElement("span");
  shotLabel.textContent = "Shot:";
  const shotSelect = document.createElement("select");
  shotSelect.style.cssText = "background:#252840;color:#e2e8f0;border:1px solid #2d3148;border-radius:4px;padding:4px 8px;font-size:13px;";
  for (const id of shotIds) {
    const opt = document.createElement("option");
    opt.value = id; opt.textContent = id;
    shotSelect.appendChild(opt);
  }
  if (shotIds.length === 0) {
    const opt = document.createElement("option");
    opt.value = ""; opt.textContent = "(legacy single-shot)";
    shotSelect.appendChild(opt);
    shotSelect.disabled = true;
  }
  controls.append(shotLabel, shotSelect);
  if (shotIds.length > 1) panel.appendChild(controls);

  const body = document.createElement("div");
  body.style.cssText = "display:flex;flex-direction:column;gap:18px;margin-top:14px;";
  panel.appendChild(body);

  async function loadShot(shotId) {
    body.innerHTML = "";
    const url = shotId ? `/ball/preview?shot=${encodeURIComponent(shotId)}` : "/ball/preview";
    const data = await fetchJsonOrNull(url);
    if (!data || !data.frames || data.frames.length === 0) {
      emptyNote(body, "No ball track yet — drop anchors below (optional) and run the Ball stage.");
      // The editor only needs the clip + camera_track, so it works
      // before the ball stage has produced any output.
      const editorPanel = makePanel("Ball Anchor Editor");
      const editor = buildBallAnchorEditor({ fps: 30 }, shotId);
      editorPanel.body.appendChild(editor.element);
      body.appendChild(editorPanel.wrap);
      return;
    }
    renderBallShot(body, data, shotId);
  }

  shotSelect.addEventListener("change", () => loadShot(shotSelect.value));
  await loadShot(shotIds.length > 0 ? shotIds[0] : "");
}

function renderBallShot(panel, data, shotId) {
  const N = data.frames.length;
  const states = {};
  for (const f of data.frames) {
    states[f.state] = (states[f.state] || 0) + 1;
  }
  const stateSummary = Object.entries(states)
    .map(([s, n]) => `${s}: ${n} (${fmt((n / N) * 100, 1)}%)`)
    .join(", ");

  // ── Summary card ──
  const { wrap: sumWrap, body: sumBody } = makePanel("Ball Track summary");
  const summary = document.createElement("div");
  summary.style.cssText = "padding:14px 16px;font-size:13px;color:#cbd5e1;line-height:1.7;";
  const segs = data.flight_segments || [];
  const segsWithSpin = segs.filter((s) => s.parabola && s.parabola.spin_omega_rad_s != null);
  summary.innerHTML = `
    <div>Clip: <strong>${data.clip_id || "(unnamed)"}</strong>, FPS: ${fmt(data.fps, 2)}</div>
    <div>Frames: ${N}</div>
    <div>State distribution: ${stateSummary}</div>
    <div>Flight segments: ${segs.length} (with spin: ${segsWithSpin.length})</div>
  `;
  sumBody.appendChild(summary);
  panel.appendChild(sumWrap);


  // ── Flight segments table (if any) ──
  if (segs.length > 0) {
    const { wrap: tWrap, body: tBody } = makePanel("Flight segments");
    const tbl = document.createElement("table");
    tbl.style.cssText = "width:100%;border-collapse:collapse;font-size:12px;color:#cbd5e1;";
    tbl.innerHTML = `
      <thead>
        <tr style="background:#1a1d27;color:#94a3b8;text-align:left;">
          <th style="padding:8px 10px;">#</th>
          <th style="padding:8px 10px;">Frames</th>
          <th style="padding:8px 10px;">Duration</th>
          <th style="padding:8px 10px;">Fit residual (px)</th>
          <th style="padding:8px 10px;">|ω| (rad/s)</th>
          <th style="padding:8px 10px;">Spin axis (world)</th>
          <th style="padding:8px 10px;">Spin conf</th>
        </tr>
      </thead>
      <tbody></tbody>
    `;
    const tb = tbl.querySelector("tbody");
    for (const s of segs) {
      const [a, b] = s.frame_range || [null, null];
      const dur = data.fps && a != null && b != null ? `${fmt((b - a) / data.fps, 2)}s` : "—";
      const omega = s.parabola && s.parabola.spin_omega_rad_s;
      const axis = s.parabola && s.parabola.spin_axis_world;
      const conf = s.parabola && s.parabola.spin_confidence;
      const tr = document.createElement("tr");
      tr.style.borderTop = "1px solid #2d3148";
      tr.innerHTML = `
        <td style="padding:6px 10px;">${s.id}</td>
        <td style="padding:6px 10px;font-variant-numeric:tabular-nums;">${a}–${b}</td>
        <td style="padding:6px 10px;font-variant-numeric:tabular-nums;">${dur}</td>
        <td style="padding:6px 10px;font-variant-numeric:tabular-nums;">${fmt(s.fit_residual_px, 2)}</td>
        <td style="padding:6px 10px;font-variant-numeric:tabular-nums;">${omega != null ? fmt(omega, 2) : "—"}</td>
        <td style="padding:6px 10px;font-variant-numeric:tabular-nums;">${axis ? `[${axis.map((v) => fmt(v, 2)).join(", ")}]` : "—"}</td>
        <td style="padding:6px 10px;font-variant-numeric:tabular-nums;">${conf != null ? fmt(conf, 2) : "—"}</td>
      `;
      tb.appendChild(tr);
    }
    tBody.appendChild(tbl);
    panel.appendChild(tWrap);
  }

  // ── Side-by-side previews ──
  const grid = document.createElement("div");
  grid.style.cssText = "display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:18px;";
  panel.appendChild(grid);

  const topdownPanel = makePanel("Top-down trajectory");
  const td = buildBallTopdown(data);
  topdownPanel.body.appendChild(td.element);
  grid.appendChild(topdownPanel.wrap);

  const threeDPanel = makePanel("3D trajectory");
  const td3 = buildBall3D(data);
  threeDPanel.body.appendChild(td3.element);
  grid.appendChild(threeDPanel.wrap);

  // ── Shared timeline + play controls (drives td + td3) ──
  const minFrame = data.frames[0].frame;
  const maxFrame = data.frames[data.frames.length - 1].frame;
  const fps = data.fps || 30;
  const tl = document.createElement("div");
  tl.style.cssText = "display:flex;align-items:center;gap:8px;padding:8px 14px;background:#1a1d27;border:1px solid #2d3148;border-radius:8px;";
  const playBtn = makeToolbarBtn("▶", "#4f46e5"); playBtn.style.minWidth = "36px";
  const stepBack = makeToolbarBtn("◀", "#334155"); stepBack.title = "Previous frame";
  const stepFwd = makeToolbarBtn("▶", "#334155"); stepFwd.title = "Next frame";
  const seek = document.createElement("input");
  seek.type = "range";
  seek.min = String(minFrame);
  seek.max = String(maxFrame);
  seek.value = String(minFrame);
  seek.style.cssText = "flex:1;";
  const frameLabel = document.createElement("span");
  frameLabel.style.cssText = "color:#94a3b8;font-size:11px;min-width:140px;text-align:right;font-variant-numeric:tabular-nums;";
  tl.append(playBtn, stepBack, stepFwd, seek, frameLabel);
  panel.appendChild(tl);

  let currentFrame = minFrame;
  // editorRef is populated once the editor is built (a few lines below).
  // setFrame is defined first because the editor's frame-change callback
  // needs to call it.
  let editorRef = null;
  function setFrame(fi) {
    currentFrame = Math.max(minFrame, Math.min(maxFrame, fi));
