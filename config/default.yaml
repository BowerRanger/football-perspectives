# Pitch geometry — FIFA standard for v1.
pitch:
  length_m: 105.0
  width_m: 68.0
  goal_height_m: 2.44
  # FIFA inside post-to-post; used by goal_impact ball anchor to locate
  # the posts at y = width_m/2 ± goal_width_m/2 along each goal line.
  goal_width_m: 7.32
  # Approximate goal depth — used to model the back_net and side_net
  # as flat vertical planes behind / beside the goal frame for the
  # goal_impact pixel-ray intersection.
  goal_depth_m: 1.5
  corner_flag_height_m: 1.5

prepare_shots:
  expected_format: mp4
  output_fps: null

tracking:
  player_model: yolov8x.pt
  ball_model: yolov8n.pt
  confidence_threshold: 0.3
  # YOLO NMS IoU threshold. Raised from the ultralytics default of 0.7
  # because two footballers running close together overlap at IoU
  # 0.5-0.8 and the default silently drops one — the tracker then sees
  # one bbox covering two players, which is the dominant cause of ID
  # swaps during occlusions. 0.85 lets both detections survive while
  # still suppressing duplicate proposals for a single player.
  iou_threshold: 0.85
  # YOLO inference resolution (longest-side). With sahi.enabled this is
  # the per-tile resolution; with sahi disabled it's the whole-frame
  # resolution. 1280 on a 960-px tile is a 1.33x bilinear upscale,
  # which is the sweet spot for anchor density without huge cost.
  imgsz: 1280

  # SAHI-style tiled inference. Each frame is split into overlapping
  # 960-px tiles and YOLO runs on each one separately. Detections are
  # then NMS-merged back into full-frame coordinates. On 1920x1080
  # broadcast footage this gives a 3x2 tile grid with 240 px of
  # overlap, so any player straddling a tile seam is fully detected in
  # at least one neighbouring tile. The point isn't more pixels — it's
  # giving each region of the frame its own fresh anchor lattice,
  # which is what separates two close players that single-pass
  # inference at any imgsz still collapses into one bbox.
  sahi:
    enabled: true
    tile_size: 960
    overlap_ratio: 0.25
    # NMS IoU at which two detections from neighbouring tiles are
    # considered duplicates of the same player and the lower-confidence
    # one is dropped during merge.
    nms_iou_threshold: 0.5
  team_classifier: none
  default_team_label: unknown
  progress_every_frames: 150
  # Default max gap (in missing frames) the dashboard's "Interp Missing
  # Frames" button will linear-interpolate between two known bboxes
  # inside a track. Picked so the operator can fill brief detector
  # dropouts (≈0.25 s at 30 fps) without straying into gaps long enough
  # for direction changes to make linear interp give wrong crops.
  # Set to 0 to disable the button by default (it can still be overridden
  # per-request).
  interpolate_max_gap_frames: 8
  # Tracker selection: `bytetrack` (motion/IoU only — supervision's
  # default) or `botsort` (BoxMOT BoT-SORT with OSNet ReID embeddings).
  # botsort holds IDs through occlusions when players cross because it
  # weighs appearance alongside IoU; bytetrack is faster but swaps IDs
  # at collisions, especially between players in clashing kits.
  tracker: botsort
  # Path to the OSNet ReID checkpoint. Fetch with scripts/setup_boxmot.sh.
  # Only used when tracker == botsort.
  # OSNet-AIN (Adaptive Instance Normalisation) at x1.0 capacity. Far
  # more robust on football broadcast footage than osnet_x0_25 — AIN
  # handles the domain shift from the surveillance dataset OSNet was
  # trained on (MSMT17) to broadcast sport, and x1.0 is 4x the capacity
  # of x0.25 so embedding distance between visually different players
  # is much sharper. Fetch with scripts/setup_boxmot.sh.
  reid_weights: third_party/boxmot/osnet_ain_x1_0_msmt17.pt
  # Device for the ReID network. `auto` picks CUDA if available, else
  # MPS (Apple Silicon), else CPU. Pin explicitly with cuda / mps / cpu
  # when you want predictable performance.
  tracker_device: auto
  # BoT-SORT tuning knobs. Defaults follow BoxMOT's recommended values
  # for sports tracking; the appearance weight (proximity_thresh /
  # appearance_thresh) is what actually disambiguates a collision.
  botsort:
    track_high_thresh: 0.5      # detections above this start new tracks
    track_low_thresh: 0.1       # below this they're discarded
    new_track_thresh: 0.6       # confidence required to mint a new ID
    match_thresh: 0.8           # max cost for IoU re-association
    proximity_thresh: 0.5       # max IoU distance before ReID kicks in
    # Tightened from 0.25 -> 0.15: only accept genuinely-close appearance
    # matches. Players in clashing kits should sit well above 0.15 cosine
    # distance, so this rejects swap candidates while keeping legitimate
    # re-acquisitions of the same player.
    appearance_thresh: 0.15
    # sof (sparse optical flow) is more robust than ECC on panning
    # broadcast cameras where the pitch dominates the frame — ECC's
    # whole-frame correlation gets confused by the uniform pitch
    # texture. Options: ecc | orb | sift | sof.
    cmc_method: sof
    frame_rate: 30
    fuse_first_associate: false
    with_reid: true

camera:
  first_anchor_min_landmarks: 6
  subsequent_anchor_min_landmarks: 4
  # Tightened from 10.0 once lens-distortion modelling and Huber loss were
  # added — anchors above this px residual surface as low-confidence in the
  # quality report (soft threshold, not a hard fail).
  anchor_max_reprojection_px: 2.0
  # Stadium-mounted broadcast cameras don't translate — only pan, tilt,
  # zoom. Locking t prevents the LM from finding K/R/t combinations that
  # reproject anchors well but jump the camera body around in pitch
  # metres between anchors. Set false for moving rigs (steadicam, dolly).
  static_camera: true
  # Lens model: when true, the camera stage runs a 9-DOF LM (rvec, tvec,
  # fx, cx, cy, k1, k2) on the highest-coverage anchor (≥10 landmarks,
  # ≥12% image-area span) to recover principal point and radial
  # distortion before the joint solve. Without this, principal point is
  # pinned to image centre and distortion is estimated jointly across
  # anchors — which gets rejected on real clips because click noise
  # outweighs the distortion signal. With this enabled, the lens prior
  # is recovered from the one anchor that has enough spatial coverage
  # to disambiguate it from pose, and every other anchor inherits it.
  # The estimator self-gates (returns None if it can't beat the no-
  # distortion baseline by 2×), so leaving this on is safe when no
  # qualifying anchor exists — the legacy flow runs instead.
  lens_from_anchor: true
  # Line extraction (experimental): when true, the camera stage adds a
  # post-propagation pass that re-fits the per-frame cameras against
  # painted pitch lines detected directly in the video frame. Each
  # propagated camera is the detection bootstrap; the detector searches
  # a strip around each projected catalogue line, locates the painted
  # line's sub-pixel centreline (bright-ridge convolution + parabolic
  # peak), and an LM re-solves against those lines.
  # With static_camera=true the camera stage runs the static-camera line
  # solve: detect -> C-profile -> bundle-adjust one shared camera centre
  # -> iteratively re-detect. The output track has a single fixed
  # camera_centre (zero body motion). With static_camera=false it runs
  # the legacy independent per-frame line refinement instead (per-frame
  # solves are locally under-determined and the body can wander).
  # See docs/superpowers/notes/2026-05-14-camera-1px-experiment.md.
  line_extraction: true
  line_extraction_strip_px: 25       # search-strip half-width (px) around projected line
  line_extraction_min_gradient: 10.0 # min bright-ridge contrast (grey levels) to accept a line
  line_extraction_max_iters: 4       # detect↔solve iterations per frame (static_camera=false path)
  # Lens model for the static-camera line solve (only used when
  # static_camera + line_extraction are both true). pinhole_k1k2 shares
  # (cx, cy, k1, k2); brown_conrady additionally frees tangential
  # (p1, p2) and k3. Start with pinhole_k1k2 — the C-profile diagnostic
  # (scripts/profile_static_c.py) tells you whether the richer model is
  # needed. See docs/superpowers/notes/2026-05-14-camera-1px-experiment.md.
  line_extraction_lens_model: pinhole_k1k2
  # Iterative rounds for the static-camera line solve: detect → solve →
  # re-detect under the solved cameras → re-solve. Default 1 — on gberch
  # the extra rounds regressed (re-detecting under the shared static-C
  # camera finds more but noisier lines) and the solve keeps the best
  # round anyway, so >1 only costs runtime. Raise per-clip if a clip's
  # propagated bootstrap cameras are poor enough that re-detection helps.
  line_extraction_static_rounds: 1
  # ORB is the only detector currently implemented in feature_propagator.
  # SuperPoint is a future enhancement (better repeatability under zoom).
  feature_detector: orb
  max_features_per_frame: 1000
  ransac_inlier_min_ratio: 0.4
  redetect_threshold: 200
  enable_bidirectional: true
  pitch_line_consistency_max_px: 5.0
  forward_backward_disagreement_warn_deg: 0.5

hmr_world:
  # Force CPU on macOS: GVHMR's RoPE attention has a slice op that
  # trips an MPS assertion (dimension[1] (120) ... subRange) at exactly
  # the model's configured max_len. CPU is slower but stable.
  device: cpu
  checkpoint: third_party/gvhmr/inputs/checkpoints/gvhmr/gvhmr_siga24_release.ckpt
  batch_size: 16
  max_sequence_length: 120
  min_track_frames: 10
  beta_aggregation: median
  theta_savgol_window: 11
  theta_savgol_order: 2
  ground_snap_velocity: 0.1
  foot_anchor_max_occlusion_frames: 10
  # Translation-jitter dampener — smooths root_t across time. The same
  # camera-tracking jitter that drives ~mm pose drift also reaches root_t
  # via the foot-anchor ray-cast; a 5-frame Savgol kills the noise without
  # flattening sprint accelerations. Set window=1 to disable.
  root_t_savgol_window: 5
  root_t_savgol_order: 2
  # Constant tilt-correction (degrees) for monocular-HMR's
  # lean-away-from-camera bias. Rotates root_R_pitch around the horizontal
  # axis perpendicular to the camera-to-player direction by this many
  # degrees toward the camera. 0 disables; 5 is a good empirical starting
  # point on broadcast clips.
  lean_correction_deg: 5.0

ball:
  # Detector backend used by the in-stage detection pass. wasb is the
  # purpose-built broadcast-sports detector (vendored at
  # third_party/wasb_sbdt). yolo is the COCO class-32 fallback. fake is
  # used only in tests via dependency injection.
  detector: wasb
  ball_radius_m: 0.11
  # Max consecutive frames the IMM tracker will gap-fill before emitting
  # state="missing". 6 ≈ 0.2 s at 30 fps.
  max_gap_frames: 6
  flight_max_residual_px: 5.0
  max_occlusion_frames: 8
  wasb:
    checkpoint: third_party/wasb_sbdt/pretrained_weights/wasb_soccer_best.pth.tar
    confidence: 0.3
    input_size: [512, 288]
  tracker:
    process_noise_grounded_px: 4.0
    process_noise_flight_px: 12.0
    measurement_noise_px: 2.0
    gating_sigma: 4.0
    # Replaces the old top-level ball.min_flight_frames / max_flight_frames.
    min_flight_frames: 6
    max_flight_frames: 90
  spin:
    enabled: true
    min_flight_seconds: 0.5
    # Magnus fit is only accepted if RMS pixel residual improves by at
    # least this fraction over the pure-parabola fit on the same segment.
    min_residual_improvement: 0.20
    # Relaxed acceptance threshold when the segment's start anchor
    # (kick/volley) carries an explicit spin preset — the user has
    # asserted there is spin, so we don't require the same 20 % beat.
    min_residual_improvement_with_hint: 0.05
    # Sanity bound on recovered angular speed (rad/s). Pro footballers
    # rarely exceed ~50 rad/s on a kick; we cap conservatively at 200.
    max_omega_rad_s: 200.0
    # Lumped drag coefficient k/m used inside the Magnus integrator:
    #     a = g + (k_drag_over_m) · (ω × v)
    drag_k_over_m: 0.005
  plausibility:
    z_max_m: 50.0
    horizontal_speed_max_m_s: 40.0
    pitch_margin_m: 5.0
  flight_promotion:
    enabled: true
    min_run_frames: 6
    off_pitch_margin_m: 5.0
    max_ground_speed_m_s: 35.0
  kick_anchor:
    enabled: true
    max_pixel_distance_px: 30.0
    lookahead_frames: 4
    min_pixel_acceleration_px_per_frame: 6.0
    foot_anchor_z_m: 0.11
  appearance_bridge:
    enabled: true
    max_gap_frames: 8
    template_size_px: 32
    search_radius_px: 64
    min_ncc: 0.6
    template_max_age_frames: 30
    template_update_confidence: 0.5

refined_poses:
  # Outlier rejection (per frame, per view) using MAD on root_t.
  outlier_k_sigma: 3.0
  min_contributing_views: 1
  high_disagreement_pos_m: 0.5
  high_disagreement_rot_rad: 0.5
  # Smoothing (reuses src/utils/temporal_smoothing.py).
  savgol_window: 7
  savgol_poly: 3
  smooth_rotations: true
  # Beta fusion across all shots a player appears in.
  beta_aggregation: weighted_mean
  beta_disagreement_warn: 0.3

export:
  gltf_enabled: true
  fbx_enabled: true
  blender_path: blender
  ue5:
    forward_axis: -Y
    up_axis: Z
    scale: 1.0
