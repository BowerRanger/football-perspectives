<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Perspectives — Pipeline Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    background: #0f1117;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ─────────────────────────────────────────────────── */
  #sidebar {
    width: 240px;
    min-width: 240px;
    background: #1a1d27;
    border-right: 1px solid #2d3148;
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  #sidebar-header {
    padding: 16px 16px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #64748b;
    border-bottom: 1px solid #2d3148;
  }

  .stage-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.12s;
  }
  .stage-item:hover { background: #252840; }
  .stage-item.active {
    background: #252840;
    border-left-color: #6366f1;
  }

  .stage-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    background: #4b5563;
  }
  .stage-dot.complete  { background: #22c55e; }
  .stage-dot.running   { background: #f59e0b; animation: pulse 1s infinite; }
  .stage-dot.error     { background: #ef4444; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .stage-label { font-size: 13px; color: #cbd5e1; }
  .stage-item.active .stage-label { color: #f1f5f9; font-weight: 500; }
  .stage-index { font-size: 11px; color: #64748b; margin-left: auto; }

  /* ── Sidebar links (anchor editor, etc.) ─────────────────────── */
  #sidebar-links {
    margin-top: auto;
    padding: 10px 16px 14px;
    border-top: 1px solid #2d3148;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #sidebar-links a {
    color: #cbd5e1;
    text-decoration: none;
    font-size: 12px;
    padding: 6px 8px;
    border-radius: 4px;
    background: #252840;
    border: 1px solid #2d3148;
    transition: background 0.12s;
  }
  #sidebar-links a:hover { background: #303554; color: #fff; }

  /* ── Main panel ───────────────────────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #stage-header {
    padding: 16px 24px;
    border-bottom: 1px solid #2d3148;
    display: flex;
    align-items: center;
    gap: 12px;
    background: #1a1d27;
    flex-shrink: 0;
  }

  #stage-title { font-size: 18px; font-weight: 600; color: #f1f5f9; }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-complete { background: #14532d; color: #86efac; }
  .badge-pending  { background: #1e293b; color: #64748b; }
  .badge-running  { background: #451a03; color: #fbbf24; }
  .badge-error    { background: #450a0a; color: #fca5a5; }

  #main-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── Panels ───────────────────────────────────────────────────── */
  .panel {
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 8px;
    overflow: hidden;
  }

  .panel-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #64748b;
    padding: 10px 16px;
    border-bottom: 1px solid #2d3148;
  }

  .panel-body { padding: 16px; }

  .btn {
    padding: 7px 16px;
    border-radius: 5px;
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-secondary { background: #374151; color: #e2e8f0; }

  /* ── Log panel ────────────────────────────────────────────────── */
  #log-output {
    background: #0a0c12;
    border-radius: 5px;
    padding: 12px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 12px;
    line-height: 1.6;
    color: #94a3b8;
    max-height: 220px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* ── Tables ───────────────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #64748b;
    border-bottom: 1px solid #2d3148;
  }
  td { padding: 8px 12px; border-bottom: 1px solid #1e2236; color: #cbd5e1; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1e2236; }

  .cell-green { color: #22c55e; }
  .cell-amber { color: #f59e0b; }
  .cell-red   { color: #ef4444; }
  .cell-dim   { color: #4b5563; }

  /* ── Confidence bar ───────────────────────────────────────────── */
  .conf-bar-wrap {
    background: #1e293b;
    border-radius: 3px;
    height: 6px;
    width: 80px;
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }
  .conf-bar { height: 100%; border-radius: 3px; background: #6366f1; }

  .empty-note {
    color: #64748b;
    font-size: 13px;
    padding: 12px 0;
    font-style: italic;
  }
</style>
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────────────────────── -->
<div id="sidebar">
  <div id="sidebar-header">Pipeline Stages</div>
  <div id="stage-list"></div>
  <div id="sidebar-links">
    <a href="/anchor_editor">✎ Anchor Editor</a>
    <a href="/viewer" target="_blank">▶ 3D Viewer</a>
  </div>
</div>

<!-- ── Main ─────────────────────────────────────────────────────────── -->
<div id="main">
  <div id="stage-header">
    <span id="stage-title">—</span>
    <span id="stage-badge" class="badge badge-pending">Not run</span>
    <button id="run-all-btn" class="btn btn-secondary" style="margin-left:auto;font-size:12px;">Run All</button>
    <button id="rerun-btn" class="btn btn-primary" disabled style="font-size:12px;">Re-run Stage</button>
  </div>

  <div id="main-body">

    <div class="panel" id="log-panel" style="display:none;position:sticky;top:0;z-index:20;max-height:45vh;overflow:hidden;background:#0f172a;border:1px solid #1f2937;">
      <div class="panel-title" style="display:flex;align-items:center;gap:8px;">
        <span>Log Output</span>
        <span id="log-status" style="font-size:11px;color:#64748b;"></span>
        <button id="log-close-btn" title="Dismiss log" style="margin-left:auto;background:#334155;color:#e2e8f0;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px;">✕</button>
      </div>
      <div class="panel-body" style="padding:0;max-height:calc(45vh - 36px);overflow-y:auto;">
        <pre id="log-output" style="white-space:pre-wrap;"></pre>
      </div>
    </div>

    <div id="output-panel"></div>

  </div>
</div>

<script>
"use strict";

// ── State ─────────────────────────────────────────────────────────────
let currentStage = null;
let currentStages = [];   // [{name, index, complete}]
let activeSource = null;  // current EventSource

// Stage dependency graph for the broadcast-mono pipeline
const STAGE_DEPS = {
  prepare_shots: [],
  tracking:      ["prepare_shots"],
  camera:        ["prepare_shots"],
  pose_2d:       ["prepare_shots", "tracking"],
  hmr_world:     ["tracking", "camera"],
  ball:          ["camera"],
  export:        ["camera", "hmr_world"],
};

// ── Initialise ───────────────────────────────────────────────────────
async function init() {
  await loadStages();
}

// ── Sidebar ──────────────────────────────────────────────────────────
async function loadStages() {
  const res = await fetch("/api/stages");
  if (!res.ok) return;
  currentStages = await res.json();
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById("stage-list");
  list.innerHTML = "";
  for (const s of currentStages) {
    const item = document.createElement("div");
    item.className = "stage-item" + (s.name === currentStage ? " active" : "");
    item.dataset.stage = s.name;
    item.onclick = () => selectStage(s.name);

    const dot = document.createElement("span");
    dot.className = "stage-dot" + (s.complete ? " complete" : "");
    dot.id = `dot-${s.name}`;

    const label = document.createElement("span");
    label.className = "stage-label";
    label.textContent = humanizeStageName(s.name);

    const idx = document.createElement("span");
    idx.className = "stage-index";
    idx.textContent = s.index;

    item.appendChild(dot);
    item.appendChild(label);
    item.appendChild(idx);
    list.appendChild(item);
  }

  if (!currentStage) {
    const first = currentStages.find((s) => !s.complete) || currentStages[0];
    if (first) selectStage(first.name);
  }
}

// ── Stage selection ──────────────────────────────────────────────────
async function selectStage(name) {
  currentStage = name;
  document.querySelectorAll(".stage-item").forEach((el) => {
    el.classList.toggle("active", el.dataset.stage === name);
  });

  const s = currentStages.find((x) => x.name === name);
  document.getElementById("stage-title").textContent = humanizeStageName(name);

  const badge = document.getElementById("stage-badge");
  if (s && s.complete) {
    badge.textContent = "Complete";
    badge.className = "badge badge-complete";
  } else {
    badge.textContent = "Not run";
    badge.className = "badge badge-pending";
  }

  const rerunBtn = document.getElementById("rerun-btn");
  const deps = STAGE_DEPS[name] || [];
  const stageMap = Object.fromEntries(currentStages.map((s) => [s.name, s.complete]));
  const missing = deps.filter((d) => !stageMap[d]);
  rerunBtn.disabled = missing.length > 0;
  rerunBtn.title = missing.length === 0 ? "" : `Requires: ${missing.join(", ")}`;

  document.getElementById("output-panel").innerHTML = "";
  loadOutput(name);
}

// ── Run / log streaming ──────────────────────────────────────────────
async function startRun(stages) {
  const logPanel = document.getElementById("log-panel");
  const logOutput = document.getElementById("log-output");
  const logStatus = document.getElementById("log-status");
  logPanel.style.display = "";
  logPanel.style.borderColor = "#1f2937";
  logOutput.textContent = "";
  logStatus.textContent = "running…";
  logStatus.style.color = "#fbbf24";
  logPanel.scrollIntoView({ behavior: "auto", block: "start" });

  if (currentStage) setDot(currentStage, "running");
  const badge = document.getElementById("stage-badge");
  badge.textContent = "Running";
  badge.className = "badge badge-running";

  const body = { stages };
  const res = await fetch("/api/run", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });

  if (!res.ok) {
    logOutput.textContent = "Failed to start run";
    if (currentStage) setDot(currentStage, "error");
    return;
  }

  const { job_id } = await res.json();
  if (activeSource) activeSource.close();
  activeSource = new EventSource(`/api/jobs/${job_id}/logs`);

  activeSource.addEventListener("log", (e) => {
    const { line } = JSON.parse(e.data);
    logOutput.textContent += line + "\n";
    logOutput.scrollTop = logOutput.scrollHeight;
  });

  activeSource.addEventListener("done", (e) => {
    activeSource.close();
    activeSource = null;
    const { status } = JSON.parse(e.data);
    if (status === "done") {
      logStatus.textContent = "done";
      logStatus.style.color = "#4ade80";
      logPanel.style.borderColor = "#166534";
      if (currentStage) setDot(currentStage, "complete");
      loadStages().then(() => { if (currentStage) selectStage(currentStage); });
    } else {
      logStatus.textContent = "ERROR — scroll log above for details";
      logStatus.style.color = "#f87171";
      logPanel.style.borderColor = "#b91c1c";
      if (currentStage) setDot(currentStage, "error");
      badge.textContent = "Error";
      badge.className = "badge badge-error";
      logPanel.scrollIntoView({ behavior: "auto", block: "start" });
      logOutput.scrollTop = logOutput.scrollHeight;
    }
  });
}

document.getElementById("log-close-btn").addEventListener("click", () => {
  document.getElementById("log-panel").style.display = "none";
});

document.getElementById("rerun-btn").addEventListener("click", async () => {
  if (!currentStage) return;
  const btn = document.getElementById("rerun-btn");
  btn.disabled = true;
  await fetch(`/api/output/${currentStage}`, { method: "DELETE" });
  startRun(currentStage);
});

document.getElementById("run-all-btn").addEventListener("click", () => {
  startRun("all");
});

function setDot(stageName, state) {
  const dot = document.getElementById(`dot-${stageName}`);
  if (dot) dot.className = "stage-dot " + state;
}

// ── Output loading ───────────────────────────────────────────────────
async function loadOutput(stageName) {
  const panel = document.getElementById("output-panel");
  panel.innerHTML = "";

  switch (stageName) {
    case "prepare_shots":
      await renderPrepareShots(panel);
      break;
    case "tracking":
      await renderTracking(panel);
      break;
    case "camera":
      await renderCamera(panel);
      break;
    case "pose_2d":
      await renderPose2D(panel);
      break;
    case "hmr_world":
      await renderHmrWorld(panel);
      break;
    case "ball":
      await renderBall(panel);
      break;
    case "export":
      await renderExport(panel);
      break;
    default:
      panel.innerHTML = `<div class="empty-note">Unknown stage: ${stageName}</div>`;
  }
}

// ── Helpers ──────────────────────────────────────────────────────────
function makePanel(title) {
  const wrap = document.createElement("div");
  wrap.className = "panel";
  wrap.innerHTML = `<div class="panel-title">${title}</div>`;
  const body = document.createElement("div");
  body.className = "panel-body";
  body.style.padding = "0";
  wrap.appendChild(body);
  return { wrap, body };
}

function makeTable(headers) {
  const t = document.createElement("table");
  const thead = document.createElement("thead");
  const tr = document.createElement("tr");
  headers.forEach((h) => {
    const th = document.createElement("th");
    th.textContent = h;
    tr.appendChild(th);
  });
  thead.appendChild(tr);
  t.appendChild(thead);
  const tbody = document.createElement("tbody");
  t.appendChild(tbody);
  return { t, tbody };
}

function addRow(tbody, cells) {
  const tr = document.createElement("tr");
  cells.forEach((c) => {
    const td = document.createElement("td");
    if (typeof c === "string" || typeof c === "number") {
      td.textContent = c;
    } else if (c && c.html) {
      td.innerHTML = c.html;
    } else if (c && c.el) {
      td.appendChild(c.el);
    }
    if (c && c.cls) td.className = c.cls;
    tr.appendChild(td);
  });
  tbody.appendChild(tr);
}

function fmt(n, dec = 1) {
  if (n == null) return "—";
  return Number(n).toFixed(dec);
}

function humanizeStageName(name) {
  if (!name) return "—";
  const map = {
    prepare_shots: "Prepare Shots",
    tracking:      "Tracking",
    camera:        "Camera Tracking",
    pose_2d:       "2D Pose",
    hmr_world:     "HMR World",
    ball:          "Ball",
    export:        "Export",
  };
  return map[name] || name;
}

function emptyNote(panel, msg) {
  const div = document.createElement("div");
  div.className = "empty-note";
  div.textContent = msg;
  panel.appendChild(div);
}

async function fetchJsonOrNull(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    return await res.json();
  } catch (_) { return null; }
}

// ── Stage renderers ──────────────────────────────────────────────────

async function renderPrepareShots(panel) {
  const data = await fetchJsonOrNull("/api/output/shots");
  if (!data || !data.shots || data.shots.length === 0) {
    emptyNote(panel, "No prepared shots yet — run prepare_shots to extract clips.");
    return;
  }
  const { wrap, body } = makePanel(`Prepared Shots (${data.shots.length})`);
  const { t, tbody } = makeTable(["Shot ID", "Preview"]);
  for (const id of data.shots) {
    const vid = document.createElement("video");
    vid.src = `/api/video/${id}`;
    vid.controls = true;
    vid.preload = "metadata";
    vid.style.cssText = "max-width:240px;max-height:80px;border-radius:4px;";
    addRow(tbody, [id, { el: vid }]);
  }
  body.appendChild(t);
  panel.appendChild(wrap);
}

async function renderTracking(panel) {
  emptyNote(panel,
    "Tracking output is consumed downstream (camera, pose_2d, hmr_world). " +
    "Re-run this stage to regenerate per-clip tracks.");
}

async function renderCamera(panel) {
  const track = await fetchJsonOrNull("/camera/track");
  const anchors = await fetchJsonOrNull("/anchors");

  const { wrap, body } = makePanel("Camera Track");
  const summary = document.createElement("div");
  summary.style.cssText = "padding:14px 16px;font-size:13px;color:#cbd5e1;";

  if (!track || !track.frames || track.frames.length === 0) {
    summary.innerHTML = '<span class="cell-dim">No camera_track.json yet.</span>';
  } else {
    const N = track.frames.length;
    const meanConf = track.frames.reduce((s, f) => s + (f.confidence || 0), 0) / N;
    const anchorCount = track.frames.filter((f) => f.is_anchor).length;
    summary.innerHTML = `
      <div>Clip: <strong>${track.clip_id}</strong></div>
      <div>Frames: ${N}, FPS: ${fmt(track.fps, 2)}, image ${track.image_size.join("×")}</div>
      <div>Camera position (t_world): [${track.t_world.map((v) => fmt(v, 2)).join(", ")}]</div>
      <div>Mean confidence: <span class="${meanConf > 0.7 ? "cell-green" : meanConf > 0.4 ? "cell-amber" : "cell-red"}">${fmt(meanConf, 3)}</span></div>
      <div>Anchored frames: ${anchorCount} / ${N}</div>
    `;
  }

  if (anchors && anchors.anchors && anchors.anchors.length > 0) {
    summary.innerHTML += `
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid #2d3148;">
        Anchor set: ${anchors.anchors.length} anchor frame${anchors.anchors.length === 1 ? "" : "s"}
        (clip <strong>${anchors.clip_id || "—"}</strong>)
      </div>`;
  } else {
    summary.innerHTML += `
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid #2d3148;color:#94a3b8;">
        No anchors yet — open the
        <a href="/anchor_editor" style="color:#a5b4fc;">Anchor Editor</a>
        to mark landmarks before running this stage.
      </div>`;
  }

  body.appendChild(summary);
  panel.appendChild(wrap);
}

async function renderPose2D(panel) {
  emptyNote(panel,
    "2D pose output is consumed by hmr_world. Re-run this stage to regenerate per-track keypoints.");
}

async function renderHmrWorld(panel) {
  const data = await fetchJsonOrNull("/hmr_world/players");
  if (!data || !data.players || data.players.length === 0) {
    emptyNote(panel, "No hmr_world tracks yet — run hmr_world to fit SMPL bodies.");
    return;
  }
  const { wrap, body } = makePanel(`HMR World (${data.players.length} player${data.players.length === 1 ? "" : "s"})`);
  const { t, tbody } = makeTable(["Player ID", "Frames", "Mean confidence"]);
  for (const pid of data.players) {
    const preview = await fetchJsonOrNull(`/hmr_world/preview?player_id=${encodeURIComponent(pid)}`);
    if (!preview) {
      addRow(tbody, [pid, "—", "—"]);
      continue;
    }
    const N = (preview.frames || []).length;
    const conf = preview.confidence || [];
    const mean = conf.length ? conf.reduce((s, x) => s + x, 0) / conf.length : 0;
    const cls = mean > 0.7 ? "cell-green" : mean > 0.4 ? "cell-amber" : "cell-red";
    addRow(tbody, [pid, N, { html: `<span class="${cls}">${fmt(mean, 3)}</span>` }]);
  }
  body.appendChild(t);
  panel.appendChild(wrap);
}

async function renderBall(panel) {
  const data = await fetchJsonOrNull("/ball/preview");
  if (!data || !data.frames || data.frames.length === 0) {
    emptyNote(panel, "No ball track yet — run ball to detect ball positions.");
    return;
  }
  const { wrap, body } = makePanel("Ball Track");
  const N = data.frames.length;
  const states = {};
  for (const f of data.frames) {
    states[f.state] = (states[f.state] || 0) + 1;
  }
  const stateSummary = Object.entries(states)
    .map(([s, n]) => `${s}: ${n} (${fmt((n / N) * 100, 1)}%)`)
    .join(", ");
  const summary = document.createElement("div");
  summary.style.cssText = "padding:14px 16px;font-size:13px;color:#cbd5e1;line-height:1.7;";
  summary.innerHTML = `
    <div>Clip: <strong>${data.clip_id}</strong>, FPS: ${fmt(data.fps, 2)}</div>
    <div>Frames: ${N}</div>
    <div>State distribution: ${stateSummary}</div>
    <div>Flight segments: ${(data.flight_segments || []).length}</div>
  `;
  body.appendChild(summary);
  panel.appendChild(wrap);
}

async function renderExport(panel) {
  const meta = await fetchJsonOrNull("/api/export/metadata");
  if (!meta) {
    emptyNote(panel, "No export yet — run export to produce scene.glb / FBX files.");
    return;
  }
  const { wrap, body } = makePanel("Export");
  const summary = document.createElement("div");
  summary.style.cssText = "padding:14px 16px;font-size:13px;color:#cbd5e1;line-height:1.7;";
  const items = [];
  if (meta.gltf_file) items.push(`glTF: ${meta.gltf_file}`);
  if (meta.metadata_file) items.push(`Metadata: ${meta.metadata_file}`);
  if (meta.fbx_files && meta.fbx_files.length) items.push(`FBX files: ${meta.fbx_files.length}`);
  if (meta.players) items.push(`Players: ${(meta.players || []).join(", ")}`);
  summary.innerHTML = items.map((s) => `<div>${s}</div>`).join("");

  const btnWrap = document.createElement("div");
  btnWrap.style.cssText = "padding:8px 12px;";
  const viewerBtn = document.createElement("a");
  viewerBtn.href = "/viewer";
  viewerBtn.target = "_blank";
  viewerBtn.textContent = "Open 3D Viewer";
  viewerBtn.style.cssText = "display:inline-block;background:#4f46e5;color:#fff;padding:8px 20px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:500;";
  btnWrap.appendChild(viewerBtn);
  body.appendChild(summary);
  body.appendChild(btnWrap);
  panel.appendChild(wrap);
}

// ── Boot ─────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
